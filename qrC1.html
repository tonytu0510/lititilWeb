<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔳 纯手写二维码生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      font-family: "Segoe UI", Roboto, sans-serif; 
      min-height: 100vh; 
      padding: 1.5rem; 
      color: #e0e0e0; 
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { 
      text-align: center; 
      font-size: 1.8rem; 
      margin-bottom: 0.5rem; 
      background: linear-gradient(135deg, #43e97b, #38f9d7); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .card { 
      background: rgba(255,255,255,0.05); 
      border-radius: 1rem; 
      padding: 1.2rem; 
      border: 1px solid rgba(255,255,255,0.1); 
      margin-bottom: 1rem; 
    }
    .card h3 { 
      color: #43e97b; 
      font-size: 0.9rem; 
      margin-bottom: 0.8rem; 
      display: flex; 
      align-items: center; 
      gap: 0.4rem; 
    }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .flex-row > * { flex: 1; min-width: 250px; }
    label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.3rem; }
    input, select, button { 
      padding: 0.7rem; 
      border: 1px solid rgba(255,255,255,0.2); 
      border-radius: 0.5rem; 
      background: rgba(0,0,0,0.3); 
      color: #e0e0e0; 
      font-size: 0.9rem; 
      width: 100%; 
      margin-bottom: 0.5rem;
    }
    button { 
      cursor: pointer; 
      font-weight: 600; 
      border: none; 
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-gen { 
      background: linear-gradient(135deg, #4facfe, #00f2fe); 
      color: #1a1a2e; 
      font-size: 1rem;
      padding: 0.9rem;
    }
    .btn-download { 
      background: linear-gradient(135deg, #43e97b, #38f9d7); 
      color: #1a1a2e; 
    }
    .btn-upload { 
      background: linear-gradient(135deg, #ffb86c, #ff6b6b); 
      color: #1a1a2e; 
    }
    .toggle { 
      display: flex; 
      align-items: center; 
      gap: 0.5rem; 
      padding: 0.5rem 0;
      cursor: pointer;
    }
    .toggle input[type="checkbox"] { 
      width: auto; 
      margin: 0;
      accent-color: #43e97b;
    }
    .qr-box { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      padding: 1rem; 
      background: white; 
      border-radius: 0.8rem;
      min-height: 200px;
    }
    .qr-box canvas, .qr-box img { 
      max-width: 250px; 
      max-height: 250px; 
      border-radius: 0.5rem;
    }
    .log-box { 
      background: rgba(0,0,0,0.4); 
      border-radius: 0.5rem; 
      padding: 0.6rem; 
      font-family: monospace; 
      font-size: 0.75rem; 
      color: #43e97b; 
      max-height: 350px; 
      overflow-y: auto; 
      white-space: pre-wrap; 
      line-height: 1.4; 
    }
    .result { 
      font-size: 1.1rem; 
      font-weight: 600; 
      padding: 0.5rem; 
      text-align: center; 
      border-radius: 0.5rem;
      margin-top: 0.5rem;
    }
    .ok { color: #43e97b; background: rgba(67,233,123,0.1); }
    .fail { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .info { color: #4facfe; background: rgba(79,172,254,0.1); }
    .logo-preview { 
      width: 60px; 
      height: 60px; 
      border-radius: 0.5rem; 
      background: white; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 2rem;
      margin-top: 0.5rem;
    }
    .section-title { 
      color: #ffb86c; 
      font-size: 0.75rem; 
      text-transform: uppercase; 
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <h1>🔳 纯手写二维码生成器</h1>
    <p class="subtitle">去掉定位点 · 原位置填充数据模块 · 仍可扫描</p>

    <div class="card">
      <div class="section-title">📝 二维码内容</div>
      <input id="qrText" value="https://www.baidu.com" placeholder="输入文字或链接">

      <div class="flex-row" style="margin-top: 0.8rem;">
        <div>
          <label>📐 模块大小 (像素/格)</label>
          <input type="number" id="moduleSize" value="8" min="4" max="20">
        </div>
        <div>
          <label>🛡️ 容错率（建议高）</label>
          <select id="ecLevel">
            <option value="L">低 (~7%)</option>
            <option value="M">中 (~15%)</option>
            <option value="Q">较高 (~25%)</option>
            <option value="H" selected>高 (30%) - 推荐</option>
          </select>
        </div>
      </div>

      <div class="flex-row" style="margin-top: 0.5rem;">
        <div class="toggle">
          <input type="checkbox" id="removeFinders" checked>
          <label for="removeFinders" style="margin:0; cursor:pointer;">🗑️ 去掉三个定位点（原位置填充数据）</label>
        </div>
        <div class="toggle">
          <input type="checkbox" id="addLogo" checked>
          <label for="addLogo" style="margin:0; cursor:pointer;">🎯 中间加Logo</label>
        </div>
      </div>

      <div id="logoSection" style="margin-top: 0.8rem;">
        <div class="section-title">🎯 Logo 设置</div>
        <div class="flex-row">
          <div>
            <label>📁 Logo图片（可选，不上传用默认emoji）</label>
            <input type="file" id="logoInput" accept="image/*" style="display:none;">
            <button class="btn-upload" onclick="document.getElementById('logoInput').click()">📁 选择图片</button>
          </div>
          <div>
            <label>或输入 Emoji</label>
            <input id="logoEmoji" value="🌹" placeholder="输入emoji" style="text-align:center; font-size:1.5rem;">
          </div>
        </div>
        <div class="logo-preview" id="logoPreview">🌹</div>
      </div>

      <button class="btn-gen" id="genBtn" style="margin-top: 1rem;">✨ 生成二维码</button>
    </div>

    <div class="flex-row">
      <div class="card" style="text-align:center; flex: 1;">
        <div class="section-title">📱 二维码预览</div>
        <div class="qr-box"><div id="qrDisplay">等待生成...</div></div>
        <button class="btn-download" id="downloadBtn" style="margin-top: 0.8rem; display:none;">💾 下载二维码 (PNG)</button>
      </div>
      <div class="card" style="flex: 1.5;">
        <div class="section-title">🔍 解析日志</div>
        <div class="result" id="resultDisplay">等待生成...</div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>
  </div>

  <canvas id="workCanvas" style="display:none;"></canvas>

  <script>
    // ==================== 兼容层：圆角矩形 ====================
    function drawRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    // ==================== GF(256) ====================
    const GF = (() => {
      const exp = new Int32Array(512), log = new Int32Array(256);
      let x = 1;
      for (let i = 0; i < 255; i++) {
        exp[i] = x; log[x] = i;
        x <<= 1; if (x & 0x100) x ^= 0x11D;
      }
      for (let i = 255; i < 512; i++) exp[i] = exp[i - 255];

      const mul = (a, b) => (a && b) ? exp[log[a] + log[b]] : 0;
      const polyEval = (p, x) => { let y = p[0]; for (let i = 1; i < p.length; i++) y = mul(y, x) ^ p[i]; return y; };
      const syndromes = (msg, nsym) => { for (let i = 0; i < nsym; i++) if (polyEval(msg, exp[i])) return 0; return 1; };
      const rsDecode = (msg, nsym) => {
        if (syndromes(msg, nsym)) return msg;
        const n = msg.length;
        for (let p = 0; p < n; p++) {
          for (let v = 1; v < 256; v++) {
            const t = [...msg]; t[p] ^= v;
            if (syndromes(t, nsym)) return t;
          }
        }
        return null;
      };
      const polyMod = (d, v) => {
        let r = new Int32Array(d);
        for (let i = 0; i < d.length - v.length + 1; i++) {
          if (r[i]) for (let j = 1; j < v.length; j++) r[i + j] ^= mul(v[j], r[i]);
        }
        return Array.from(r.slice(r.length - v.length + 1));
      };
      const genPoly = (n) => {
        let g = [1];
        for (let i = 0; i < n; i++) {
          g.push(0);
          for (let j = g.length - 1; j > 0; j--) g[j] = mul(g[j - 1], exp[i]) ^ g[j];
        }
        return new Int32Array(g);
      };
      return { exp, log, mul, polyEval, syndromes, rsDecode, polyMod, genPoly };
    })();

    // ==================== QR码版本表 ====================
    const VD = {
      1:  { L: [26, 19, 7],  M: [26, 16, 10], Q: [26, 13, 13], H: [26, 9, 17] },
      2:  { L: [44, 34, 10], M: [44, 28, 16], Q: [44, 22, 22], H: [44, 16, 28] },
      3:  { L: [70, 55, 15], M: [70, 44, 26], Q: [70, 34, 36], H: [70, 26, 44] },
      4:  { L: [100, 80, 20], M: [100, 64, 36], Q: [100, 48, 52], H: [100, 36, 64] },
      5:  { L: [134, 108, 26], M: [134, 86, 48], Q: [134, 62, 72], H: [134, 46, 88] },
      6:  { L: [172, 136, 36], M: [172, 108, 64], Q: [172, 76, 96], H: [172, 60, 112] },
      7:  { L: [196, 156, 40], M: [196, 124, 72], Q: [196, 88, 108], H: [196, 66, 130] },
      8:  { L: [242, 194, 48], M: [242, 154, 88], Q: [242, 110, 132], H: [242, 86, 156] },
      9:  { L: [292, 232, 60], M: [292, 182, 110], Q: [292, 132, 160], H: [292, 100, 192] },
      10: { L: [346, 274, 72], M: [346, 216, 130], Q: [346, 154, 192], H: [346, 122, 224] }
    };

    function getAlignmentLocs(v) {
      if (v === 1) return [];
      const n = Math.floor(v / 7) + 2;
      const step = Math.floor((v * 4 + 4) / (n - 1));
      const locs = [6];
      let p = v * 4 + 10;
      for (let i = 1; i < n; i++) { locs.push(p); p -= step; }
      locs.sort(function(a, b) { return a - b; });
      return locs;
    }

    // ==================== 日志工具 ====================
    const logBox = document.getElementById("logBox");
    const resultDisplay = document.getElementById("resultDisplay");

    function addLog(msg) {
      const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      logBox.innerHTML += "<span style=\"color:#666;\">[" + t + "]</span> " + msg + "\n";
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
      logBox.innerHTML = "";
      resultDisplay.textContent = "等待...";
      resultDisplay.className = "result";
    }

    // ==================== 核心生成器 ====================
    async function genQR(text, options) {
      var moduleSize = options.moduleSize || 8;
      var ecLevel = options.ecLevel || 'H';
      var removeFinders = options.removeFinders || false;
      var addLogo = options.addLogo || false;
      var logoCanvas = options.logoCanvas || null;

      addLog("🚀 === 开始生成二维码 ===");
      addLog("📝 内容: \"" + text + "\"");

      var bytes = new TextEncoder().encode(text);
      addLog("📦 步骤1: 文本 → " + bytes.length + " 字节");

      var dataBitsNeeded = 4 + 8 + bytes.length * 8;
      var targetDC = Math.ceil(dataBitsNeeded / 8);

      var v = 1;
      while (v <= 10 && VD[v][ecLevel][1] < targetDC) v++;
      if (v > 10) throw new Error("文本太长，需要版本 > 10");

      var vd = VD[v][ecLevel];
      var totalCW = vd[0], dataCW = vd[1], ecCW = vd[2];
      var sz = 17 + v * 4;

      addLog("🔢 步骤2: 版本 " + v + " | 数据:" + dataCW + " 纠错:" + ecCW);
      addLog("🔐 步骤3: 数据码字" + dataCW + " + 纠错码字" + ecCW + " = 总" + totalCW);
      addLog("📐 步骤4: " + sz + "×" + sz + " 矩阵 (初始值全-1)");

      // 构建数据位流
      var bits = [0, 1, 0, 0];
      var lenByte = bytes.length;
      for (var i = 7; i >= 0; i--) bits.push((lenByte >> i) & 1);
      for (var idx = 0; idx < bytes.length; idx++) {
        var b = bytes[idx];
        for (var j = 7; j >= 0; j--) bits.push((b >> j) & 1);
      }
      while (bits.length % 8) bits.push(0);
      while (bits.length < dataCW * 8) bits.push(0);
      bits.length = dataCW * 8;

      // 转换为数据码字
      var dc = [];
      for (var i = 0; i < bits.length; i += 8) {
        var cw = 0;
        for (var j = 0; j < 8; j++) cw = (cw << 1) | bits[i + j];
        dc.push(cw);
      }

      // 生成纠错码
      var gen = GF.genPoly(ecCW);
      var msgArr = new Int32Array(dataCW + ecCW);
      for (var i = 0; i < dc.length; i++) msgArr[i] = dc[i];
      var rem = GF.polyMod(msgArr, gen);
      var allCW = dc.concat(Array.from(rem));

      // 构建矩阵
      var m = [];
      for (var r = 0; r < sz; r++) {
        m[r] = new Int32Array(sz).fill(-1);
      }

      var alocs = getAlignmentLocs(v);

      // 放置 Timing Patterns
      for (var i = 8; i < sz - 8; i++) {
        m[6][i] = i % 2 ? 0 : 1;
        m[i][6] = i % 2 ? 0 : 1;
      }

      // 放置 Alignment Patterns
      for (var ri = 0; ri < alocs.length; ri++) {
        for (var ci = 0; ci < alocs.length; ci++) {
          var r = alocs[ri], c = alocs[ci];
          if (r === 6 && c === 6) continue;
          for (var dr = -2; dr <= 2; dr++) {
            for (var dc2 = -2; dc2 <= 2; dc2++) {
              var rr = r + dr, cc = c + dc2;
              if (rr >= 0 && rr < sz && cc >= 0 && cc < sz) {
                m[rr][cc] = (Math.abs(dr) === 2 || Math.abs(dc2) === 2 || (!dr && !dc2)) ? 1 : 0;
              }
            }
          }
        }
      }

      // 放置 Finder Patterns（如果不移除）
      if (!removeFinders) {
        var fp = [{r:0,c:0}, {r:0,c:sz-7}, {r:sz-7,c:0}];
        for (var fi = 0; fi < fp.length; fi++) {
          var fr = fp[fi].r, fc = fp[fi].c;
          for (var dr = -1; dr < 8; dr++) {
            for (var dc2 = -1; dc2 < 8; dc2++) {
              var rr = fr + dr, cc = fc + dc2;
              if (rr < 0 || rr >= sz || cc < 0 || cc >= sz) continue;
              if (dr >= 0 && dr < 7 && dc2 >= 0 && dc2 < 7) {
                if (dr === 0 || dr === 6 || dc2 === 0 || dc2 === 6) m[rr][cc] = 1;
                else if (dr >= 2 && dr <= 4 && dc2 >= 2 && dc2 <= 4) m[rr][cc] = 1;
                else m[rr][cc] = 0;
              } else {
                m[rr][cc] = 0;
              }
            }
          }
        }
      }

      // Dark Module
      m[sz - 8][8] = 1;

      addLog("🎯 步骤5: 时序+校正图案已放置" + (removeFinders ? "（跳过了定位点）" : ""));

      // 放置数据位
      var ab = [];
      for (var ai = 0; ai < allCW.length; ai++) {
        var cw = allCW[ai];
        for (var i = 7; i >= 0; i--) ab.push((cw >> i) & 1);
      }

      var bi = 0, up = true;
      for (var col = sz - 1; col >= 0; col -= 2) {
        var rc = col === 6 ? 5 : col;
        for (var row = up ? sz - 1 : 0; up ? row >= 0 : row < sz; row += up ? -1 : 1) {
          for (var c = rc; c >= rc - 1; c--) {
            if (c < 0 || c >= sz) continue;
            if (row === 6 || c === 6) continue;

            if (!removeFinders) {
              if (row < 8 && c < 8) continue;
              if (row < 8 && c >= sz - 8) continue;
              if (row >= sz - 8 && c < 8) continue;
            }

            var inAlign = false;
            for (var ari = 0; ari < alocs.length; ari++) {
              for (var aci = 0; aci < alocs.length; aci++) {
                var ar = alocs[ari], ac = alocs[aci];
                if (ar === 6 && ac === 6) continue;
                if (row >= ar - 2 && row <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                  inAlign = true; break;
                }
              }
              if (inAlign) break;
            }
            if (inAlign) continue;

            if (m[row][c] === -1) {
              m[row][c] = bi < ab.length ? ab[bi] : 0;
              bi++;
            }
          }
        }
        up = !up;
      }

      // 填充未使用区域
      for (var r = 0; r < sz; r++) {
        for (var c = 0; c < sz; c++) {
          if (m[r][c] === -1) m[r][c] = 0;
        }
      }

      addLog("📊 步骤6: 数据已填充所有位置" + (removeFinders ? "（包括原定位点区域）" : ""));

      // 应用 Mask Pattern 0
      var mk = [];
      for (var r = 0; r < sz; r++) {
        mk[r] = [];
        for (var c = 0; c < sz; c++) {
          mk[r][c] = m[r][c];
        }
      }

      for (var r = 0; r < sz; r++) {
        for (var c = 0; c < sz; c++) {
          if (r === 6 || c === 6) continue;

          if (!removeFinders) {
            if ((r < 8 && c < 8) || (r < 8 && c >= sz - 8) || (r >= sz - 8 && c < 8)) continue;
          }

          var inAlign2 = false;
          for (var ari = 0; ari < alocs.length; ari++) {
            for (var aci = 0; aci < alocs.length; aci++) {
              var ar = alocs[ari], ac = alocs[aci];
              if (ar === 6 && ac === 6) continue;
              if (r >= ar - 2 && r <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                inAlign2 = true; break;
              }
            }
            if (inAlign2) break;
          }
          if (inAlign2) continue;

          if (r === sz - 8 && c === 8) continue;

          if (!((r + c) & 1)) mk[r][c] ^= 1;
        }
      }

      addLog("🎭 步骤7: 掩码已应用");

      // 绘制二维码
      var border = 4;
      var canvasSize = (sz + border * 2) * moduleSize;
      var canvas = document.createElement("canvas");
      canvas.width = canvasSize;
      canvas.height = canvasSize;
      var ctx = canvas.getContext("2d");

      ctx.fillStyle = "#FFF";
      ctx.fillRect(0, 0, canvasSize, canvasSize);

      for (var r = 0; r < sz; r++) {
        for (var c = 0; c < sz; c++) {
          ctx.fillStyle = mk[r][c] ? "#000" : "#FFF";
          ctx.fillRect((c + border) * moduleSize, (r + border) * moduleSize, moduleSize, moduleSize);
        }
      }

      addLog("🎨 步骤8: 渲染 " + canvasSize + "×" + canvasSize + "px");

      // 添加 Logo
      if (addLogo && logoCanvas) {
        var logoSize = Math.floor(sz * moduleSize * 0.25);
        var logoX = (canvasSize - logoSize) / 2;
        var logoY = (canvasSize - logoSize) / 2;

        // 绘制白色圆角背景 - 使用兼容的 drawRoundRect
        ctx.fillStyle = "#FFF";
        drawRoundRect(ctx, logoX - moduleSize, logoY - moduleSize, logoSize + moduleSize * 2, logoSize + moduleSize * 2, moduleSize * 2);
        ctx.fill();

        // 绘制Logo
        ctx.drawImage(logoCanvas, logoX, logoY, logoSize, logoSize);

        addLog("🎯 步骤9: Logo已添加");
      }

      addLog("✅ === 完成 ===");
      addLog("📦 Base64大小: " + (canvas.toDataURL().length / 1024).toFixed(1) + "KB");
      if (removeFinders) {
        addLog("💡 三个角现在有数据像素，不再是空白");
      }

      return {
        canvas: canvas,
        version: v,
        size: sz,
        dataCW: dataCW,
        ecCW: ecCW,
        totalCW: totalCW,
        dc: dc,
        moduleSize: moduleSize,
        matrix: mk,
        alocs: alocs,
        removeFinders: removeFinders,
        hasLogo: addLogo && !!logoCanvas
      };
    }

    // ==================== 识别器 ====================
    function toGray(imageData) {
      var g = new Uint8Array(imageData.width * imageData.height);
      for (var i = 0; i < g.length; i++) {
        g[i] = Math.round(imageData.data[i * 4] * 0.299 + imageData.data[i * 4 + 1] * 0.587 + imageData.data[i * 4 + 2] * 0.114);
      }
      return { gray: g, w: imageData.width, h: imageData.height };
    }

    function toBin(g, w, h) {
      var mn = 255, mx = 0;
      for (var i = 0; i < g.length; i++) {
        if (g[i] < mn) mn = g[i];
        if (g[i] > mx) mx = g[i];
      }
      var th = mn + (mx - mn) * 0.4;
      var b = new Uint8Array(w * h);
      for (var i = 0; i < g.length; i++) {
        b[i] = g[i] < th ? 0 : 1;
      }
      return b;
    }

    function locateBySize(w, h) {
      var borders = [4, 8, 12, 16, 20, 24, 28, 32];
      var results = [];

      for (var i = 0; i < borders.length; i++) {
        var border = borders[i];
        var qrSize = Math.min(w, h) - border * 2;
        for (var v = 1; v <= 10; v++) {
          var sz = 17 + v * 4;
          var modSize = qrSize / sz;
          if (modSize >= 4 && modSize <= 20 && Math.abs(modSize - Math.round(modSize)) < 0.1) {
            results.push({ v: v, modSize: Math.round(modSize), border: border, sz: sz });
          }
        }
      }

      results.sort(function(a, b) {
        return Math.abs(a.modSize - 8) - Math.abs(b.modSize - 8);
      });
      return results;
    }

    function extractMatrix(bin, w, h, tl, modSize, sz) {
      var m = [];
      for (var r = 0; r < sz; r++) {
        m[r] = new Uint32Array(sz);
        for (var c = 0; c < sz; c++) {
          var px = Math.round(tl.x + c * modSize);
          var py = Math.round(tl.y + r * modSize);
          if (px >= 0 && px < w && py >= 0 && py < h) {
            m[r][c] = bin[py * w + px] ? 0 : 1;
          }
        }
      }
      return m;
    }

    function readBits(m, sz, alocs, hasLogo) {
      var bits = [];
      var up = true;

      var logoModules = hasLogo ? Math.floor(sz * 0.25) : 0;
      var logoStart = hasLogo ? Math.floor((sz - logoModules) / 2) : -1;
      var logoEnd = hasLogo ? logoStart + logoModules : -1;

      for (var col = sz - 1; col >= 0; col -= 2) {
        var rc = col === 6 ? 5 : col;
        for (var row = up ? sz - 1 : 0; up ? row >= 0 : row < sz; row += up ? -1 : 1) {
          for (var c = rc; c >= rc - 1; c--) {
            if (c < 0 || c >= sz) continue;
            if (row === 6 || c === 6) continue;

            var inAlign = false;
            for (var ai = 0; ai < alocs.length; ai++) {
              for (var aj = 0; aj < alocs.length; aj++) {
                var ar = alocs[ai], ac = alocs[aj];
                if (ar === 6 && ac === 6) continue;
                if (row >= ar - 2 && row <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                  inAlign = true; break;
                }
              }
              if (inAlign) break;
            }
            if (inAlign) continue;

            if (row === sz - 8 && c === 8) continue;

            if (hasLogo && row >= logoStart && row <= logoEnd && c >= logoStart && c <= logoEnd) {
              continue;
            }

            bits.push(m[row][c]);
          }
        }
        up = !up;
      }
      return bits;
    }

    function decodeFromCW(cw) {
      if (cw.length < 2) return null;
      var mode = (cw[0] >> 4) & 0xF;
      if (mode !== 4) return null;
      var count = ((cw[0] & 0xF) << 4) | ((cw[1] >> 4) & 0xF);
      if (count < 1 || count > 1000) return null;

      var allBits = "";
      for (var i = 0; i < cw.length; i++) {
        allBits += cw[i].toString(2).padStart(8, "0");
      }

      var dataStart = 12;
      var bytes = [];
      for (var i = dataStart; i + 8 <= allBits.length && bytes.length < count; i += 8) {
        bytes.push(parseInt(allBits.substring(i, i + 8), 2));
      }
      return { bytes: bytes, count: count };
    }

    function decodeBytes(bytes) {
      var b = Array.from(bytes);
      var end = b.length;
      for (var i = 0; i < b.length - 1; i++) {
        if ((b[i] === 0xEC && b[i + 1] === 0x11) || (b[i] === 0x11 && b[i + 1] === 0xEC)) {
          end = i; break;
        }
      }
      try {
        return new TextDecoder().decode(new Uint8Array(b.slice(0, end)));
      } catch (e) {
        return null;
      }
    }

    function parseQR(imageData, expectedGen) {
      var grayResult = toGray(imageData);
      var gray = grayResult.gray;
      var w = grayResult.w;
      var h = grayResult.h;
      var bin = toBin(gray, w, h);

      addLog("🚀 开始解析二维码...");

      if (expectedGen) {
        addLog("使用生成器参数直接解析");
        var modSize = expectedGen.moduleSize;
        var sz = expectedGen.size;
        var border = 4;
        var tl = { x: border * modSize, y: border * modSize };

        var m = extractMatrix(bin, w, h, tl, modSize, sz);

        var um = [];
        for (var r = 0; r < sz; r++) {
          um[r] = [];
          for (var c = 0; c < sz; c++) {
            um[r][c] = m[r][c];
          }
        }

        for (var r = 0; r < sz; r++) {
          for (var c = 0; c < sz; c++) {
            if (r === 6 || c === 6) continue;
            if (!expectedGen.removeFinders) {
              if ((r < 8 && c < 8) || (r < 8 && c >= sz - 8) || (r >= sz - 8 && c < 8)) continue;
            }
            var inAlign = false;
            for (var ai = 0; ai < expectedGen.alocs.length; ai++) {
              for (var aj = 0; aj < expectedGen.alocs.length; aj++) {
                var ar = expectedGen.alocs[ai], ac = expectedGen.alocs[aj];
                if (ar === 6 && ac === 6) continue;
                if (r >= ar - 2 && r <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                  inAlign = true; break;
                }
              }
              if (inAlign) break;
            }
            if (inAlign) continue;
            if (r === sz - 8 && c === 8) continue;
            if (!((r + c) & 1)) um[r][c] ^= 1;
          }
        }

        var bits = readBits(um, sz, expectedGen.alocs, expectedGen.hasLogo);
        var rawCW = [];
        for (var i = 0; i < expectedGen.totalCW && i * 8 < bits.length; i++) {
          var cw = 0;
          for (var j = 0; j < 8; j++) cw = (cw << 1) | bits[i * 8 + j];
          rawCW.push(cw);
        }

        var fixed = GF.rsDecode(new Int32Array(rawCW), expectedGen.ecCW);
        var allCW = fixed ? Array.from(fixed) : rawCW;
        var dataCW = allCW.slice(0, expectedGen.dataCW);

        var decoded = decodeFromCW(dataCW);
        if (decoded) {
          var text = decodeBytes(decoded.bytes);
          if (text) {
            addLog("✅ 解析成功: " + text);
            return text;
          }
        }
      }

      addLog("尝试通过尺寸推算...");
      var sizeCandidates = locateBySize(w, h);
      addLog("找到 " + sizeCandidates.length + " 个尺寸候选");

      for (var ci = 0; ci < Math.min(3, sizeCandidates.length); ci++) {
        var cand = sizeCandidates[ci];
        addLog("尝试 v" + cand.v + " mod=" + cand.modSize + " border=" + cand.border);
        var tl2 = { x: cand.border * cand.modSize, y: cand.border * cand.modSize };
        var m2 = extractMatrix(bin, w, h, tl2, cand.modSize, cand.sz);
        var alocs2 = getAlignmentLocs(cand.v);

        for (var mask = 0; mask < 8; mask++) {
          var um2 = [];
          for (var r = 0; r < cand.sz; r++) {
            um2[r] = [];
            for (var c = 0; c < cand.sz; c++) {
              um2[r][c] = m2[r][c];
            }
          }

          for (var r = 0; r < cand.sz; r++) {
            for (var c = 0; c < cand.sz; c++) {
              if (r === 6 || c === 6) continue;
              var maskFuncs = [
                (r + c) % 2 === 0, r % 2 === 0, c % 3 === 0, (r + c) % 3 === 0,
                (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0,
                ((r * c) % 2 + (r * c) % 3) === 0,
                (((r * c) % 2 + (r * c) % 3) % 2) === 0,
                (((r + c) % 2 + (r * c) % 3) % 2) === 0
              ];
              if (maskFuncs[mask]) um2[r][c] ^= 1;
            }
          }

          var bits2 = readBits(um2, cand.sz, alocs2, false);
          var rawCW2 = [];
          var totalCW2 = VD[cand.v].H[0];
          var ecCW2 = VD[cand.v].H[2];
          for (var i = 0; i < totalCW2 && i * 8 < bits2.length; i++) {
            var cw = 0;
            for (var j = 0; j < 8; j++) cw = (cw << 1) | bits2[i * 8 + j];
            rawCW2.push(cw);
          }

          var fixed2 = GF.rsDecode(new Int32Array(rawCW2), ecCW2);
          var allCW2 = fixed2 ? Array.from(fixed2) : rawCW2;
          var dataCW2 = allCW2.slice(0, VD[cand.v].H[1]);

          var decoded2 = decodeFromCW(dataCW2);
          if (decoded2) {
            var text2 = decodeBytes(decoded2.bytes);
            if (text2) {
              addLog("✅ v" + cand.v + " mask" + mask + ": " + text2);
              return text2;
            }
          }
        }
      }

      addLog("❌ 所有尝试失败");
      return null;
    }

    // ==================== Logo 处理 ====================
    var logoImageData = null;

    function createLogoCanvas(source, size) {
      size = size || 128;
      var canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext("2d");

      ctx.fillStyle = "#FFF";
      ctx.fillRect(0, 0, size, size);

      if (typeof source === 'string' && source.indexOf('data:') === 0) {
        return new Promise(function(resolve) {
          var img = new Image();
          img.onload = function() {
            ctx.drawImage(img, 0, 0, size, size);
            resolve(canvas);
          };
          img.src = source;
        });
      } else {
        ctx.font = (size * 0.7) + "px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#000";
        ctx.fillText(source || "🌹", size / 2, size / 2);
        return Promise.resolve(canvas);
      }
    }

    // ==================== 事件绑定 ====================
    var lastGenResult = null;

    document.getElementById("logoInput").addEventListener("change", function(e) {
      var f = e.target.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        logoImageData = ev.target.result;
        var img = new Image();
        img.onload = function() {
          document.getElementById("logoPreview").innerHTML = "";
          img.style.width = "60px";
          img.style.height = "60px";
          img.style.borderRadius = "0.5rem";
          document.getElementById("logoPreview").appendChild(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(f);
    });

    document.getElementById("logoEmoji").addEventListener("input", function(e) {
      logoImageData = null;
      document.getElementById("logoPreview").textContent = e.target.value || "🌹";
    });

    document.getElementById("genBtn").addEventListener("click", async function() {
      clearLog();
      var text = document.getElementById("qrText").value.trim();
      if (!text) {
        resultDisplay.textContent = "❌ 请输入内容";
        resultDisplay.className = "result fail";
        return;
      }

      var moduleSize = parseInt(document.getElementById("moduleSize").value) || 8;
      var ecLevel = document.getElementById("ecLevel").value;
      var removeFinders = document.getElementById("removeFinders").checked;
      var addLogo = document.getElementById("addLogo").checked;

      try {
        var logoCanvas = null;
        if (addLogo) {
          var emoji = document.getElementById("logoEmoji").value || "🌹";
          logoCanvas = await createLogoCanvas(logoImageData || emoji, 128);
        }

        var gen = await genQR(text, {
          moduleSize: moduleSize,
          ecLevel: ecLevel,
          removeFinders: removeFinders,
          addLogo: addLogo,
          logoCanvas: logoCanvas
        });

        lastGenResult = gen;

        var display = document.getElementById("qrDisplay");
        display.innerHTML = "";
        display.appendChild(gen.canvas);

        var downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.style.display = "block";
        downloadBtn.onclick = function() {
          var link = document.createElement("a");
          link.download = "qrcode.png";
          link.href = gen.canvas.toDataURL();
          link.click();
          addLog("💾 已下载");
        };

        resultDisplay.textContent = "⏳ 自解析验证中...";
        resultDisplay.className = "result info";

        setTimeout(function() {
          var workCanvas = document.getElementById("workCanvas");
          workCanvas.width = gen.canvas.width;
          workCanvas.height = gen.canvas.height;
          var ctx = workCanvas.getContext("2d", { willReadFrequently: true });
          ctx.drawImage(gen.canvas, 0, 0);

          var parsed = parseQR(ctx.getImageData(0, 0, workCanvas.width, workCanvas.height), gen);
          if (parsed === text) {
            resultDisplay.textContent = "✅ 自解析成功: " + parsed;
            resultDisplay.className = "result ok";
          } else {
            resultDisplay.textContent = "⚠️ 自解析结果: " + (parsed || "失败");
            resultDisplay.className = "result fail";
          }
        }, 100);

      } catch (err) {
        resultDisplay.textContent = "❌ 错误: " + err.message;
        resultDisplay.className = "result fail";
        addLog("生成错误: " + err.message);
        console.error(err);
      }
    });

    setTimeout(function() {
      document.getElementById("genBtn").click();
    }, 500);
  </script>
</body>
