<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Tony.tu">
    <meta name="keywords" content="个人网站,弘扬正能量">
    <meta name="description" content="这是一个个人网站,弘扬正能量">
    <meta name="registration" content="网站备案号：苏ICP备2026047321号-1,公安备案号：苏公网安备32020602003916号">
    <title>首页</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="common.css">
    <style>
        .about-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            gap: 80px;
            flex-wrap: wrap;
        }
        .avatar {
            flex-shrink: 0;
        }
        .avatar canvas {
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .info {
            max-width: 400px;
        }
        .info h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        .info .email {
            font-size: 18px;
            color: var(--text);
            background: var(--light-gray);
            padding: 15px 25px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
<script src="dino-game.js"></script>
</head>
<body>

    <div id="topBarContainer"></div>

    <div class="about-container">
        <div class="avatar">
            <canvas id="avatarCanvas" width="200" height="200"></canvas>
        </div>
        <div class="info">
            <h2>关于我</h2>
            <p style="margin-bottom:20px;color:var(--gray);">一个热爱技术与生活的开发者。</p>
            <div class="email">📧 tuhonglei@yeah.net</div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // 画卡通头像
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        
        // 脸
        ctx.fillStyle = '#ffe0bd';
        ctx.beginPath();
        ctx.arc(100, 100, 80, 0, Math.PI * 2);
        ctx.fill();
        
        // 头发
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(100, 80, 70, Math.PI, 0);
        ctx.fill();
        
        // 眼睛
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(75, 90, 15, 0, Math.PI * 2);
        ctx.arc(125, 90, 15, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(80, 90, 7, 0, Math.PI * 2);
        ctx.arc(130, 90, 7, 0, Math.PI * 2);
        ctx.fill();
        
        // 嘴
        ctx.strokeStyle = '#c4334c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(100, 115, 25, 0.1, Math.PI - 0.1);
        ctx.stroke();
    </script>
</body>
</html>
