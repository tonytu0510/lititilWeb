<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页 - 李家桥</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 轮播容器 */
        #slider {
            width: 100%;
            height: calc(100vh - 50px);
            position: relative;
            overflow: hidden;
            transition: height 0.3s;
        }
        /* 小恐龙关闭时，轮播满屏 */
        #slider.full {
            height: 100vh;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.6s;
        }
        .slide.active {
            opacity: 1;
        }
        .slide canvas {
            width: 100%;
            height: 100%;
        }
        /* 左右箭头 */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            color: #fff;
            border: none;
            font-size: 30px;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 10;
            border-radius: 4px;
        }
        .arrow:hover {
            background: rgba(0,0,0,0.5);
        }
        .arrow.left {
            left: 20px;
        }
        .arrow.right {
            right: 20px;
        }
        /* 小圆点 */
        #dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        #dots span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s;
        }
        #dots span.active {
            background: #c4334c;
        }
    </style>
    <script src="dino-game.js"></script>
</head>
<body>

    <div id="topBarContainer"></div>

    <!-- 轮播区 -->
    <div id="slider">
        <div class="slide active"><canvas id="canvas1"></canvas></div>
        <div class="slide"><canvas id="canvas2"></canvas></div>
        <div class="slide"><canvas id="canvas3"></canvas></div>
        <div class="slide"><canvas id="canvas4"></canvas></div>
        <div class="slide"><canvas id="canvas5"></canvas></div>
        <div class="slide"><canvas id="canvas6"></canvas></div>
        <div class="slide"><canvas id="canvas7"></canvas></div>

        <button class="arrow left" onclick="prevSlide()">&#10094;</button>
        <button class="arrow right" onclick="nextSlide()">&#10095;</button>
        <div id="dots">
            <span class="active" onclick="goTo(0)"></span>
            <span onclick="goTo(1)"></span>
            <span onclick="goTo(2)"></span>
            <span onclick="goTo(3)"></span>
            <span onclick="goTo(4)"></span>
            <span onclick="goTo(5)"></span>
            <span onclick="goTo(6)"></span>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ==================== 轮播逻辑 ====================
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('#dots span');

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[n].classList.add('active');
            dots[n].classList.add('active');
            current = n;
        }

        function nextSlide() {
            showSlide((current + 1) % 7);
        }

        function prevSlide() {
            showSlide((current - 1 + 7) % 7);
        }

        function goTo(n) {
            showSlide(n);
        }

        // ==================== 小恐龙切换时，同步调整轮播高度 ====================
        function updateSliderHeight() {
            const dinoBar = document.getElementById('dinoBar');
            const slider = document.getElementById('slider');
            
            if (dinoBar && slider) {
                if (dinoBar.style.display === 'none') {
                    slider.classList.add('full');
                } else {
                    slider.classList.remove('full');
                }
            }
        }

        // 监听小恐龙组件的变化（使用 MutationObserver 监听 style 属性）
        const dinoBar = document.getElementById('dinoBar');
        if (dinoBar) {
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'style') {
                        updateSliderHeight();
                    }
                });
            });
            observer.observe(dinoBar, { attributes: true });
        }

        // 页面加载时初始化一次
        window.addEventListener('load', function() {
            updateSliderHeight();
            // 同时监听小恐龙图标的点击（因为 toggleDino 在 common.js 里定义）
            const dinoIcon = document.getElementById('dinoIcon');
            if (dinoIcon) {
                dinoIcon.addEventListener('click', function() {
                    // 等 toggleDino 执行完再更新高度
                    setTimeout(updateSliderHeight, 100);
                });
            }
            
            // 监听关闭按钮
            const closeBtn = document.querySelector('#dinoBar .close-btn');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    setTimeout(updateSliderHeight, 100);
                });
            }
        });

        // ==================== 7 张 Canvas 主题画 ====================
        function drawLove(canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    
    const W = canvas.width;
    const H = canvas.height;
    
    // 星空背景（深蓝到深紫渐变）
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0a0a2e');
    bgGrad.addColorStop(0.5, '#1a1a4e');
    bgGrad.addColorStop(1, '#2a1a3e');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);
    
    // 星星（随机生成，存储位置以便闪烁）
    if (!canvas._stars) {
        canvas._stars = [];
        for (let i = 0; i < 200; i++) {
            canvas._stars.push({
                x: Math.random() * W,
                y: Math.random() * H * 0.7,
                r: Math.random() * 2 + 0.5,
                alpha: Math.random(),
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleDir: 1
            });
        }
    }
    
    canvas._stars.forEach(star => {
        star.alpha += star.twinkleSpeed * star.twinkleDir;
        if (star.alpha >= 1) star.twinkleDir = -1;
        if (star.alpha <= 0.2) star.twinkleDir = 1;
        ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
    });
    
    // 月亮
    ctx.fillStyle = '#fffde7';
    ctx.beginPath();
    ctx.arc(W * 0.8, H * 0.15, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0a2e';
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.13, 55, 0, Math.PI * 2);
    ctx.fill();
    
    // 地面
    const groundGrad = ctx.createLinearGradient(0, H * 0.85, 0, H);
    groundGrad.addColorStop(0, '#1a3a1a');
    groundGrad.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H * 0.85, W, H * 0.15);
    
    // 继续画后续元素...
}

        function drawFamily(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#ffa502');
            grad.addColorStop(1, '#ff6348');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🏠', canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText('亲情', canvas.width / 2, canvas.height * 0.8);
        }

        function drawFriendship(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#1e90ff');
            grad.addColorStop(1, '#00bfff');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🤝', canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText('友情', canvas.width / 2, canvas.height * 0.8);
        }

        function drawArt(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#7b2d8b');
            grad.addColorStop(1, '#e056a0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🎨', canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText('艺术', canvas.width / 2, canvas.height * 0.8);
        }

        function drawComputer(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#2c3e50');
            grad.addColorStop(1, '#3498db');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('💻', canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText('计算机', canvas.width / 2, canvas.height * 0.8);
        }

        function drawMath(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#16a085');
            grad.addColorStop(1, '#2ecc71');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('📐', canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText('数学', canvas.width / 2, canvas.height * 0.8);
        }

        function drawEnglish(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#e67e22');
            grad.addColorStop(1, '#f1c40f');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('📖', canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText('英语', canvas.width / 2, canvas.height * 0.8);
        }

        // 初始化所有 Canvas
        function initAllCanvas() {
            drawLove(document.getElementById('canvas1'));
            drawFamily(document.getElementById('canvas2'));
            drawFriendship(document.getElementById('canvas3'));
            drawArt(document.getElementById('canvas4'));
            drawComputer(document.getElementById('canvas5'));
            drawMath(document.getElementById('canvas6'));
            drawEnglish(document.getElementById('canvas7'));
        }
        initAllCanvas();

        // 窗口缩放时重绘
        window.addEventListener('resize', initAllCanvas);
    </script>
</body>
</html>
