<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页 - 李家桥</title>
    <link rel="stylesheet" href="common.css">
    <script src="dino-game.js"></script>
    <style>
        /* 轮播容器 */
        #slider {
            width: 100%;
            height: calc(100vh - 80px);
            position: relative;
            overflow: hidden;
        }
        #slider.full {
            height: calc(100vh - 50px);
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.6s;
        }
        .slide.active {
            opacity: 1;
        }
        .slide canvas {
            width: 100%;
            height: 100%;
        }
        /* 左右箭头 */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            color: #fff;
            border: none;
            font-size: 30px;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 10;
            border-radius: 4px;
        }
        .arrow:hover {
            background: rgba(0,0,0,0.5);
        }
        .arrow.left {
            left: 20px;
        }
        .arrow.right {
            right: 20px;
        }
        /* 小圆点 */
        #dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        #dots span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s;
        }
        #dots span.active {
            background: #c4334c;
        }
    </style>
</head>
<body>

    <div id="topBarContainer"></div>

    <!-- 轮播区 -->
    <div id="slider">
        <div class="slide active"><canvas id="canvas1"></canvas></div>
        <div class="slide"><canvas id="canvas2"></canvas></div>
        <div class="slide"><canvas id="canvas3"></canvas></div>
        <div class="slide"><canvas id="canvas4"></canvas></div>
        <div class="slide"><canvas id="canvas5"></canvas></div>
        <div class="slide"><canvas id="canvas6"></canvas></div>
        <div class="slide"><canvas id="canvas7"></canvas></div>

        <button class="arrow left" onclick="prevSlide()">&#10094;</button>
        <button class="arrow right" onclick="nextSlide()">&#10095;</button>
        <div id="dots">
            <span class="active" onclick="goTo(0)"></span>
            <span onclick="goTo(1)"></span>
            <span onclick="goTo(2)"></span>
            <span onclick="goTo(3)"></span>
            <span onclick="goTo(4)"></span>
            <span onclick="goTo(5)"></span>
            <span onclick="goTo(6)"></span>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ==================== 轮播逻辑 ====================
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('#dots span');

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[n].classList.add('active');
            dots[n].classList.add('active');
            current = n;
        }

        function nextSlide() {
            showSlide((current + 1) % 7);
        }

        function prevSlide() {
            showSlide((current - 1 + 7) % 7);
        }

        function goTo(n) {
            showSlide(n);
        }

        // ==================== 7 张 Canvas 主题画 ====================
        function drawLove(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            // 粉色渐变背景
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#ff6b81');
            grad.addColorStop(1, '#ff4757');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // 画心形
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('❤️', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('爱情', canvas.width / 2, canvas.height * 0.8);
        }

        function drawFamily(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#ffa502');
            grad.addColorStop(1, '#ff6348');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🏠', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('亲情', canvas.width / 2, canvas.height * 0.8);
        }

        function drawFriendship(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#1e90ff');
            grad.addColorStop(1, '#00bfff');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🤝', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('友情', canvas.width / 2, canvas.height * 0.8);
        }

        function drawArt(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#7b2d8b');
            grad.addColorStop(1, '#e056a0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🎨', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('艺术', canvas.width / 2, canvas.height * 0.8);
        }

        function drawComputer(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#2c3e50');
            grad.addColorStop(1, '#3498db');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('💻', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('计算机', canvas.width / 2, canvas.height * 0.8);
        }

        function drawMath(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#16a085');
            grad.addColorStop(1, '#2ecc71');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('📐', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('数学', canvas.width / 2, canvas.height * 0.8);
        }

        function drawEnglish(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#e67e22');
            grad.addColorStop(1, '#f1c40f');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${canvas.height * 0.3}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('📖', canvas.width / 2, canvas.height / 2 + canvas.height * 0.1);
            ctx.font = `${canvas.height * 0.06}px 'Microsoft YaHei'`;
            ctx.fillText('英语', canvas.width / 2, canvas.height * 0.8);
        }

        // 初始化所有 Canvas
        drawLove(document.getElementById('canvas1'));
        drawFamily(document.getElementById('canvas2'));
        drawFriendship(document.getElementById('canvas3'));
        drawArt(document.getElementById('canvas4'));
        drawComputer(document.getElementById('canvas5'));
        drawMath(document.getElementById('canvas6'));
        drawEnglish(document.getElementById('canvas7'));

        // 窗口缩放时重绘
        window.addEventListener('resize', function() {
            drawLove(document.getElementById('canvas1'));
            drawFamily(document.getElementById('canvas2'));
            drawFriendship(document.getElementById('canvas3'));
            drawArt(document.getElementById('canvas4'));
            drawComputer(document.getElementById('canvas5'));
            drawMath(document.getElementById('canvas6'));
            drawEnglish(document.getElementById('canvas7'));
        });
    </script>
</body>
</html>
