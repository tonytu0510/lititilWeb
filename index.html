    <title>首页</title>

    <style>
        #slider {
            width: 100%;
            height: calc(100vh - 50px);
            position: relative;
            overflow: hidden;
            transition: height 0.3s;
        }
        #slider.full {
            height: 100vh;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.6s;
        }
        .slide.active {
            opacity: 1;
        }
        .slide canvas {
            width: 100%;
            height: 100%;
        }
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            font-size: 30px;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 10;
            border-radius: 4px;
        }
        .arrow:hover {
            background: rgba(255,255,255,0.4);
        }
        .arrow.left {
            left: 20px;
        }
        .arrow.right {
            right: 20px;
        }
        #dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        #dots span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.3s;
        }
        #dots span.active {
            background: #c4334c;
        }
    </style>

        let current = 0;

        let otherTime = 2000;
        let time = indexTime
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('#dots span');

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[n].classList.add('active');
            dots[n].classList.add('active');
            current = n;
        }

        function nextSlide() {
            showSlide((current + 1) % 7);
        }
        function isIndexTime(){
	console.log('current=>',current)
           if(current == 0){
	time = indexTime
            }else{
	time = otherTime
            }
           return time;
        }

        function prevSlide() {
            showSlide((current - 1 + 7) % 7);
        }

        function goTo(n) {
            showSlide(n);
        }
        function initTimer(time){
	console.log('time=>',time)
	setTimeout(function(time){
	      nextSlide()
	      time = isIndexTime()
	      initTimer(time)
	},time)
        }
        initTimer(time)

        function updateSliderHeight() {
            const dinoBar = document.getElementById('dinoBar');
            const slider = document.getElementById('slider');
            if (dinoBar && slider) {
                if (dinoBar.style.display === 'none') {
                    slider.classList.add('full');
                } else {
                    slider.classList.remove('full');
                }
            }
        }

        const dinoBar = document.getElementById('dinoBar');
        if (dinoBar) {
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'style') {
                        updateSliderHeight();
                    }
                });
            });
            observer.observe(dinoBar, { attributes: true });
        }

        window.addEventListener('load', function() {
            updateSliderHeight();
            const dinoIcon = document.getElementById('dinoIcon');
            if (dinoIcon) {
                dinoIcon.addEventListener('click', function() {
                    setTimeout(updateSliderHeight, 100);
                });
            }
            const closeBtn = document.querySelector('#dinoBar .close-btn');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    setTimeout(updateSliderHeight, 100);
                });
            }

}
/**
 * 极速安全的图片绘制函数 (铁壁版)
 * 核心逻辑：优先使用 decode()，失败则 fallback 到 onload，并处理跨域和缓存问题
 * @param {string} url    图片路径
 * @param {number} x      画布 X 坐标
 * @param {number} y      画布 Y 坐标
 * @param {number} w      宽度
 * @param {number} h      高度
 * @param {CanvasRenderingContext2D} ctx  Canvas 上下文
 */
function drawImageSafe(url, x, y, w, h, ctx) {
    const img = new Image();

    // 关键点：如果是在线服务器（非本地 file://），且图片与 HTML 不同域，加上这行防止 Canvas 被污染
    // 如果在本地双击打开，这行可以忽略。
    img.crossOrigin = "anonymous"; 

    // 逻辑 1: 使用现代浏览器的 decode() 异步解码技术
    // 这会让浏览器在后台静默解图，绝不阻塞主线程渲染
    if (img.decode) {
        img.src = url;
        img.decode().then(() => {
            ctx.drawImage(img, x, y, w, h);
        }).catch(() => {
            // 逻辑 2: 兜底方案，如果 decode() 因为某些奇怪原因失败了，
            // 立刻退回到传统的 onload 方式
            img.onload = () => {
                ctx.drawImage(img, x, y, w, h);
            };
        });
    } else {
        // 逻辑 3: 终极兜底（针对远古浏览器）
        img.onload = () => {
            ctx.drawImage(img, x, y, w, h);
        };
        img.src = url;
    }
}
/**
 * 精细版打字机 (支持每个字独立设置大小、颜色)
 * @param {CanvasRenderingContext2D} ctx - Canvas上下文
 * @param {string} text - 显示的完整文字
 * @param {number} index - 当前显示到的字符下标
 * @param {number} startX - 起始 X 坐标
 * @param {number} startY - 起始 Y 坐标
 * @param {number} baseSize - 基础字体大小
 * @param {Array|Function} sizeMap - 每个字符的大小权重数组或计算函数
 * @param {string} color - 颜色
 */
function typewriterDrawEx(ctx, text, index, startX, startY, baseSize = 40, sizeMap = [], color = '#fff') {
    if (index === 0) return; // 还没字

    ctx.save();
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillStyle = color;

    let currentX = startX;

    // 遍历当前已经应该显示出来的所有字符
    for (let i = 0; i < Math.min(index, text.length); i++) {
        const char = text[i];

        // 计算当前这个字的实际大小
        let currentSize = baseSize;
        // 如果 sizeMap 是个数组，按索引取；如果是函数，则调用计算
        if (Array.isArray(sizeMap) && i < sizeMap.length) {
            currentSize = baseSize * sizeMap[i];
        } else if (typeof sizeMap === 'function') {
            currentSize = sizeMap(baseSize, i, char);
        }

        ctx.font = `bold ${currentSize}px '微软雅黑','Georgia', serif`;
        ctx.fillText(char, currentX, startY);

        // 更新 next X 坐标 (根据当前字符的宽度推算出下一个字的起始位)
        currentX += ctx.measureText(char).width;
    }

    // 光标逻辑 (如果有的话)
    if (index < text.length) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(currentX + 5, startY, 3, baseSize * 0.8);
    }

    ctx.restore();
}
        // ==================== Canvas 2-7: 简化版 ====================
        function drawSimpleCanvas(canvas, emoji, label, color1, color2) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, color1);
            grad.addColorStop(1, color2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.min(canvas.height * 0.3, 150)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText(emoji, canvas.width / 2, canvas.height / 2 + Math.min(canvas.height * 0.1, 50));
            ctx.font = `${Math.min(canvas.height * 0.06, 30)}px 'Microsoft YaHei'`;
            ctx.fillText(label, canvas.width / 2, canvas.height * 0.8);
        }
