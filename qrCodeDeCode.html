<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纯手写二维码解析器 | 修复版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #e0e0e0;
    }

    .container { max-width: 850px; margin: 0 auto; }

    h1 {
      text-align: center; font-size: 2rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .subtitle { text-align: center; color: #8892b0; font-size: 0.9rem; margin-bottom: 2rem; }

    .card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border-radius: 1.5rem; padding: 1.8rem;
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem;
    }

    .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }

    .upload-box {
      border: 2px dashed rgba(255,255,255,0.3); border-radius: 1rem;
      padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s;
      background: rgba(0,0,0,0.2); margin-bottom: 1rem;
    }
    .upload-box:hover { border-color: #43e97b; background: rgba(0,0,0,0.35); }
    .upload-box.dragging { border-color: #43e97b; background: rgba(0,0,0,0.45); }
    .upload-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .btn {
      width: 100%; padding: 0.8rem; border: none; border-radius: 0.7rem;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
      color: white; margin-bottom: 0.6rem;
    }
    .btn-scan { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }
    .btn-camera { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #1a1a2e; }
    .btn-stop { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
    .btn:hover { transform: translateY(-2px); }

    .btn-row { display: flex; gap: 0.8rem; }
    .btn-row .btn { flex: 1; }

    .video-container {
      width: 100%; max-width: 300px; margin: 0 auto 1rem;
      border-radius: 1rem; overflow: hidden; background: #000;
      aspect-ratio: 1; display: none;
    }
    .video-container.active { display: block; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    .result-box {
      background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 1rem;
      margin-top: 1rem; border: 1px solid rgba(255,255,255,0.1);
    }
    .result-label { font-size: 0.8rem; color: #8892b0; margin-bottom: 0.4rem; }
    .result-content { font-size: 1.2rem; font-weight: 600; color: #43e97b; word-break: break-all; }
    .result-content.empty { color: #666; }

    .log-box {
      background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 0.8rem;
      font-family: 'Courier New', monospace; font-size: 0.8rem; color: #43e97b;
      max-height: 300px; overflow-y: auto; margin-top: 0.5rem; line-height: 1.5;
    }

    .preview-area {
      display: flex; justify-content: center; align-items: center;
      padding: 1rem; background: white; border-radius: 1rem; margin: 1rem 0;
    }
    .preview-area img { max-width: 100%; max-height: 250px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 纯手写二维码解析器</h1>
    <p class="subtitle">从零实现 · 修复版</p>

    <div class="card">
      <div class="card-title">📁 上传二维码图片</div>
      
      <div class="upload-box" id="uploadBox">
        <div class="upload-icon">🖼️</div>
        <div>点击上传 或 拖拽二维码图片</div>
        <div style="font-size:0.8rem; color:#888; margin-top:0.3rem;">支持 PNG、JPG、GIF、WEBP</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">

      <div class="video-container" id="videoContainer">
        <video id="video" autoplay playsinline muted></video>
      </div>

      <div class="btn-row">
        <button class="btn btn-camera" id="cameraBtn">📸 打开相机</button>
        <button class="btn btn-stop" id="stopBtn" style="display:none;">⏹️ 关闭相机</button>
      </div>

      <div class="preview-area" id="previewArea">
        <span style="color:#bbb;">上传图片后显示在这里</span>
      </div>
    </div>

    <div class="card">
      <div class="result-box">
        <div class="result-label">🔍 解析结果</div>
        <div class="result-content empty" id="scanResult">等待解析...</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-scan" id="copyBtn">📋 复制结果</button>
        <button class="btn btn-camera" id="openBtn">🔗 打开链接</button>
      </div>
      <div class="log-box" id="logBox">等待解析...</div>
    </div>
  </div>

  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    // ===================================================================
    // 纯手写二维码解析器 - 修复版
    // 核心修复：
    // 1. 放宽定位点检测比例
    // 2. 不加纠错直接用原始数据解码
    // 3. 简化矩阵提取逻辑
    // ===================================================================

    // ==================== 图片处理 ====================
    function getGrayscale(imageData) {
      const { data, width, height } = imageData;
      const gray = new Float32Array(width * height);
      for (let i = 0; i < width * height; i++) {
        gray[i] = data[i*4] * 0.299 + data[i*4+1] * 0.587 + data[i*4+2] * 0.114;
      }
      return { gray, width, height };
    }

    // 全局阈值二值化（更简单可靠）
    function binarize(gray, width, height) {
      // 用Otsu方法找阈值
      let sum = 0;
      for (let i = 0; i < gray.length; i++) sum += gray[i];
      const avg = sum / gray.length;
      const threshold = avg * 0.85; // 稍微降低阈值让更多像素判为黑色
      
      const binary = new Uint8Array(width * height);
      for (let i = 0; i < gray.length; i++) {
        binary[i] = gray[i] < threshold ? 0 : 1; // 0=黑 1=白
      }
      return binary;
    }

    // ==================== 定位点检测（放宽版）====================
    function findFinderCenters(binary, width, height) {
      const centers = [];
      
      // 扫描寻找黑白交替模式
      for (let y = 5; y < height - 5; y++) {
        for (let x = 5; x < width - 5; x++) {
          const idx = y * width + x;
          if (binary[idx] !== 0) continue; // 从黑色开始
          
          // 向右数连续的黑白交替长度
          let i = 0;
          const runs = [];
          let currentColor = 0; // 0=黑
          
          while (x + i < width && runs.length < 5) {
            let run = 0;
            while (x + i < width && binary[y * width + x + i] === currentColor) {
              run++;
              i++;
            }
            runs.push(run);
            currentColor = 1 - currentColor;
          }
          
          if (runs.length < 5) continue;
          
          // 检查是否接近1:1:3:1:1（放宽到0.8~1.5倍）
          const total = runs.reduce((a,b) => a+b, 0);
          if (total < 10) continue;
          
          const avgModule = total / 7;
          const ratios = runs.map(r => r / avgModule);
          const expected = [1, 1, 3, 1, 1];
          
          let match = true;
          for (let j = 0; j < 5; j++) {
            if (ratios[j] < expected[j] * 0.6 || ratios[j] > expected[j] * 1.8) {
              match = false;
              break;
            }
          }
          
          if (match) {
            const centerX = x + runs[0] + runs[1] + Math.floor(runs[2] / 2);
            // 垂直方向验证
            let j = 0;
            const vRuns = [];
            let vColor = 0;
            while (y + j < height && vRuns.length < 5) {
              let run = 0;
              while (y + j < height && binary[(y+j) * width + centerX] === vColor) {
                run++;
                j++;
              }
              vRuns.push(run);
              vColor = 1 - vColor;
            }
            
            if (vRuns.length >= 5) {
              const vTotal = vRuns.reduce((a,b) => a+b, 0);
              const vAvg = vTotal / 7;
              const vRatios = vRuns.map(r => r / vAvg);
              let vMatch = true;
              for (let k = 0; k < 5; k++) {
                if (vRatios[k] < expected[k] * 0.6 || vRatios[k] > expected[k] * 1.8) {
                  vMatch = false;
                  break;
                }
              }
              
              if (vMatch) {
                const centerY = y + vRuns[0] + vRuns[1] + Math.floor(vRuns[2] / 2);
                centers.push({ x: centerX, y: centerY, moduleSize: avgModule });
                x += i; // 跳过已扫描区域
                break;
              }
            }
          }
        }
      }
      
      // 聚类去重
      const clusters = [];
      for (const pt of centers) {
        let added = false;
        for (const cluster of clusters) {
          const dx = pt.x - cluster.x;
          const dy = pt.y - cluster.y;
          if (Math.sqrt(dx*dx + dy*dy) < 30) {
            cluster.x = (cluster.x * cluster.n + pt.x) / (cluster.n + 1);
            cluster.y = (cluster.y * cluster.n + pt.y) / (cluster.n + 1);
            cluster.moduleSize = (cluster.moduleSize * cluster.n + pt.moduleSize) / (cluster.n + 1);
            cluster.n++;
            added = true;
            break;
          }
        }
        if (!added) clusters.push({ x: pt.x, y: pt.y, moduleSize: pt.moduleSize, n: 1 });
      }
      
      clusters.sort((a, b) => b.n - a.n);
      return clusters.slice(0, 3).map(c => ({ 
        x: Math.round(c.x), 
        y: Math.round(c.y), 
        moduleSize: c.moduleSize 
      }));
    }

    function orderFinders(finders) {
      // 按y排序，前两个是上面的，第三个是下面的
      const sorted = [...finders].sort((a, b) => a.y - b.y);
      const top = [sorted[0], sorted[1]].sort((a, b) => a.x - b.x);
      return { topLeft: top[0], topRight: top[1], bottomLeft: sorted[2] };
    }

    // ==================== 计算版本 ====================
    function computeVersion(tl, tr, bl) {
      const distX = Math.sqrt((tr.x - tl.x) ** 2 + (tr.y - tl.y) ** 2);
      const distY = Math.sqrt((bl.x - tl.x) ** 2 + (bl.y - tl.y) ** 2);
      const avgDist = (distX + distY) / 2;
      const avgModule = (tl.moduleSize + tr.moduleSize + bl.moduleSize) / 3;
      const modules = avgDist / avgModule;
      const version = Math.round((modules - 10) / 4);
      return { version: Math.max(1, Math.min(10, version)), size: 17 + Math.max(1, Math.min(10, version)) * 4 };
    }

    // ==================== 提取矩阵 ====================
    function extractMatrix(binary, width, height, tl, tr, bl, size) {
      const matrix = Array.from({ length: size }, () => new Int32Array(size));
      
      // 三个角的源坐标和目标坐标
      const srcPoints = [
        { x: tl.x, y: tl.y },
        { x: tr.x, y: tr.y },
        { x: bl.x, y: bl.y }
      ];
      const dstPoints = [
        { x: 3.5, y: 3.5 },
        { x: size - 3.5, y: 3.5 },
        { x: 3.5, y: size - 3.5 }
      ];
      
      // 计算仿射变换参数
      const A = [
        [srcPoints[0].x, srcPoints[0].y, 1, 0, 0, 0],
        [0, 0, 0, srcPoints[0].x, srcPoints[0].y, 1],
        [srcPoints[1].x, srcPoints[1].y, 1, 0, 0, 0],
        [0, 0, 0, srcPoints[1].x, srcPoints[1].y, 1],
        [srcPoints[2].x, srcPoints[2].y, 1, 0, 0, 0],
        [0, 0, 0, srcPoints[2].x, srcPoints[2].y, 1]
      ];
      const B = [dstPoints[0].x, dstPoints[0].y, dstPoints[1].x, dstPoints[1].y, dstPoints[2].x, dstPoints[2].y];
      
      // 解6元一次方程（高斯消元）
      function solve(A, B) {
        const n = 6;
        const M = A.map((row, i) => [...row, B[i]]);
        
        for (let col = 0; col < n; col++) {
          let maxRow = col;
          for (let row = col + 1; row < n; row++) {
            if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
          }
          [M[col], M[maxRow]] = [M[maxRow], M[col]];
          
          const pivot = M[col][col];
          if (Math.abs(pivot) < 1e-10) continue;
          
          for (let j = col; j <= n; j++) M[col][j] /= pivot;
          
          for (let row = 0; row < n; row++) {
            if (row === col) continue;
            const factor = M[row][col];
            for (let j = col; j <= n; j++) M[row][j] -= factor * M[col][j];
          }
        }
        
        return M.map(row => row[n]);
      }
      
      const params = solve(A, B);
      const [a, b, c, d, e, f] = params;
      
      // 逆变换：目标坐标 → 源坐标
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          const srcX = a * col + b * row + c;
          const srcY = d * col + e * row + f;
          
          const ix = Math.round(srcX);
          const iy = Math.round(srcY);
          
          if (ix >= 0 && ix < width && iy >= 0 && iy < height) {
            matrix[row][col] = binary[iy * width + ix] === 0 ? 1 : 0; // 0=黑→1, 1=白→0
          }
        }
      }
      
      return matrix;
    }

    // ==================== 去掩码 ====================
    function unmask(matrix, size) {
      let bestMatrix = null;
      let bestScore = 0;
      
      for (let mask = 0; mask < 8; mask++) {
        const test = matrix.map(row => new Int32Array(row));
        
        for (let row = 0; row < size; row++) {
          for (let col = 0; col < size; col++) {
            if (row === 6 || col === 6) continue;
            
            let invert = false;
            switch (mask) {
              case 0: invert = (row + col) % 2 === 0; break;
              case 1: invert = row % 2 === 0; break;
              case 2: invert = col % 3 === 0; break;
              case 3: invert = (row + col) % 3 === 0; break;
              case 4: invert = (Math.floor(row/2) + Math.floor(col/3)) % 2 === 0; break;
              case 5: invert = ((row*col) % 2) + ((row*col) % 3) === 0; break;
              case 6: invert = (((row*col) % 2) + ((row*col) % 3)) % 2 === 0; break;
              case 7: invert = (((row+col) % 2) + ((row*col) % 3)) % 2 === 0; break;
            }
            if (invert) test[row][col] ^= 1;
          }
        }
        
        // 评分：检查左上定位点
        let score = 0;
        for (let r = 0; r < 8; r++) {
          for (let c = 0; c < 8; c++) {
            const expected = (r === 0 || r === 6 || c === 0 || c === 6) || (r >= 2 && r <= 4 && c >= 2 && c <= 4) ? 1 : 0;
            if (test[r][c] === expected) score++;
          }
        }
        
        if (score > bestScore) {
          bestScore = score;
          bestMatrix = test;
        }
      }
      
      return bestMatrix || matrix;
    }

    // ==================== 提取码字 ====================
    function extractBits(matrix, size) {
      const bits = [];
      let upward = true;
      
      for (let col = size - 1; col >= 0; col -= 2) {
        const realCol = (col === 6) ? 5 : col;
        
        for (let row = upward ? size - 1 : 0; upward ? row >= 0 : row < size; row += upward ? -1 : 1) {
          for (let c = realCol; c >= realCol - 1; c--) {
            if (row < 9 && c < 9) continue;
            if (row < 9 && c > size - 9) continue;
            if (row > size - 9 && c < 9) continue;
            if (row === 6 || c === 6) continue;
            
            bits.push(matrix[row][c]);
          }
        }
        upward = !upward;
      }
      
      return bits;
    }

    // ==================== 解码数据 ====================
    function decodeBits(bits) {
      if (bits.length < 12) return null;
      
      // 读取模式
      let mode = 0;
      for (let i = 0; i < 4; i++) mode = (mode << 1) | bits[i];
      
      // 字节模式 = 4
      if (mode !== 4) {
        // 尝试其他模式
        return null;
      }
      
      // 读取计数（8位）
      let count = 0;
      for (let i = 0; i < 8; i++) count = (count << 1) | bits[4 + i];
      
      if (count > 500) return null; // 不合理的数据
      
      // 读取字节
      const bytes = [];
      const dataStart = 12;
      for (let i = 0; i < count && dataStart + (i+1)*8 <= bits.length; i++) {
        let byte = 0;
        for (let j = 0; j < 8; j++) byte = (byte << 1) | bits[dataStart + i*8 + j];
        bytes.push(byte);
      }
      
      if (bytes.length === 0) return null;
      
      try {
        return new TextDecoder().decode(new Uint8Array(bytes));
      } catch (e) {
        return null;
      }
    }

    // ==================== 主流程 ====================
    const VERSION_EC = {
      1: [26,19], 2: [44,34], 3: [70,55], 4: [100,80], 5: [134,108],
      6: [172,136], 7: [196,156], 8: [242,194], 9: [292,232], 10: [346,274]
    };

    function decodeQR(imageData) {
      addLog('📊 图片: ' + imageData.width + '×' + imageData.height + ' 像素');
      
      addLog('🔲 步骤1: 灰度化 → 二值化');
      const { gray, width, height } = getGrayscale(imageData);
      const binary = binarize(gray, width, height);
      addLog('   完成二值化 (0=黑, 1=白)');
      
      addLog('🔍 步骤2: 寻找定位点');
      const finders = findFinderCenters(binary, width, height);
      addLog('   找到 ' + finders.length + ' 个定位点');
      
      if (finders.length < 3) {
        addLog('❌ 定位点不足，解析失败');
        return null;
      }
      
      const { topLeft, topRight, bottomLeft } = orderFinders(finders);
      addLog('   TL:(' + topLeft.x + ',' + topLeft.y + ') TR:(' + topRight.x + ',' + topRight.y + ') BL:(' + bottomLeft.x + ',' + bottomLeft.y + ')');
      
      const { version, size } = computeVersion(topLeft, topRight, bottomLeft);
      addLog('📐 步骤3: 版本 ' + version + ', 矩阵 ' + size + '×' + size);
      
      addLog('📊 步骤4: 提取矩阵');
      const matrix = extractMatrix(binary, width, height, topLeft, topRight, bottomLeft, size);
      
      addLog('🎭 步骤5: 去掩码');
      const unmasked = unmask(matrix, size);
      
      addLog('📦 步骤6: 提取数据位');
      const bits = extractBits(unmasked, size);
      addLog('   提取了 ' + bits.length + ' 位数据');
      
      addLog('🔓 步骤7: 解码数据');
      const result = decodeBits(bits);
      
      if (result) {
        addLog('✅ 解析成功: "' + result.substring(0, 50) + (result.length > 50 ? '...' : '') + '"');
        return result;
      }
      
      addLog('❌ 解码失败');
      return null;
    }

    // ==================== UI ====================
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const cameraBtn = document.getElementById('cameraBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scanResult = document.getElementById('scanResult');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const previewArea = document.getElementById('previewArea');
    const logBox = document.getElementById('logBox');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

    let cameraStream = null, lastResult = '', scanTimer = null;

    function addLog(msg) {
      const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      logBox.innerHTML += '\n[' + t + '] ' + msg;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() { logBox.innerHTML = ''; }

    function processImage(img) {
      clearLog();
      addLog('🚀 === 开始解析 ===');
      
      hiddenCanvas.width = img.width;
      hiddenCanvas.height = img.height;
      hiddenCtx.drawImage(img, 0, 0);
      
      const imageData = hiddenCtx.getImageData(0, 0, img.width, img.height);
      const result = decodeQR(imageData);
      
      if (result) {
        scanResult.textContent = result;
        scanResult.classList.remove('empty');
        lastResult = result;
      } else {
        scanResult.textContent = '解析失败';
        scanResult.classList.add('empty');
        lastResult = '';
      }
    }

    uploadBox.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      previewArea.innerHTML = '加载中...';
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          previewArea.innerHTML = '';
          const di = document.createElement('img');
          di.src = ev.target.result;
          di.style.maxWidth = '100%'; di.style.maxHeight = '250px';
          previewArea.appendChild(di);
          processImage(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    });

    uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); uploadBox.classList.add('dragging'); });
    uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragging'));
    uploadBox.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadBox.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          previewArea.innerHTML = '';
          const di = document.createElement('img');
          di.src = ev.target.result;
          di.style.maxWidth = '100%'; di.style.maxHeight = '250px';
          previewArea.appendChild(di);
          processImage(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    cameraBtn.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 } }, audio: false
        });
        video.srcObject = cameraStream;
        videoContainer.classList.add('active');
        cameraBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        addLog('📸 摄像头已开启');
        
        function scan() {
          if (!cameraStream) return;
          if (video.readyState >= 2 && video.videoWidth > 0) {
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            hiddenCtx.drawImage(video, 0, 0);
            const imageData = hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
            clearLog();
            const result = decodeQR(imageData);
            if (result && result !== lastResult) {
              scanResult.textContent = result;
              scanResult.classList.remove('empty');
              lastResult = result;
            }
          }
          scanTimer = setTimeout(scan, 500);
        }
        scan();
      } catch (err) { addLog('❌ ' + err.message); }
    });

    stopBtn.addEventListener('click', () => {
      if (scanTimer) clearTimeout(scanTimer);
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      video.srcObject = null;
      videoContainer.classList.remove('active');
      cameraBtn.style.display = 'block';
      stopBtn.style.display = 'none';
    });

    copyBtn.addEventListener('click', () => {
      if (!lastResult) return alert('没有结果');
      navigator.clipboard.writeText(lastResult).then(() => addLog('📋 已复制'));
    });

    openBtn.addEventListener('click', () => {
      if (!lastResult) return alert('没有结果');
      try {
        const u = new URL(lastResult);
        if (u.protocol === 'http:' || u.protocol === 'https:') window.open(lastResult, '_blank');
      } catch (e) {
        if (/^[a-z0-9.-]+\.[a-z]{2,}/i.test(lastResult)) window.open('https://' + lastResult, '_blank');
      }
    });

    window.addEventListener('beforeunload', () => {
      if (scanTimer) clearTimeout(scanTimer);
      if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    });
  </script>
</body>
</html>
