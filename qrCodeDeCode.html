<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码自测工具 | 生成→解析→验证</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 2rem 1rem; color: #e0e0e0; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; }
    .test-row { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .test-item { flex: 1; min-width: 200px; }
    .test-item label { display: block; font-size: 0.8rem; color: #8892b0; margin-bottom: 0.3rem; }
    .test-item input { width: 100%; padding: 0.6rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 0.5rem; background: rgba(0,0,0,0.3); color: #e0e0e0; font-size: 0.9rem; }
    .btn { padding: 0.8rem 2rem; border: none; border-radius: 0.7rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: white; background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }
    .btn:hover { transform: translateY(-2px); }
    .result-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .result-col { flex: 1; min-width: 250px; }
    .mini-qr { display: flex; justify-content: center; padding: 1rem; background: white; border-radius: 0.7rem; }
    .mini-qr canvas { max-width: 150px; }
    .log-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 0.8rem; font-family: 'Courier New', monospace; font-size: 0.75rem; max-height: 400px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4; }
    .log-box .ok { color: #43e97b; }
    .log-box .fail { color: #ff6b6b; }
    .log-box .info { color: #4facfe; }
    .log-box .warn { color: #f093fb; }
    .status { font-size: 2rem; text-align: center; padding: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔳 二维码自测工具</h1>
    <p style="text-align:center;color:#8892b0;margin-bottom:1.5rem;">生成 → 解析 → 对比验证（打开控制台看详细日志）</p>
    
    <div class="card">
      <div class="test-row">
        <div class="test-item" style="flex:2;">
          <label>📝 测试内容</label>
          <input type="text" id="testUrl" value="https://www.lititil.com">
        </div>
        <div class="test-item">
          <label>📐 模块大小</label>
          <input type="number" id="moduleSize" value="8" min="4" max="16">
        </div>
        <div class="test-item" style="display:flex;align-items:flex-end;">
          <button class="btn" id="runTestBtn" style="width:100%;">🚀 运行测试</button>
        </div>
      </div>
    </div>
    
    <div class="result-row">
      <div class="result-col">
        <div class="card">
          <div style="font-size:0.8rem;color:#8892b0;margin-bottom:0.5rem;">🖼️ 生成的二维码</div>
          <div class="mini-qr"><div id="qrDisplay"></div></div>
        </div>
      </div>
      <div class="result-col">
        <div class="card">
          <div id="testStatus" class="status">⏳</div>
          <div style="text-align:center;font-size:0.9rem;">
            期望: <span id="expectedText" style="color:#4facfe;">-</span><br>
            解析: <span id="parsedText" style="color:#43e97b;">-</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div style="font-size:0.8rem;color:#8892b0;margin-bottom:0.5rem;">📋 运行日志</div>
      <div class="log-box" id="logBox">点击"运行测试"开始...</div>
    </div>
  </div>
  
  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    // ==================== 二维码生成器（内联）====================
    class GaloisField {
      constructor() {
        this.expTable = new Int32Array(512); this.logTable = new Int32Array(256);
        let x = 1;
        for (let i = 0; i < 255; i++) { this.expTable[i] = x; this.logTable[x] = i; x <<= 1; if (x & 0x100) x ^= 0x11D; }
        for (let i = 255; i < 512; i++) this.expTable[i] = this.expTable[i - 255];
      }
      exp(x) { return this.expTable[x]; } log(x) { return this.logTable[x]; }
      mul(a, b) { return (a===0||b===0) ? 0 : this.expTable[this.logTable[a] + this.logTable[b]]; }
    }
    const gf = new GaloisField();
    
    function polyMul(p1, p2) { const r = new Int32Array(p1.length + p2.length - 1); for (let i=0;i<p1.length;i++) for (let j=0;j<p2.length;j++) r[i+j] ^= gf.mul(p1[i], p2[j]); return r; }
    function polyMod(d, dv) { let r = new Int32Array(d); for (let i=0;i<d.length-dv.length+1;i++) { if (r[i]!==0) for (let j=1;j<dv.length;j++) r[i+j] ^= gf.mul(dv[j], r[i]); } return r.slice(r.length - dv.length + 1); }
    function genPoly(n) { let g=new Int32Array([1]); for(let i=0;i<n;i++) g=polyMul(g,new Int32Array([1,gf.exp(i)])); return g; }
    function genEC(data, n) { const g=genPoly(n); const m=new Int32Array(data.length+n); m.set(data); return Array.from(polyMod(m,g)); }
    
    const EC_INFO = {
      1:{L:[26,19,7],M:[26,16,10],Q:[26,13,13],H:[26,9,17]},2:{L:[44,34,10],M:[44,28,16],Q:[44,22,22],H:[44,16,28]},
      3:{L:[70,55,15],M:[70,44,26],Q:[70,34,36],H:[70,26,44]},4:{L:[100,80,20],M:[100,64,36],Q:[100,48,52],H:[100,36,64]},
      5:{L:[134,108,26],M:[134,86,48],Q:[134,62,72],H:[134,46,88]},6:{L:[172,136,36],M:[172,108,64],Q:[172,76,96],H:[172,60,112]},
      7:{L:[196,156,40],M:[196,124,72],Q:[196,88,108],H:[196,66,130]},8:{L:[242,194,48],M:[242,154,88],Q:[242,110,132],H:[242,86,156]},
      9:{L:[292,232,60],M:[292,182,110],Q:[292,132,160],H:[292,100,192]},10:{L:[346,274,72],M:[346,216,130],Q:[346,154,192],H:[346,122,224]}
    };
    
    function encodeData(text, dataCW) {
      const bytes = new TextEncoder().encode(text);
      const bits = []; bits.push(0,1,0,0);
      const cnt = bytes.length; for (let i=7;i>=0;i--) bits.push((cnt>>i)&1);
      for (const b of bytes) for (let i=7;i>=0;i--) bits.push((b>>i)&1);
      const term = Math.min(4, dataCW*8 - bits.length); for (let i=0;i<term;i++) bits.push(0);
      while (bits.length%8!==0) bits.push(0);
      const pads = [0xEC,0x11]; let pi=0;
      while (bits.length < dataCW*8) { const p = pads[pi%2]; for (let i=7;i>=0;i--) bits.push((p>>i)&1); pi++; }
      const cw = []; for (let i=0;i<bits.length;i+=8) { let c=0; for (let j=0;j<8;j++) c=(c<<1)|bits[i+j]; cw.push(c); }
      return cw.slice(0,dataCW);
    }
    
    function createMatrix(ver) { const sz=17+ver*4; return { m: Array.from({length:sz},()=>new Int32Array(sz).fill(-1)), sz }; }
    function placeFinder(mat, r, c) {
      for (let dr=-1;dr<=7;dr++) for (let dc=-1;dc<=7;dc++) {
        const rr=r+dr, cc=c+dc;
        if (rr>=0&&rr<mat.length&&cc>=0&&cc<mat[0].length) {
          if (dr>=0&&dr<=6&&dc>=0&&dc<=6) mat[rr][cc] = ((dr===0||dr===6||dc===0||dc===6)||(dr>=2&&dr<=4&&dc>=2&&dc<=4))?1:0;
          else mat[rr][cc]=0;
        }
      }
    }
    function placeFinders(mat,sz) { placeFinder(mat,0,0); placeFinder(mat,0,sz-7); placeFinder(mat,sz-7,0); }
    function placeTiming(mat,sz) { for(let i=8;i<sz-8;i++) { mat[6][i]=i%2===0?1:0; mat[i][6]=i%2===0?1:0; } }
    function getAlignLocs(ver) { if(ver===1)return[6];const n=Math.floor(ver/7)+2,step=Math.floor((ver*4+4)/(n-1));const l=[6];let p=ver*4+10;for(let i=1;i<n;i++){l.push(p);p-=step;}l.reverse();return l; }
    function placeAlign(mat,r,c) { for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<mat.length&&cc>=0&&cc<mat[0].length)mat[rr][cc]=(Math.abs(dr)===2||Math.abs(dc)===2||(dr===0&&dc===0))?1:0;} }
    function placeAligns(mat,sz,ver) { if(ver<2)return;const locs=getAlignLocs(ver);for(const r of locs)for(const c of locs){if(!((r<9&&c<9)||(r<9&&c>sz-9)||(r>sz-9&&c<9)))placeAlign(mat,r,c);} }
    function placeData(mat,sz,cws) { const bits=[];for(const cw of cws)for(let i=7;i>=0;i--)bits.push((cw>>i)&1);let bi=0,up=true;for(let col=sz-1;col>=0;col-=2){const rc=col===6?5:col;for(let row=up?sz-1:0;up?row>=0:row<sz;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){if(mat[row][c]===-1){mat[row][c]=bi<bits.length?bits[bi]:0;bi++;}}}up=!up;} }
    function applyMask(mat,sz,mp) { for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(r===6||c===6)continue;let inv=false;switch(mp){case 0:inv=(r+c)%2===0;break;case 1:inv=r%2===0;break;case 2:inv=c%3===0;break;case 3:inv=(r+c)%3===0;break;case 4:inv=(Math.floor(r/2)+Math.floor(c/3))%2===0;break;case 5:inv=((r*c)%2)+((r*c)%3)===0;break;case 6:inv=(((r*c)%2)+((r*c)%3))%2===0;break;case 7:inv=(((r+c)%2)+((r*c)%3))%2===0;break;}if(inv)mat[r][c]^=1;} }
    function render(mat,sz,ms,border) { const cs=(sz+border*2)*ms;const c=document.createElement('canvas');c.width=cs;c.height=cs;const ctx=c.getContext('2d');ctx.fillStyle='#FFF';ctx.fillRect(0,0,cs,cs);for(let r=0;r<sz;r++)for(let col=0;col<sz;col++){ctx.fillStyle=mat[r][col]===1?'#000':'#FFF';ctx.fillRect((col+border)*ms,(r+border)*ms,ms,ms);}return c; }
    
    function generateQR(text, moduleSize) {
      const bytes = new TextEncoder().encode(text);
      let ver=1; while(ver<=10&&EC_INFO[ver]['H'][1]<bytes.length+2) ver++;
      if(ver>10) ver=10;
      const info=EC_INFO[ver]['H'];
      const dc=encodeData(text,info[1]);
      const ec=genEC(dc,info[2]);
      const all=[...dc,...ec];
      const {m,sz}=createMatrix(ver);
      placeFinders(m,sz); placeTiming(m,sz); placeAligns(m,sz,ver);
      placeData(m,sz,all);
      let bestMask=0, bestScore=Infinity;
      for(let mask=0;mask<8;mask++) { const test=m.map(r=>new Int32Array(r));applyMask(test,sz,mask);let score=0;for(let r=0;r<sz;r++)for(let c=0;c<sz-1;c++)if(test[r][c]===test[r][c+1])score++;if(score<bestScore){bestScore=score;bestMask=mask;} }
      applyMask(m,sz,bestMask);
      return {canvas:render(m,sz,moduleSize,4), version:ver, size:sz, mask:bestMask};
    }

    // ==================== 二维码解析器（内联）====================
    function toGray(imageData) { const {data,width,height}=imageData;const gray=new Uint8Array(width*height);for(let i=0;i<width*height;i++)gray[i]=Math.round(data[i*4]*0.299+data[i*4+1]*0.587+data[i*4+2]*0.114);return{gray,width,height}; }
    function toBinary(gray,w,h) { let min=255,max=0;for(let i=0;i<gray.length;i++){if(gray[i]<min)min=gray[i];if(gray[i]>max)max=gray[i];}const thresh=min+(max-min)*0.4;const bin=new Uint8Array(w*h);for(let i=0;i<gray.length;i++)bin[i]=gray[i]<thresh?0:1;return bin; }
    function scanRow(bin,w,y){const c=[];const s=[];let cl=bin[y*w],ln=1;for(let x=1;x<w;x++){const co=bin[y*w+x];if(co===cl)ln++;else{s.push({color:cl,len:ln,startX:x-ln});cl=co;ln=1;}}s.push({color:cl,len:ln,startX:w-ln});for(let i=0;i<s.length-4;i++){const sg=s.slice(i,i+5);if(sg[0].color===0&&sg[1].color===1&&sg[2].color===0&&sg[3].color===1&&sg[4].color===0){const t=sg[0].len+sg[1].len+sg[2].len+sg[3].len+sg[4].len;const ms=t/7;const ra=sg.map(s=>s.len/ms);let ok=true;for(let j=0;j<5;j++){if(ra[j]<0.3||ra[j]>4.0){ok=false;break;}}if(ok&&ms>1.0){const cx=sg[0].startX+sg[0].len+sg[1].len+Math.floor(sg[2].len/2);c.push({x:cx,y,modSize:ms});}}}return c;}
    function findAllCandidates(bin,w,h){const a=[];for(let y=0;y<h;y+=4)a.push(...scanRow(bin,w,y));return a;}
    function clusterCandidates(cs,gs){const g={};for(const p of cs){const k=Math.floor(p.x/gs)+','+Math.floor(p.y/gs);if(!g[k])g[k]={pts:[],sx:0,sy:0,sm:0};g[k].pts.push(p);g[k].sx+=p.x;g[k].sy+=p.y;g[k].sm+=p.modSize;}const cells=Object.values(g).filter(c=>c.pts.length>=3);const m=[];for(let i=0;i<cells.length;i++){let cx=cells[i].sx/cells[i].pts.length,cy=cells[i].sy/cells[i].pts.length;let cm=cells[i].sm/cells[i].pts.length,count=cells[i].pts.length;let ch=true;while(ch){ch=false;for(let j=i+1;j<cells.length;j++){if(cells[j]._used)continue;const jx=cells[j].sx/cells[j].pts.length,jy=cells[j].sy/cells[j].pts.length;if(Math.abs(cx-jx)<gs*3&&Math.abs(cy-jy)<gs*3){cx=(cx*count+jx*cells[j].pts.length)/(count+cells[j].pts.length);cy=(cy*count+jy*cells[j].pts.length)/(count+cells[j].pts.length);cm=(cm*count+(cells[j].sm/cells[j].pts.length)*cells[j].pts.length)/(count+cells[j].pts.length);count+=cells[j].pts.length;cells[j]._used=true;ch=true;}}}m.push({x:Math.round(cx),y:Math.round(cy),moduleSize:cm,count});}return m.filter(x=>x.count>=5).sort((a,b)=>b.count-a.count);}
    function permutations(arr){if(arr.length<=1)return[arr];const r=[];for(let i=0;i<arr.length;i++){const rest=[...arr.slice(0,i),...arr.slice(i+1)];for(const p of permutations(rest))r.push([arr[i],...p]);}return r;}
    function extractMatrix(bin,w,h,tl,tr,bl,size){const matrix=Array.from({length:size},()=>new Uint32Array(size));const dx1=(tr.x-tl.x)/(size-7),dy1=(tr.y-tl.y)/(size-7);const dx2=(bl.x-tl.x)/(size-7),dy2=(bl.y-tl.y)/(size-7);const ox=tl.x-dx1*3.5-dx2*3.5,oy=tl.y-dy1*3.5-dy2*3.5;const sr=Math.max(1,Math.floor((tl.moduleSize+tr.moduleSize+bl.moduleSize)/9));for(let r=0;r<size;r++)for(let c=0;c<size;c++){const sx=ox+c*dx1+r*dx2,sy=oy+c*dy1+r*dy2;let black=0,total=0;for(let dy=-sr;dy<=sr;dy++)for(let dx=-sr;dx<=sr;dx++){const ix=Math.round(sx+dx),iy=Math.round(sy+dy);if(ix>=0&&ix<w&&iy>=0&&iy<h){if(bin[iy*w+ix]===0)black++;total++;}}matrix[r][c]=(total>0&&black>total*0.5)?1:0;}return matrix;}
    function readBitsStandard(matrix,size){const bits=[];let up=true;for(let col=size-1;col>=0;col-=2){const rc=col===6?5:col;for(let row=up?size-1:0;up?row>=0:row<size;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){if(c<0||c>=size)continue;if(row<9&&c<9)continue;if(row<9&&c>size-9)continue;if(row>size-9&&c<9)continue;if(row===6||c===6)continue;bits.push(matrix[row][c]);}}up=!up;}return bits;}
    function decodeBits(bits,msbFirst){if(bits.length<12)return null;let mode=0;if(msbFirst){for(let i=0;i<4;i++)mode=(mode<<1)|bits[i];}else{for(let i=0;i<4;i++)mode|=bits[i]<<i;}if(mode!==4)return null;let count=0;if(msbFirst){for(let i=0;i<8;i++)count=(count<<1)|bits[4+i];}else{for(let i=0;i<8;i++)count|=bits[4+i]<<i;}if(count<=0||count>500)return null;const ds=12,actual=Math.min(count,Math.floor((bits.length-ds)/8));if(actual<=0)return null;const bytes=[];for(let i=0;i<actual;i++){let b=0;if(msbFirst){for(let j=0;j<8;j++)b=(b<<1)|bits[ds+i*8+j];}else{for(let j=0;j<8;j++)b|=bits[ds+i*8+j]<<j;}bytes.push(b);}try{const text=new TextDecoder().decode(new Uint8Array(bytes));let printable=0;for(let i=0;i<Math.min(20,bytes.length);i++)if(bytes[i]>=0x20&&bytes[i]<=0x7E)printable++;if(text.length>0&&printable>=Math.min(20,bytes.length)*0.6)return{text,count:actual};}catch(e){}return null;}
    function tryDecode(matrix,size,readFn){for(let mask=0;mask<8;mask++){const work=matrix.map(r=>new Uint32Array(r));for(let r=0;r<size;r++)for(let c=0;c<size;c++){if(r===6||c===6)continue;let inv=false;switch(mask){case 0:inv=(r+c)%2===0;break;case 1:inv=r%2===0;break;case 2:inv=c%3===0;break;case 3:inv=(r+c)%3===0;break;case 4:inv=(Math.floor(r/2)+Math.floor(c/3))%2===0;break;case 5:inv=((r*c)%2)+((r*c)%3)===0;break;case 6:inv=(((r*c)%2)+((r*c)%3))%2===0;break;case 7:inv=(((r+c)%2)+((r*c)%3))%2===0;break;}if(inv)work[r][c]^=1;}const bits=readFn(work,size);for(const msb of[true,false]){const r=decodeBits(bits,msb);if(r)return{text:r.text,mask,msb};}}return null;}
    
    function decodeQR(imageData) {
      const logs = [];
      function log(m,t){logs.push({msg:m,type:t||'info'});console.log('['+t+']',m);}
      
      log('========== 开始解析 ==========','info');
      const {gray,width,height}=toGray(imageData);
      log('图片: '+width+'×'+height,'info');
      const bin=toBinary(gray,width,height);
      
      const candidates=findAllCandidates(bin,width,height);
      log('定位点候选: '+candidates.length,'info');
      
      if(candidates.length>=10){
        const clusters=clusterCandidates(candidates,Math.floor(width/15));
        log('有效簇: '+clusters.length,'info');
        
        if(clusters.length>=3){
          const pts=clusters.slice(0,3);
          const perms=permutations(pts);
          log('尝试'+perms.length+'种排列','info');
          
          for(let pi=0;pi<perms.length;pi++){
            const [tl,tr,bl]=perms[pi];
            const v1x=tr.x-tl.x,v1y=tr.y-tl.y,v2x=bl.x-tl.x,v2y=bl.y-tl.y;
            const dot=v1x*v2x+v1y*v2y,len1=Math.sqrt(v1x*v1x+v1y*v1y),len2=Math.sqrt(v2x*v2x+v2y*v2y);
            if(Math.abs(dot/(len1*len2))>0.3)continue;
            
            log('排列'+(pi+1)+': TL('+tl.x+','+tl.y+') TR('+tr.x+','+tr.y+') BL('+bl.x+','+bl.y+')','info');
            
            const d1=Math.sqrt((tr.x-tl.x)**2+(tr.y-tl.y)**2),d2=Math.sqrt((bl.x-tl.x)**2+(bl.y-tl.y)**2);
            const avgMod=(tl.moduleSize+tr.moduleSize+bl.moduleSize)/3;
            const ev=Math.round(((d1+d2)/2/avgMod-10)/4);
            
            for(let v=Math.max(1,ev-2);v<=Math.min(10,ev+2);v++){
              const sz=17+v*4;
              const m=extractMatrix(bin,width,height,tl,tr,bl,sz);
              
              let r=tryDecode(m,sz,readBitsStandard);
              if(r){log('✅ 成功! mask='+r.mask+' msb='+r.msb+' text='+r.text,'ok');return{text:r.text,logs};}
              
              const inv=m.map(row=>new Uint32Array(row.map(v=>v^1)));
              r=tryDecode(inv,sz,readBitsStandard);
              if(r){log('✅ 成功(反转)! mask='+r.mask+' msb='+r.msb+' text='+r.text,'ok');return{text:r.text,logs};}
            }
          }
        }
      }
      log('❌ 解析失败','fail');
      return{text:null,logs};
    }

    // ==================== 测试主流程 ====================
    function addLog(msg, type) {
      const lb = document.getElementById('logBox');
      const cls = type || 'info';
      lb.innerHTML += '<span class="' + cls + '">' + msg + '</span>\n';
      lb.scrollTop = lb.scrollHeight;
    }

    function runTest() {
      const testUrl = document.getElementById('testUrl').value.trim();
      const moduleSize = parseInt(document.getElementById('moduleSize').value) || 8;
      
      if (!testUrl) { alert('请输入测试内容'); return; }
      
      const logBox = document.getElementById('logBox');
      logBox.innerHTML = '';
      addLog('🚀 === 开始测试 ===', 'info');
      addLog('📝 测试内容: ' + testUrl, 'info');
      addLog('📐 模块大小: ' + moduleSize + 'px', 'info');
      
      document.getElementById('expectedText').textContent = testUrl;
      document.getElementById('parsedText').textContent = '-';
      document.getElementById('testStatus').textContent = '⏳';
      document.getElementById('testStatus').style.color = '#ffb86c';
      
      // 步骤1：生成二维码
      addLog('', 'info');
      addLog('--- 步骤1: 生成二维码 ---', 'info');
      
      console.log('%c========== 生成二维码 ==========', 'color:#f093fb;font-weight:bold');
      const genResult = generateQR(testUrl, moduleSize);
      addLog('✅ 版本: ' + genResult.version + ', 矩阵: ' + genResult.size + '×' + genResult.size + ', 掩码: ' + genResult.mask, 'ok');
      
      // 显示生成的二维码
      const qrDisplay = document.getElementById('qrDisplay');
      qrDisplay.innerHTML = '';
      qrDisplay.appendChild(genResult.canvas);
      
      // 步骤2：用隐藏Canvas获取ImageData
      addLog('', 'info');
      addLog('--- 步骤2: 解析二维码 ---', 'info');
      
      console.log('%c========== 解析二维码 ==========', 'color:#4facfe;font-weight:bold');
      
      const hiddenCanvas = document.getElementById('hiddenCanvas');
      hiddenCanvas.width = genResult.canvas.width;
      hiddenCanvas.height = genResult.canvas.height;
      const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
      hiddenCtx.drawImage(genResult.canvas, 0, 0);
      
      const imageData = hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
      const parseResult = decodeQR(imageData);
      
      // 步骤3：输出结果
      addLog('', 'info');
      addLog('--- 步骤3: 验证结果 ---', 'info');
      
      if (parseResult.logs) {
        parseResult.logs.forEach(l => {
          addLog('  ' + l.msg, l.type);
        });
      }
      
      if (parseResult.text) {
        document.getElementById('parsedText').textContent = parseResult.text;
        
        if (parseResult.text.trim() === testUrl.trim()) {
          addLog('', 'info');
          addLog('🎉 测试通过! 结果完全匹配!', 'ok');
          document.getElementById('testStatus').textContent = '✅ 通过';
          document.getElementById('testStatus').style.color = '#43e97b';
          console.log('%c🎉 测试通过!', 'color:#43e97b;font-weight:bold;font-size:16px');
        } else {
          addLog('', 'info');
          addLog('⚠️ 结果不匹配!', 'fail');
          addLog('  期望: ' + testUrl, 'fail');
          addLog('  实际: ' + parseResult.text, 'fail');
          document.getElementById('testStatus').textContent = '❌ 不匹配';
          document.getElementById('testStatus').style.color = '#ff6b6b';
          console.log('%c❌ 不匹配: ' + testUrl + ' vs ' + parseResult.text, 'color:#ff6b6b;font-weight:bold');
        }
      } else {
        addLog('❌ 解析失败，未获取到结果', 'fail');
        document.getElementById('testStatus').textContent = '❌ 失败';
        document.getElementById('testStatus').style.color = '#ff6b6b';
        console.log('%c❌ 解析失败', 'color:#ff6b6b;font-weight:bold');
      }
      
      console.log('%c========== 测试完成 ==========', 'color:#ffb86c;font-weight:bold');
    }

    // ==================== 事件绑定 ====================
    document.getElementById('runTestBtn').addEventListener('click', runTest);
    
    // 页面加载后自动运行一次
    setTimeout(runTest, 500);
  </script>
</body>
</html>
