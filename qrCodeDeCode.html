<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>原始数据解码测试</title>
<style>body{background:#1a1a2e;color:#e0e0e0;font-family:monospace;padding:1rem;}.log{white-space:pre-wrap;font-size:0.7rem;color:#43e97b;max-height:500px;overflow-y:auto;}</style></head>
<body>
<h2>原始数据解码测试</h2>
<div class="log" id="log"></div>
<script>
function log(msg){document.getElementById('log').innerHTML+=msg+'\n';}

// 原始23字节
const rawBytes=[0x68,0x74,0x74,0x70,0x73,0x3a,0x2f,0x2f,0x77,0x77,0x77,0x2e,0x6c,0x6e,0xae,0x5d,0x1a,0x5e,0xbd,0x1a,0x5c,0x3b,0x0b];
log('原始字节('+rawBytes.length+'): '+rawBytes.map(b=>b.toString(16).padStart(2,'0')).join(' '));
log('期望: https://www.lititil.com');
log('期望hex: '+[...'https://www.lititil.com'].map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(' '));
log('');

// ============ 方法1：转二进制，逐位偏移 ============
log('=== 方法1：二进制偏移 ===');
const allBits=rawBytes.map(b=>b.toString(2).padStart(8,'0')).join('');
log('全部二进制('+allBits.length+'位): '+allBits.match(/.{8}/g).join(' '));

// 尝试不同的位偏移（0-7位）
for(let bitShift=0;bitShift<8;bitShift++){
  const shifted=allBits.substring(bitShift);
  const bytes=[];
  for(let i=0;i+8<=shifted.length;i+=8){
    bytes.push(parseInt(shifted.substring(i,i+8),2));
  }
  const text=String.fromCharCode(...bytes.filter(b=>b>=32&&b<=126));
  log(' 位偏移'+bitShift+': '+text.substring(0,40));
}

// ============ 方法2：逐字节异或/加减找URL ============
log('\n=== 方法2：逐字节偏移到可打印ASCII ===');
const target='https://www.lititil.com';
// 前14字节是对的，第15字节开始错
log('前14字节正确: '+rawBytes.slice(0,14).map(b=>String.fromCharCode(b)).join(''));
log('第15-23字节: '+rawBytes.slice(14).map(b=>b.toString(16).padStart(2,'0')).join(' '));
log('期望第15-23: '+[...'ititil.com'].map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(' '));

// 计算每个错位字节需要的偏移
const expected=[...'ititil.com'].map(c=>c.charCodeAt(0));
const actual=rawBytes.slice(14);
log('\n逐字节偏移分析:');
for(let i=0;i<actual.length;i++){
  const diff=(expected[i]-actual[i]+256)%256;
  const xor=expected[i]^actual[i];
  log(' 位置'+(14+i)+': 实际0x'+actual[i].toString(16).padStart(2,'0')+' 期望0x'+expected[i].toString(16).padStart(2,'0')+' diff='+diff+' xor=0x'+xor.toString(16));
}

// 方法2a：逐字节异或相同值
log('\n=== 方法2a：逐字节异或 ===');
for(let xor=1;xor<256;xor++){
  const fixed=rawBytes.map(b=>b^xor);
  const text=String.fromCharCode(...fixed.filter(b=>b>=32&&b<=126));
  if(text.startsWith('https://')){log(' XOR 0x'+xor.toString(16)+': '+text);break;}
}

// 方法2b：只错位字节加diff
log('\n=== 方法2b：后半段加偏移 ===');
// 前14字节正确，后9字节需要各自的diff
const diffs=expected.map((e,i)=>(e-actual[i]+256)%256);
log('需要的偏移: '+diffs.join(' '));
// 检查是否同一个diff
const same=diffs.every(d=>d===diffs[0]);
log('所有偏移相同? '+same+' (值='+diffs[0]+')');

if(same){
  const fixed=[...rawBytes.slice(0,14),...actual.map(b=>(b+diffs[0])&0xFF)];
  const text=new TextDecoder().decode(new Uint8Array(fixed));
  log('统一偏移'+diffs[0]+': '+text);
}

// 方法2c：后半段异或同一个值
log('\n=== 方法2c：后半段异或 ===');
for(let xor=1;xor<256;xor++){
  const fixed=[...rawBytes.slice(0,14),...actual.map(b=>b^xor)];
  const text=String.fromCharCode(...fixed.filter(b=>b>=32&&b<=126));
  if(text==='https://www.lititil.com'){log(' XOR 0x'+xor.toString(16)+': '+text);break;}
}

// ============ 方法3：Unicode转换 ============
log('\n=== 方法3：Unicode转换 ===');
// 把每个字节当Unicode码点
const chars=rawBytes.map(b=>b>=32&&b<=126?String.fromCharCode(b):'['+b.toString(16)+']');
log('Unicode: '+chars.join(''));

// ============ 方法4：只取可打印字符 ============
log('\n=== 方法4：过滤可打印 ===');
const printable=rawBytes.filter(b=>b>=32&&b<=126);
log('可打印('+printable.length+'): '+String.fromCharCode(...printable));

// ============ 方法5：RS纠错 ============
log('\n=== 方法5：用RS纠错修复 ===');
// 已知: totalCW=70, dataCW=26, ecCW=44
const EXP=new Int32Array(512),LOG=new Int32Array(256);
(()=>{let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&0x100)x^=0x11D;}for(let i=255;i<512;i++)EXP[i]=EXP[i-255];})();
const gm=(a,b)=>(a&&b)?EXP[LOG[a]+LOG[b]]:0;
function peval(p,x){let y=p[0];for(let i=1;i<p.length;i++)y=gm(y,x)^p[i];return y;}

// 数据码字(26)+纠错码字(44)=70个码字
// 但我们只有前26个数据码字，需要纠错码字来修复
// 纠错码字在bits[26*8..69*8]位置
// 这里无法获取纠错码字，所以RS在当前上下文中无法直接应用

log('RS纠错需要完整的70个码字（数据+纠错），仅有前26个数据码字无法纠错');
log('需要在解析器中获取完整码字后调用RS');
</script>
</body>
</html>
