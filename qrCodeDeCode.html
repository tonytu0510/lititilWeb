<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码 v27 调试生成器</title>
  <style>
    body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; padding: 1rem; }
    .log { white-space: pre-wrap; font-size: 0.7rem; color: #43e97b; }
  </style>
</head>
<body>
  <h2>v27 调试生成器编码</h2>
  <div class="log" id="log"></div>

  <script>
    const EXP=new Int32Array(512),LOG=new Int32Array(256);
    (()=>{let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&0x100)x^=0x11D;}for(let i=255;i<512;i++)EXP[i]=EXP[i-255];})();
    const gfMul=(a,b)=>(a===0||b===0)?0:EXP[LOG[a]+LOG[b]];
    function polyMod(d,div){let r=new Int32Array(d);for(let i=0;i<d.length-div.length+1;i++){if(r[i]!==0)for(let j=1;j<div.length;j++)r[i+j]^=gfMul(div[j],r[i]);}return r.slice(r.length-div.length+1);}
    function genPoly(n){let g=[1];for(let i=0;i<n;i++){g.push(0);for(let j=g.length-1;j>0;j--)g[j]=gfMul(g[j-1],EXP[i])^g[j];}return new Int32Array(g);}
    const VD={1:[26,9,17],2:[44,16,28],3:[70,26,44]};

    function log(msg){document.getElementById('log').innerHTML+=msg+'\n';}

    const text="https://www.lititil.com";
    log('输入: '+text);
    const bytes=new TextEncoder().encode(text);
    log('UTF-8字节('+bytes.length+'): '+Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join(' '));
    
    let v=1;while(v<=10&&VD[v][1]<bytes.length+2)v++;
    const[total,data,ec]=VD[v],sz=17+v*4;
    log('版本: '+v+' total='+total+' data='+data+' ec='+ec);
    
    // 编码数据
    const bits=[0,1,0,0]; // 模式4=字节
    const cnt=bytes.length;
    for(let i=7;i>=0;i--)bits.push((cnt>>i)&1);
    log('模式=4 count='+cnt+' ('+cnt.toString(2).padStart(8,'0')+')');
    
    for(const b of bytes)for(let i=7;i>=0;i--)bits.push((b>>i)&1);
    while(bits.length%8!==0)bits.push(0);
    log('数据bits('+bits.length+'): '+bits.join('').match(/.{8}/g).join(' '));
    
    // 填充到data*8
    const origLen=bits.length;
    while(bits.length<data*8){bits.push(1,1,1,0,1,1,0,0);if(bits.length>=data*8)break;bits.push(0,0,0,1,0,0,0,1);}
    bits.length=data*8;
    log('填充后bits('+bits.length+'): 前208位(数据)='+bits.slice(0,208).join('').match(/.{8}/g).join(' '));
    if(data*8>208)log('填充位(208-'+(data*8)+'): '+bits.slice(208).join('').match(/.{8}/g).join(' '));
    
    const dc=[];
    for(let i=0;i<bits.length;i+=8){let c=0;for(let j=0;j<8;j++)c=(c<<1)|bits[i+j];dc.push(c);}
    log('数据码字('+dc.length+'): '+dc.map(c=>c.toString(16).padStart(2,'0')).join(' '));
    log('前5: '+dc.slice(0,5).map(c=>c.toString(16).padStart(2,'0')).join(' '));
    
    // 纠错
    const gen=genPoly(ec);const msg=new Int32Array(data+ec);msg.set(dc);
    const rem=Array.from(polyMod(msg,gen));
    log('纠错码字('+rem.length+'): '+rem.map(c=>c.toString(16).padStart(2,'0')).join(' '));
    
    const all=[...dc,...rem];
    log('全部码字('+all.length+'): 前5='+all.slice(0,5).map(c=>c.toString(16).padStart(2,'0')).join(' '));
    
    // 验证：解码前几个数据码字
    const firstByte=all[0];
    const mode=(firstByte>>4)&0xF;
    const countHi=(firstByte&0xF)<<4;
    const countLo=(all[1]>>4)&0xF;
    const totalCount=countHi|countLo;
    log('从码字解码: mode='+mode+' count='+totalCount);
    log('前几个数据字节: '+all.slice(0,Math.min(10,data)).map(c=>c.toString(16).padStart(2,'0')).join(' '));
  </script>
</body>
</html>
