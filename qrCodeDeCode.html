<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码解码器 · 智能修复版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 2rem 1rem; color: #e0e0e0; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 1.5rem; padding: 1.8rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; }
    .upload-box { border: 2px dashed rgba(255,255,255,0.3); border-radius: 1rem; padding: 2rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); margin-bottom: 1rem; }
    .upload-box:hover { border-color: #43e97b; }
    .btn { width: 100%; padding: 0.8rem; border: none; border-radius: 0.7rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: white; margin-bottom: 0.6rem; }
    .btn-row { display: flex; gap: 0.8rem; }
    .btn-row .btn { flex: 1; }
    .result-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 1rem; margin-top: 1rem; }
    .result-content { font-size: 1.2rem; font-weight: 600; color: #43e97b; word-break: break-all; min-height: 1.5rem; }
    .result-content.empty { color: #666; }
    .log-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 0.8rem; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #43e97b; max-height: 350px; overflow-y: auto; margin-top: 0.5rem; white-space: pre-wrap; }
    .preview-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 1rem; background: white; border-radius: 1rem; margin: 1rem 0; min-height: 100px; align-items: center; }
    .video-container { width: 100%; max-width: 300px; margin: 0 auto 1rem; border-radius: 1rem; overflow: hidden; background: #000; aspect-ratio: 1; display: none; }
    .video-container.active { display: block; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .fix-badge {
      display: inline-block;
      background: rgba(255, 200, 50, 0.15);
      border-left: 4px solid #ffcc33;
      padding: 0.3rem 0.8rem;
      border-radius: 0.4rem;
      font-size: 0.8rem;
      color: #ffdd77;
      margin-top: 0.5rem;
      word-break: break-all;
    }
    .url-badge {
      display: inline-block;
      background: rgba(67, 233, 123, 0.15);
      border-left: 4px solid #43e97b;
      padding: 0.3rem 0.8rem;
      border-radius: 0.4rem;
      font-size: 0.9rem;
      color: #a8f0c0;
      margin-top: 0.5rem;
      word-break: break-all;
    }
    .url-badge a { color: #43e97b; text-decoration: underline; }
    .hex-dump {
      background: rgba(0,0,0,0.5);
      border-radius: 0.4rem;
      padding: 0.5rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 0.5rem;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="container">
    <h1>📷 二维码解码器 · 智能修复版</h1>
    <p style="text-align:center;color:#8892b0;margin-bottom:1.5rem;">自动尝试多种读取偏移 · 修复乱码问题</p>
    <div class="card">
      <div class="upload-box" id="uploadBox">
        <div style="font-size:3rem;">🖼️</div>
        <div>点击上传 或 拖拽二维码图片</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <div class="video-container" id="videoContainer"><video id="video" autoplay playsinline muted></video></div>
      <div class="btn-row">
        <button class="btn" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" id="cameraBtn">📸 打开相机</button>
        <button class="btn" style="background:linear-gradient(135deg,#ff6b6b,#ee5a24);display:none;" id="stopBtn">⏹️ 关闭</button>
      </div>
      <div class="preview-area" id="previewArea"><span style="color:#bbb;">预览</span></div>
    </div>
    <div class="card">
      <div class="result-box">
        <div style="font-size:0.8rem;color:#8892b0;">🔍 解析结果</div>
        <div class="result-content empty" id="scanResult">等待解析...</div>
        <div id="badgeContainer"></div>
        <div id="hexDumpContainer"></div>
      </div>
      <div class="btn-row">
        <button class="btn" style="background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e;" id="copyBtn">📋 复制</button>
        <button class="btn" style="background:linear-gradient(135deg,#f093fb,#f5576c);" id="openBtn">🔗 打开</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    // ==================== 图像处理 ====================
    function toGray(imageData) {
      const { data, width, height } = imageData;
      const gray = new Uint8Array(width * height);
      for (let i = 0; i < width * height; i++) {
        gray[i] = Math.round(data[i*4]*0.299 + data[i*4+1]*0.587 + data[i*4+2]*0.114);
      }
      return { gray, width, height };
    }

    function toBinary(gray, width, height) {
      let min = 255, max = 0;
      for (let i = 0; i < gray.length; i++) {
        if (gray[i] < min) min = gray[i];
        if (gray[i] > max) max = gray[i];
      }
      const thresh = min + (max - min) * 0.4;
      const bin = new Uint8Array(width * height);
      for (let i = 0; i < gray.length; i++) bin[i] = gray[i] < thresh ? 0 : 1;
      return bin;
    }

    // ==================== 定位点扫描 ====================
    function scanRow(bin, width, y) {
      const candidates = [];
      const segments = [];
      let curColor = bin[y * width], curLen = 1;
      for (let x = 1; x < width; x++) {
        const color = bin[y * width + x];
        if (color === curColor) curLen++;
        else { segments.push({ color: curColor, len: curLen, startX: x - curLen }); curColor = color; curLen = 1; }
      }
      segments.push({ color: curColor, len: curLen, startX: width - curLen });
      for (let i = 0; i < segments.length - 4; i++) {
        const s = segments.slice(i, i + 5);
        if (s[0].color===0 && s[1].color===1 && s[2].color===0 && s[3].color===1 && s[4].color===0) {
          const total = s[0].len + s[1].len + s[2].len + s[3].len + s[4].len;
          const modSize = total / 7;
          const ratios = s.map(seg => seg.len / modSize);
          let ok = true;
          for (let j = 0; j < 5; j++) { if (ratios[j] < 0.3 || ratios[j] > 4.0) { ok = false; break; } }
          if (ok && modSize > 1.0) {
            const cx = s[0].startX + s[0].len + s[1].len + Math.floor(s[2].len / 2);
            candidates.push({ x: cx, y, modSize });
          }
        }
      }
      return candidates;
    }

    function findAllCandidates(bin, width, height) {
      const all = [];
      for (let y = 0; y < height; y += 4) all.push(...scanRow(bin, width, y));
      return all;
    }

    function clusterCandidates(candidates, gridSize) {
      const grid = {};
      for (const pt of candidates) {
        const key = Math.floor(pt.x/gridSize) + ',' + Math.floor(pt.y/gridSize);
        if (!grid[key]) grid[key] = { pts: [], sx: 0, sy: 0, sm: 0 };
        grid[key].pts.push(pt); grid[key].sx += pt.x; grid[key].sy += pt.y; grid[key].sm += pt.modSize;
      }
      const cells = Object.values(grid).filter(c => c.pts.length >= 3);
      const merged = [];
      for (let i = 0; i < cells.length; i++) {
        let cx = cells[i].sx/cells[i].pts.length, cy = cells[i].sy/cells[i].pts.length;
        let cm = cells[i].sm/cells[i].pts.length, count = cells[i].pts.length;
        let changed = true;
        while (changed) {
          changed = false;
          for (let j = i+1; j < cells.length; j++) {
            if (cells[j]._used) continue;
            const jx = cells[j].sx/cells[j].pts.length, jy = cells[j].sy/cells[j].pts.length;
            if (Math.abs(cx-jx) < gridSize*3 && Math.abs(cy-jy) < gridSize*3) {
              cx = (cx*count + jx*cells[j].pts.length)/(count + cells[j].pts.length);
              cy = (cy*count + jy*cells[j].pts.length)/(count + cells[j].pts.length);
              cm = (cm*count + (cells[j].sm/cells[j].pts.length)*cells[j].pts.length)/(count + cells[j].pts.length);
              count += cells[j].pts.length; cells[j]._used = true; changed = true;
            }
          }
        }
        merged.push({ x: Math.round(cx), y: Math.round(cy), moduleSize: cm, count });
      }
      return merged.filter(m => m.count >= 5).sort((a,b) => b.count - a.count);
    }

    function permutations(arr) {
      if (arr.length <= 1) return [arr];
      const result = [];
      for (let i = 0; i < arr.length; i++) {
        const rest = [...arr.slice(0,i), ...arr.slice(i+1)];
        for (const perm of permutations(rest)) result.push([arr[i], ...perm]);
      }
      return result;
    }

    // ==================== 矩阵提取 ====================
    function extractMatrix(bin, width, height, tl, tr, bl, size) {
      const matrix = Array.from({ length: size }, () => new Uint32Array(size));
      const dx1 = (tr.x - tl.x) / (size - 7);
      const dy1 = (tr.y - tl.y) / (size - 7);
      const dx2 = (bl.x - tl.x) / (size - 7);
      const dy2 = (bl.y - tl.y) / (size - 7);
      const offsetX = tl.x - dx1 * 3.5 - dx2 * 3.5;
      const offsetY = tl.y - dy1 * 3.5 - dy2 * 3.5;
      const sampleR = Math.max(1, Math.floor((tl.moduleSize + tr.moduleSize + bl.moduleSize) / 9));
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          const sx = offsetX + col * dx1 + row * dx2;
          const sy = offsetY + col * dy1 + row * dy2;
          let black = 0, total = 0;
          for (let dy = -sampleR; dy <= sampleR; dy++) {
            for (let dx = -sampleR; dx <= sampleR; dx++) {
              const ix = Math.round(sx + dx), iy = Math.round(sy + dy);
              if (ix >= 0 && ix < width && iy >= 0 && iy < height) {
                if (bin[iy * width + ix] === 0) black++;
                total++;
              }
            }
          }
          matrix[row][col] = (total > 0 && black > total * 0.5) ? 1 : 0;
        }
      }
      return matrix;
    }

    // ==================== 修复版数据读取 ====================
    // 标准读取：跳过定位点
    function readBitsStandard(matrix, size) {
      const bits = [];
      let direction = -1; // -1 向上, 1 向下
      
      // 从右下角开始，逐列向左
      for (let col = size - 1; col >= 0; col -= 2) {
        const actualCol = (col === 6) ? 5 : col;
        
        for (let c = actualCol; c >= Math.max(0, actualCol - 1); c--) {
          if (c === 6) continue;
          
          let startRow = (direction === -1) ? size - 1 : 0;
          let endRow = (direction === -1) ? -1 : size;
          let step = (direction === -1) ? -1 : 1;
          
          for (let r = startRow; r !== endRow; r += step) {
            // 跳过定位点区域
            if (r < 9 && c < 9) continue;
            if (r < 9 && c > size - 9) continue;
            if (r > size - 9 && c < 9) continue;
            if (r === 6) continue;
            
            bits.push(matrix[r][c]);
          }
        }
        direction = -direction;
      }
      return bits;
    }

    // ==================== 智能解码器（尝试多种偏移） ====================
    function decodeBitsWithOffset(bits, offset) {
      // 从 offset 位置开始尝试读取
      const startPos = Math.max(0, Math.min(offset, bits.length - 12));
      const slice = bits.slice(startPos);
      
      if (slice.length < 12) return null;
      
      // 读取模式
      let mode = 0;
      for (let i = 0; i < 4; i++) mode = (mode << 1) | slice[i];
      
      const modeMap = { 1: 'Numeric', 2: 'Alphanumeric', 4: 'Byte', 8: 'Kanji' };
      if (!modeMap[mode]) return null;
      
      // 读取字符数
      const countBitsMap = { 1: 10, 2: 9, 4: 8, 8: 8 };
      const cb = countBitsMap[mode];
      if (slice.length < 4 + cb) return null;
      
      let count = 0;
      for (let i = 0; i < cb; i++) count = (count << 1) | slice[4 + i];
      
      if (count <= 0 || count > 300) return null;
      
      const dataStart = 4 + cb;
      const requiredBits = dataStart + count * 8;
      if (requiredBits > slice.length) return null;
      
      const bytes = [];
      for (let i = 0; i < count; i++) {
        let b = 0;
        for (let j = 0; j < 8; j++) {
          b = (b << 1) | slice[dataStart + i * 8 + j];
        }
        bytes.push(b);
      }
      
      // 尝试多种编码
      const encodings = ['utf-8', 'gbk', 'big5', 'shift-jis', 'iso-8859-1'];
      for (const enc of encodings) {
        try {
          const text = new TextDecoder(enc).decode(new Uint8Array(bytes));
          // 检查是否是有效的 URL 或可读文本
          if (text.length > 0 && /[\x20-\x7E\u4e00-\u9fff]/.test(text)) {
            // 检查是否包含网址
            const urlMatch = text.match(/(https?:\/\/[^\s]+|[\w.-]+\.[a-z]{2,}[^\s]*)/i);
            if (urlMatch) {
              return { text, bytes, mode: modeMap[mode], count, offset, encoding: enc, isUrl: true, url: urlMatch[0] };
            }
            // 至少是可读文本
            if (text.length >= 10) {
              return { text, bytes, mode: modeMap[mode], count, offset, encoding: enc, isUrl: false };
            }
          }
        } catch (e) {}
      }
      
      return null;
    }

    // ==================== 主解码（智能尝试所有偏移） ====================
    function decodeQR(imageData, silent) {
      const { gray, width, height } = toGray(imageData);
      if (!silent) addLog('📊 图像尺寸: ' + width + '×' + height);
      const bin = toBinary(gray, width, height);

      // 检测定位点
      const candidates = findAllCandidates(bin, width, height);
      if (!silent) addLog('🔍 检测到 ' + candidates.length + ' 个定位点候选');
      
      if (candidates.length >= 10) {
        const clusters = clusterCandidates(candidates, Math.floor(width/15));
        if (!silent) addLog('🔍 聚类后 ' + clusters.length + ' 个定位点簇');
        
        if (clusters.length >= 3) {
          const pts = clusters.slice(0, 3);
          const perms = permutations(pts);
          
          for (let pi = 0; pi < perms.length; pi++) {
            const [tl, tr, bl] = perms[pi];
            
            const v1x = tr.x - tl.x, v1y = tr.y - tl.y;
            const v2x = bl.x - tl.x, v2y = bl.y - tl.y;
            const dot = v1x * v2x + v1y * v2y;
            const len1 = Math.sqrt(v1x*v1x + v1y*v1y);
            const len2 = Math.sqrt(v2x*v2x + v2y*v2y);
            const cosAngle = dot / (len1 * len2);
            if (Math.abs(cosAngle) > 0.3) continue;

            const d1 = Math.sqrt((tr.x-tl.x)**2+(tr.y-tl.y)**2);
            const d2 = Math.sqrt((bl.x-tl.x)**2+(bl.y-tl.y)**2);
            const avgMod = (tl.moduleSize + tr.moduleSize + bl.moduleSize) / 3;
            const ev = Math.round(((d1 + d2) / 2 / avgMod - 10) / 4);
            
            if (!silent) addLog('📐 估计版本: ' + ev);
            
            for (let v = Math.max(1, ev-2); v <= Math.min(10, ev+2); v++) {
              const sz = 17 + v * 4;
              if (!silent) addLog('🔍 尝试版本 ' + v + ' (矩阵 ' + sz + '×' + sz + ')');
              
              const m = extractMatrix(bin, width, height, tl, tr, bl, sz);
              
              // 尝试所有掩码
              for (let mask = 0; mask < 8; mask++) {
                const work = m.map(row => new Uint32Array(row));
                for (let r = 0; r < sz; r++) {
                  for (let c = 0; c < sz; c++) {
                    if (r === 6 || c === 6) continue;
                    let invert = false;
                    switch (mask) {
                      case 0: invert = (r + c) % 2 === 0; break;
                      case 1: invert = r % 2 === 0; break;
                      case 2: invert = c % 3 === 0; break;
                      case 3: invert = (r + c) % 3 === 0; break;
                      case 4: invert = (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0; break;
                      case 5: invert = ((r * c) % 2 + (r * c) % 3) === 0; break;
                      case 6: invert = (((r * c) % 2 + (r * c) % 3) % 2) === 0; break;
                      case 7: invert = (((r + c) % 2 + (r * c) % 3) % 2) === 0; break;
                    }
                    if (invert) work[r][c] ^= 1;
                  }
                }
                
                const bits = readBitsStandard(work, sz);
                
                // 尝试多种偏移量 (0, 1, 2, 3, 4, 8, 16, 32)
                const offsets = [0, 1, 2, 3, 4, 8, 16, 32];
                for (const offset of offsets) {
                  const result = decodeBitsWithOffset(bits, offset);
                  if (result && result.isUrl) {
                    if (!silent) addLog('✅ 解码成功! 偏移: ' + offset + ' 掩码: ' + mask + ' 编码: ' + result.encoding);
                    return result;
                  }
                  // 保存第一个可读结果
                  if (result && result.text && !result.isUrl) {
                    if (!silent) addLog('📝 找到可读文本 (偏移:' + offset + ' 掩码:' + mask + ')');
                    return result;
                  }
                }
              }
              
              // 尝试反转矩阵
              const inv = m.map(row => new Uint32Array(row.map(v => v ^ 1)));
              for (let mask = 0; mask < 8; mask++) {
                const work = inv.map(row => new Uint32Array(row));
                for (let r = 0; r < sz; r++) {
                  for (let c = 0; c < sz; c++) {
                    if (r === 6 || c === 6) continue;
                    let invert = false;
                    switch (mask) {
                      case 0: invert = (r + c) % 2 === 0; break;
                      case 1: invert = r % 2 === 0; break;
                      case 2: invert = c % 3 === 0; break;
                      case 3: invert = (r + c) % 3 === 0; break;
                      case 4: invert = (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0; break;
                      case 5: invert = ((r * c) % 2 + (r * c) % 3) === 0; break;
                      case 6: invert = (((r * c) % 2 + (r * c) % 3) % 2) === 0; break;
                      case 7: invert = (((r + c) % 2 + (r * c) % 3) % 2) === 0; break;
                    }
                    if (invert) work[r][c] ^= 1;
                  }
                }
                const bits = readBitsStandard(work, sz);
                const offsets = [0, 1, 2, 3, 4, 8, 16, 32];
                for (const offset of offsets) {
                  const result = decodeBitsWithOffset(bits, offset);
                  if (result && result.isUrl) {
                    if (!silent) addLog('✅ 解码成功 (反转)! 偏移: ' + offset + ' 掩码: ' + mask);
                    return result;
                  }
                  if (result && result.text && !result.isUrl) {
                    if (!silent) addLog('📝 找到可读文本 (反转 偏移:' + offset + ')');
                    return result;
                  }
                }
              }
            }
          }
        }
      }

      // 无定位点模式
      if (!silent) addLog('🔍 尝试无定位点解码...');
      const gridSize = Math.min(width, height);
      const size = Math.floor(gridSize / 8) * 4 + 17;
      if (size >= 21 && size <= 57) {
        const step = gridSize / size;
        const matrix = Array.from({ length: size }, () => new Uint32Array(size));
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            const px = Math.round(c * step + step/2);
            const py = Math.round(r * step + step/2);
            if (px < width && py < height) {
              matrix[r][c] = bin[py * width + px] === 0 ? 1 : 0;
            }
          }
        }
        
        for (let mask = 0; mask < 8; mask++) {
          const work = matrix.map(row => new Uint32Array(row));
          for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
              if (r === 6 || c === 6) continue;
              let invert = false;
              switch (mask) {
                case 0: invert = (r + c) % 2 === 0; break;
                case 1: invert = r % 2 === 0; break;
                case 2: invert = c % 3 === 0; break;
                case 3: invert = (r + c) % 3 === 0; break;
                case 4: invert = (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0; break;
                case 5: invert = ((r * c) % 2 + (r * c) % 3) === 0; break;
                case 6: invert = (((r * c) % 2 + (r * c) % 3) % 2) === 0; break;
                case 7: invert = (((r + c) % 2 + (r * c) % 3) % 2) === 0; break;
              }
              if (invert) work[r][c] ^= 1;
            }
          }
          // 简单读取
          const bits = [];
          for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
              if (r === 6 || c === 6) continue;
              bits.push(work[r][c]);
            }
          }
          const offsets = [0, 1, 2, 3, 4, 8, 16, 32];
          for (const offset of offsets) {
            const result = decodeBitsWithOffset(bits, offset);
            if (result && result.isUrl) {
              if (!silent) addLog('✅ 无定位点解码成功!');
              return result;
            }
            if (result && result.text && !result.isUrl) {
              if (!silent) addLog('📝 无定位点找到文本');
              return result;
            }
          }
        }
      }

      if (!silent) addLog('❌ 解码失败');
      return null;
    }

    // ==================== UI ====================
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const cameraBtn = document.getElementById('cameraBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scanResult = document.getElementById('scanResult');
    const badgeContainer = document.getElementById('badgeContainer');
    const hexDumpContainer = document.getElementById('hexDumpContainer');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const previewArea = document.getElementById('previewArea');
    const logBox = document.getElementById('logBox');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
    let cameraStream = null, lastResult = '', lastUrl = '', scanTimer = null;

    function addLog(msg) {
      logBox.textContent += '[' + new Date().toLocaleTimeString('zh-CN',{hour12:false}) + '] ' + msg + '\n';
      logBox.scrollTop = logBox.scrollHeight;
    }

    function displayResult(result) {
      hexDumpContainer.innerHTML = '';
      badgeContainer.innerHTML = '';
      
      if (!result) {
        scanResult.textContent = '解析失败';
        scanResult.className = 'result-content empty';
        lastResult = '';
        lastUrl = '';
        return;
      }

      if (result.bytes) {
        const hex = Array.from(result.bytes.slice(0, 32)).map(b => b.toString(16).padStart(2,'0')).join(' ');
        hexDumpContainer.innerHTML = '<div class="hex-dump">HEX: ' + hex + (result.bytes.length > 32 ? ' ...' : '') + '</div>';
      }

      let displayText = result.text || '二进制数据';
      
      // 如果有 URL，优先显示 URL
      if (result.url) {
        let url = result.url;
        if (!url.startsWith('http')) url = 'https://' + url;
        displayText = url;
        lastUrl = url;
        const badge = document.createElement('div');
        badge.className = 'url-badge';
        badge.innerHTML = '🌐 识别为网址：<a href="' + url + '" target="_blank">' + url + '</a>';
        badgeContainer.appendChild(badge);
      }

      // 显示修复信息
      if (result.offset !== undefined && result.offset > 0) {
        const badge = document.createElement('div');
        badge.className = 'fix-badge';
        badge.textContent = '🔧 自动修复：读取偏移 ' + result.offset + ' 位 | 编码: ' + (result.encoding || 'UTF-8');
        badgeContainer.appendChild(badge);
      }

      scanResult.textContent = displayText;
      scanResult.className = 'result-content';
      lastResult = displayText;
    }

    function processImage(img) {
      logBox.textContent = '';
      addLog('🚀 开始解析');
      hiddenCanvas.width = img.width; hiddenCanvas.height = img.height;
      hiddenCtx.drawImage(img, 0, 0);
      previewArea.innerHTML = '';
      const oi = document.createElement('img');
      oi.src = hiddenCanvas.toDataURL(); oi.style.maxWidth='200px'; oi.style.maxHeight='200px';
      previewArea.appendChild(oi);
      
      const result = decodeQR(hiddenCtx.getImageData(0,0,img.width,img.height), false);
      displayResult(result);
      if (result && result.text) {
        addLog('📝 结果: ' + result.text.substring(0, 60) + (result.text.length > 60 ? '...' : ''));
      }
    }

    // 事件绑定
    uploadBox.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => { const img = new Image(); img.onload = () => processImage(img); img.src = ev.target.result; };
      reader.readAsDataURL(f); fileInput.value = '';
    });
    uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.style.borderColor='#43e97b'; });
    uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor='rgba(255,255,255,0.3)'; });
    uploadBox.addEventListener('drop', e => {
      e.preventDefault(); uploadBox.style.borderColor='rgba(255,255,255,0.3)';
      const f = e.dataTransfer.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => { const img = new Image(); img.onload = () => processImage(img); img.src = ev.target.result; };
      reader.readAsDataURL(f);
    });

    cameraBtn.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 } }, audio: false });
        video.srcObject = cameraStream; videoContainer.classList.add('active');
        cameraBtn.style.display = 'none'; stopBtn.style.display = 'block';
        addLog('📸 摄像头已开启');
        function scan() {
          if (!cameraStream) return;
          if (video.readyState >= 2 && video.videoWidth > 0) {
            hiddenCanvas.width = video.videoWidth; hiddenCanvas.height = video.videoHeight;
            hiddenCtx.drawImage(video, 0, 0);
            const result = decodeQR(hiddenCtx.getImageData(0,0,hiddenCanvas.width,hiddenCanvas.height), true);
            if (result && result.text && result.text !== lastResult) {
              displayResult(result);
              addLog('✅ 扫描到: ' + result.text.substring(0, 30) + (result.text.length > 30 ? '...' : ''));
            }
          }
          scanTimer = setTimeout(scan, 300);
        }
        scan();
      } catch(err) { addLog('❌ 摄像头启动失败: ' + err.message); }
    });

    stopBtn.addEventListener('click', () => {
      if (scanTimer) clearTimeout(scanTimer);
      if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
      video.srcObject = null; videoContainer.classList.remove('active');
      cameraBtn.style.display = 'block'; stopBtn.style.display = 'none';
    });

    copyBtn.addEventListener('click', () => { 
      const text = lastUrl || lastResult;
      if (text) navigator.clipboard.writeText(text); 
    });

    openBtn.addEventListener('click', () => {
      const url = lastUrl || lastResult;
      if (!url) return;
      let target = url;
      if (!/^https?:\/\//i.test(target) && /^[\w.-]+\.[a-z]{2,}/i.test(target)) {
        target = 'https://' + target;
      }
      try { new URL(target); window.open(target, '_blank'); }
      catch(e) { 
        if (/^[\w.-]+\.[a-z]{2,}/i.test(url)) window.open('https://'+url, '_blank');
      }
    });

    window.addEventListener('beforeunload', () => {
      if (scanTimer) clearTimeout(scanTimer);
      if (cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
    });
  </script>
</body>
</html>
