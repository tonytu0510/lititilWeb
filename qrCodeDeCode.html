<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>дәҢз»ҙз Ғи§Јз ҒеҷЁ v18 жҡҙеҠӣжҗңзҙў</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 2rem 1rem; color: #e0e0e0; }
    .container { max-width: 950px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 1.5rem; padding: 1.2rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
    .upload-box { border: 2px dashed rgba(255,255,255,0.3); border-radius: 1rem; padding: 1.5rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); margin-bottom: 1rem; }
    .upload-box:hover { border-color: #43e97b; }
    .btn { width: 100%; padding: 0.7rem; border: none; border-radius: 0.7rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: white; margin-bottom: 0.5rem; }
    .btn-row { display: flex; gap: 0.6rem; }
    .btn-row .btn { flex: 1; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 1rem; margin-top: 1rem; }
    .result-content { font-size: 1.2rem; font-weight: 600; color: #43e97b; word-break: break-all; min-height: 1.5rem; }
    .result-content.empty { color: #666; }
    .log-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 0.5rem; font-family: 'Courier New', monospace; font-size: 0.65rem; color: #43e97b; max-height: 500px; overflow-y: auto; margin-top: 0.5rem; white-space: pre-wrap; line-height:1.3; }
    .preview-area { display: flex; justify-content: center; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 1rem; margin: 1rem 0; }
    .url-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(67,233,123,0.15); border-left: 4px solid #43e97b; padding: 0.5rem 1rem; border-radius: 0.4rem; font-size: 0.9rem; color: #a8f0c0; margin-top: 0.5rem; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h1>рҹ“· v18 жҡҙеҠӣжҗңзҙў</h1>
    <div class="card">
      <div class="upload-box" id="uploadBox"><div style="font-size:2.5rem;">рҹ–јпёҸ</div><div>зӮ№еҮ»дёҠдј  жҲ– жӢ–жӢҪдәҢз»ҙз ҒеӣҫзүҮ</div></div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <div class="preview-area" id="previewArea"><span style="color:#666;">йў„и§Ҳ</span></div>
    </div>
    <div class="card">
      <div class="result-box"><div style="font-size:0.8rem;color:#8892b0;">рҹ”Қ и§Јжһҗз»“жһң</div>
        <div class="result-content empty" id="scanResult">зӯүеҫ…и§Јжһҗ...</div><div id="badgeContainer"></div>
      </div>
      <div class="btn-row">
        <button class="btn" style="background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e;" id="copyBtn" disabled>рҹ“Ӣ еӨҚеҲ¶</button>
        <button class="btn" style="background:linear-gradient(135deg,#f093fb,#f5576c);" id="openBtn" disabled>рҹ”— жү“ејҖ</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    function toGray(d){const g=new Uint8Array(d.width*d.height);for(let i=0;i<g.length;i++)g[i]=Math.round(d.data[i*4]*0.299+d.data[i*4+1]*0.587+d.data[i*4+2]*0.114);return{gray:g,width:d.width,height:d.height};}
    function toBinary(g,w,h){let mn=255,mx=0;for(let i=0;i<g.length;i++){if(g[i]<mn)mn=g[i];if(g[i]>mx)mx=g[i];}const th=mn+(mx-mn)*0.4;const b=new Uint8Array(w*h);for(let i=0;i<g.length;i++)b[i]=g[i]<th?0:1;return b;}
    function findAllCandidates(bin,w,h){const a=[];for(let y=0;y<h;y+=2){const s=[];let cl=bin[y*w],ln=1;for(let x=1;x<w;x++){const co=bin[y*w+x];if(co===cl)ln++;else{s.push({color:cl,len:ln,startX:x-ln});cl=co;ln=1;}}s.push({color:cl,len:ln,startX:w-ln});for(let i=0;i<s.length-4;i++){const sg=s.slice(i,i+5);if(sg[0].color===0&&sg[1].color===1&&sg[2].color===0&&sg[3].color===1&&sg[4].color===0){const t=sg[0].len+sg[1].len+sg[2].len+sg[3].len+sg[4].len,ms=t/7;const ra=sg.map(x=>x.len/ms);let ok=true;for(let j=0;j<5;j++){if(ra[j]<0.3||ra[j]>4.0){ok=false;break;}}if(ok&&ms>1.0)a.push({x:sg[0].startX+sg[0].len+sg[1].len+Math.floor(sg[2].len/2),y,modSize:ms});}}}return a;}
    function clusterCandidates(cs,gs){const g={};for(const p of cs){const k=Math.floor(p.x/gs)+','+Math.floor(p.y/gs);if(!g[k])g[k]={pts:[],sx:0,sy:0,sm:0};g[k].pts.push(p);g[k].sx+=p.x;g[k].sy+=p.y;g[k].sm+=p.modSize;}const cells=Object.values(g).filter(c=>c.pts.length>=3),m=[];for(let i=0;i<cells.length;i++){if(cells[i]._used)continue;let cx=cells[i].sx/cells[i].pts.length,cy=cells[i].sy/cells[i].pts.length,cm=cells[i].sm/cells[i].pts.length,count=cells[i].pts.length;let ch=true;while(ch){ch=false;for(let j=i+1;j<cells.length;j++){if(cells[j]._used)continue;const jx=cells[j].sx/cells[j].pts.length,jy=cells[j].sy/cells[j].pts.length;if(Math.abs(cx-jx)<gs*3&&Math.abs(cy-jy)<gs*3){cx=(cx*count+jx*cells[j].pts.length)/(count+cells[j].pts.length);cy=(cy*count+jy*cells[j].pts.length)/(count+cells[j].pts.length);cm=(cm*count+(cells[j].sm/cells[j].pts.length)*cells[j].pts.length)/(count+cells[j].pts.length);count+=cells[j].pts.length;cells[j]._used=true;ch=true;}}}m.push({x:Math.round(cx),y:Math.round(cy),moduleSize:cm,count});}return m.filter(x=>x.count>=5).sort((a,b)=>b.count-a.count);}
    function orderFinders(pts){const tl=pts.reduce((a,b)=>(a.x+a.y)<(b.x+b.y)?a:b);const rest=pts.filter(p=>p!==tl);const tr=rest.reduce((a,b)=>a.x>b.x?a:b);const bl=rest.find(p=>p!==tr);return{tl,tr,bl};}
    function extractMatrix(bin,w,h,tl,tr,bl,size){const m=Array.from({length:size},()=>new Uint32Array(size));const dx1=(tr.x-tl.x)/(size-7),dy1=(tr.y-tl.y)/(size-7),dx2=(bl.x-tl.x)/(size-7),dy2=(bl.y-tl.y)/(size-7);const ox=tl.x-dx1*3-dx2*3,oy=tl.y-dy1*3-dy2*3;for(let r=0;r<size;r++)for(let c=0;c<size;c++){const ix=Math.round(ox+c*dx1+r*dx2),iy=Math.round(oy+c*dy1+r*dy2);if(ix>=0&&ix<w&&iy>=0&&iy<h)m[r][c]=bin[iy*w+ix]===0?1:0;}return m;}

    // жҢүз”ҹжҲҗеҷЁзӣёеҗҢзҡ„йЎәеәҸиҜ»еҸ–пјҲдёҚи·іиҝҮе®ҡдҪҚзӮ№пјү
    function readBitsSameAsGenerator(m,size){
      const bits=[];
      let upward=true;
      for(let col=size-1;col>=0;col-=2){
        const rc=col===6?5:col;
        for(let row=upward?size-1:0;upward?row>=0:row<size;row+=upward?-1:1){
          for(let c=rc;c>=rc-1;c--){
            if(c<0||c>=size)continue;
            if(row===6||c===6)continue; // еҸӘи·іиҝҮж—¶еәҸеӣҫжЎҲ
            bits.push(m[row][c]);
          }
        }
        upward=!upward;
      }
      return bits;
    }

    const maskFn=[(r,c)=>(r+c)%2===0,(r,c)=>r%2===0,(r,c)=>c%3===0,(r,c)=>(r+c)%3===0,(r,c)=>(Math.floor(r/2)+Math.floor(c/3))%2===0,(r,c)=>((r*c)%2+(r*c)%3)===0,(r,c)=>(((r*c)%2+(r*c)%3)%2)===0,(r,c)=>(((r+c)%2+(r*c)%3)%2)===0];
    function unmask(m,size,mask){const w=m.map(r=>new Uint32Array(r));for(let r=0;r<size;r++)for(let c=0;c<size;c++){if(r===6||c===6)continue;if(maskFn[mask](r,c))w[r][c]^=1;}return w;}

    function tryUrl(text){if(!text||text.length<4)return null;let m=text.match(/https?:\/\/[^\x00-\x1f\x7f-\x9f\s"'<>\[\]{}|\\^`]{4,}/i);if(m)return m[0];m=text.match(/www\.[-a-zA-Z0-9]+\.[-a-zA-Z0-9.]+[^\x00-\x1f\x7f-\x9f\s"'<>\[\]{}|\\^`]*/i);if(m)return'https://'+m[0];m=text.match(/[a-zA-Z0-9][-a-zA-Z0-9]*\.[a-z]{2,}(?:\/[^\x00-\x1f\x7f-\x9f\s"'<>\[\]{}|\\^`]*)?/i);if(m)return'https://'+m[0];return null;}

    function decodeQR(imageData){
      const{gray,width,height}=toGray(imageData);
      addLog('рҹ“Ҡ '+width+'Г—'+height);
      const bin=toBinary(gray,width,height);
      const cs=findAllCandidates(bin,width,height);
      addLog('рҹ”Қ '+cs.length+' еҖҷйҖүзӮ№');
      const clusters=clusterCandidates(cs,Math.floor(width/15));
      addLog('рҹ”Қ '+clusters.length+' з°Ү');
      if(clusters.length<3){addLog('вқҢ з°ҮдёҚи¶і');return null;}
      const top3=clusters.slice(0,3);
      const{tl,tr,bl}=orderFinders(top3);
      addLog('рҹ”ў TL('+tl.x+','+tl.y+') TR('+tr.x+','+tr.y+') BL('+bl.x+','+bl.y+')');
      const d1=Math.sqrt((tr.x-tl.x)**2+(tr.y-tl.y)**2),d2=Math.sqrt((bl.x-tl.x)**2+(bl.y-tl.y)**2);
      const avgMod=(tl.moduleSize+tr.moduleSize+bl.moduleSize)/3;
      const ev=Math.round(((d1+d2)/2/avgMod-10)/4);
      addLog('рҹ“җ v'+ev);
      
      const v=Math.max(1,Math.min(10,ev));
      const sz=17+v*4;
      const m=extractMatrix(bin,width,height,tl,tr,bl,sz);
      
      // жҡҙеҠӣжҗңзҙўпјҡеҜ№жүҖжңүжҺ©з ҒгҖҒжүҖжңүеҒҸз§»гҖҒжүҖжңүcountе°қиҜ•и§Јз Ғ
      for(let mask=0;mask<8;mask++){
        const w=unmask(m,sz,mask);
        const bits=readBitsSameAsGenerator(w,sz);
        
        // жҡҙеҠӣжҗңзҙўеҒҸз§»
        for(let off=0;off<Math.min(64,bits.length-8);off++){
          const s=bits.slice(off);
          if(s.length<12)break;
          
          // е°қиҜ•жүҫеҲ° mode=4 еӯ—иҠӮжЁЎејҸ
          let mode=0;for(let i=0;i<4;i++)mode=(mode<<1)|s[i];
          if(mode!==4)continue;
          
          let count=0;for(let i=0;i<8;i++)count=(count<<1)|s[4+i];
          if(count<4||count>100)continue;
          
          const maxB=Math.min(count,Math.floor((s.length-12)/8));
          const bytes=[];
          for(let i=0;i<maxB;i++){let b=0;for(let j=0;j<8;j++)b=(b<<1)|s[12+i*8+j];bytes.push(b);}
          
          // еӨҡз§Қзј–з Ғе°қиҜ•
          for(const enc of['utf-8','gbk','iso-8859-1','windows-1252']){
            try{
              const text=new TextDecoder(enc,{fatal:false}).decode(new Uint8Array(bytes));
              const url=tryUrl(text);
              if(url){
                addLog('вң… mask'+mask+' off'+off+' count='+count+' enc='+enc+': '+url);
                return{url,text};
              }
            }catch(e){}
          }
          
          // зәҜASCIIжү«жҸҸ
          let ascii='';
          for(const b of bytes)ascii+=(b>=32&&b<=126)?String.fromCharCode(b):(b===0?'':'.');
          const url=tryUrl(ascii);
          if(url){
            addLog('вң… mask'+mask+' off'+off+' count='+count+' ascii: '+url);
            return{url,text:ascii};
          }
        }
      }
      
      // еҸҚиҪ¬зҹ©йҳөеҶҚиҜ•
      const inv=m.map(row=>new Uint32Array(row.map(x=>x^1)));
      for(let mask=0;mask<8;mask++){
        const w=unmask(inv,sz,mask);
        const bits=readBitsSameAsGenerator(w,sz);
        for(let off=0;off<Math.min(64,bits.length-8);off++){
          const s=bits.slice(off);
          if(s.length<12)break;
          let mode=0;for(let i=0;i<4;i++)mode=(mode<<1)|s[i];
          if(mode!==4)continue;
          let count=0;for(let i=0;i<8;i++)count=(count<<1)|s[4+i];
          if(count<4||count>100)continue;
          const maxB=Math.min(count,Math.floor((s.length-12)/8));
          const bytes=[];for(let i=0;i<maxB;i++){let b=0;for(let j=0;j<8;j++)b=(b<<1)|s[12+i*8+j];bytes.push(b);}
          for(const enc of['utf-8','gbk','iso-8859-1','windows-1252']){
            try{const text=new TextDecoder(enc,{fatal:false}).decode(new Uint8Array(bytes));const url=tryUrl(text);if(url){addLog('вң… еҸҚиҪ¬ mask'+mask+' off'+off+': '+url);return{url,text};}}catch(e){}
          }
        }
      }
      
      addLog('вқҢ жҡҙеҠӣжҗңзҙўеӨұиҙҘ ('+sz+'Г—'+sz+')');
      return null;
    }

    const uploadBox=document.getElementById('uploadBox'),fileInput=document.getElementById('fileInput');
    const scanResult=document.getElementById('scanResult'),badgeContainer=document.getElementById('badgeContainer');
    const copyBtn=document.getElementById('copyBtn'),openBtn=document.getElementById('openBtn');
    const previewArea=document.getElementById('previewArea'),logBox=document.getElementById('logBox');
    const hiddenCanvas=document.getElementById('hiddenCanvas'),hiddenCtx=hiddenCanvas.getContext('2d',{willReadFrequently:true});
    let lastUrl='';

    function addLog(msg){const t=new Date().toLocaleTimeString('zh-CN',{hour12:false});logBox.innerHTML+='<span style="color:#666;">['+t+']</span> '+msg+'\n';logBox.scrollTop=logBox.scrollHeight;}

    function processImage(img){
      logBox.innerHTML='';addLog('рҹҡҖ ејҖе§Ӣи§Јжһҗ');
      hiddenCanvas.width=img.width;hiddenCanvas.height=img.height;hiddenCtx.drawImage(img,0,0);
      previewArea.innerHTML='';const oi=document.createElement('img');oi.src=hiddenCanvas.toDataURL();oi.style.maxWidth='200px';oi.style.maxHeight='200px';previewArea.appendChild(oi);
      setTimeout(()=>{
        const r=decodeQR(hiddenCtx.getImageData(0,0,img.width,img.height));
        if(r&&r.url){scanResult.textContent=r.url;scanResult.className='result-content';lastUrl=r.url;copyBtn.disabled=false;openBtn.disabled=false;badgeContainer.innerHTML='<div class="url-badge">рҹҢҗ <a href="'+r.url+'" target="_blank">'+r.url+'</a></div>';}
        else{scanResult.textContent='жңӘиғҪжҸҗеҸ–еҲ°жңүж•ҲзҪ‘еқҖ';scanResult.className='result-content error';lastUrl='';copyBtn.disabled=true;openBtn.disabled=true;badgeContainer.innerHTML='';}
      },50);
    }

    uploadBox.addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>processImage(img);img.src=ev.target.result;};reader.readAsDataURL(f);fileInput.value='';});
    uploadBox.addEventListener('dragover',e=>{e.preventDefault();uploadBox.style.borderColor='#43e97b';});
    uploadBox.addEventListener('dragleave',()=>{uploadBox.style.borderColor='rgba(255,255,255,0.3)';});
    uploadBox.addEventListener('drop',e=>{e.preventDefault();uploadBox.style.borderColor='rgba(255,255,255,0.3)';const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>processImage(img);img.src=ev.target.result;};reader.readAsDataURL(f);});
    copyBtn.addEventListener('click',()=>{if(lastUrl)navigator.clipboard.writeText(lastUrl);});
    openBtn.addEventListener('click',()=>{if(lastUrl)window.open(lastUrl,'_blank');});
  </script>
</body>
</html>
