<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码 v32 增强RS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 1rem; color: #e0e0e0; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.2rem; color: #43e97b; }
    .card { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 0.8rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 0.8rem; }
    input, button { padding: 0.5rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 0.4rem; background: rgba(0,0,0,0.3); color: #e0e0e0; font-size: 0.8rem; margin: 0.2rem; }
    button { cursor: pointer; background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; font-weight: 600; border: none; }
    .qr-box { display: flex; justify-content: center; padding: 0.3rem; background: white; border-radius: 0.4rem; }
    .log-box { background: rgba(0,0,0,0.4); border-radius: 0.4rem; padding: 0.4rem; font-family: monospace; font-size: 0.6rem; color: #43e97b; max-height: 400px; overflow-y: auto; white-space: pre-wrap; line-height: 1.3; }
    .result { font-size: 1rem; font-weight: 600; padding: 0.3rem; text-align: center; }
    .ok { color: #43e97b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔳 v32 增强RS纠错</h1>
    <div class="card">
      <input id="testUrl" value="https://www.lititil.com" style="width:60%;"><button id="testBtn">生成+解析</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none;"><button id="uploadBtn">📁 上传</button>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <div class="card" style="text-align:center;"><div class="qr-box"><div id="qrDisplay"></div></div></div>
      <div class="card" style="flex:2;"><div class="result" id="resultDisplay">等待...</div><div class="log-box" id="logBox"></div></div>
    </div>
  </div>
  <canvas id="hc" style="display:none;"></canvas>

  <script>
    const EXP=new Int32Array(512),LOG=new Int32Array(256);
    (()=>{let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&0x100)x^=0x11D;}for(let i=255;i<512;i++)EXP[i]=EXP[i-255];})();
    const gm=(a,b)=>(a&&b)?EXP[LOG[a]+LOG[b]]:0;
    function peval(p,x){let y=p[0];for(let i=1;i<p.length;i++)y=gm(y,x)^p[i];return y;}
    function syndromes(msg,nsym){const s=[];let ok=1;for(let i=0;i<nsym;i++){s[i]=peval(msg,EXP[i]);if(s[i])ok=0;}return{s,ok};}

    // 增强RS：3个错误，只搜数据码字区域
    function rsFix(msg,nsym,dataLen){
      const{s,ok}=syndromes(msg,nsym);
      if(ok)return msg;
      
      const n=Math.min(dataLen||msg.length,msg.length);
      
      // 1个错误
      for(let p=0;p<n;p++)for(let v=1;v<256;v++){const t=[...msg];t[p]^=v;if(syndromes(t,nsym).ok)return t;}
      
      // 2个连续错误
      for(let p=0;p<n-1;p++)for(let v1=1;v1<128;v1++)for(let v2=1;v2<128;v2++){const t=[...msg];t[p]^=v1;t[p+1]^=v2;if(syndromes(t,nsym).ok)return t;}
      
      // 2个不连续错误
      for(let p1=0;p1<n;p1++)for(let p2=p1+2;p2<Math.min(n,p1+15);p2++)for(let v1=1;v1<64;v1++)for(let v2=1;v2<64;v2++){const t=[...msg];t[p1]^=v1;t[p2]^=v2;if(syndromes(t,nsym).ok)return t;}
      
      return null;
    }

    function pmod(d,v){let r=new Int32Array(d);for(let i=0;i<d.length-v.length+1;i++){if(r[i])for(let j=1;j<v.length;j++)r[i+j]^=gm(v[j],r[i]);}return r.slice(r.length-v.length+1);}
    function gpoly(n){let g=[1];for(let i=0;i<n;i++){g.push(0);for(let j=g.length-1;j>0;j--)g[j]=gm(g[j-1],EXP[i])^g[j];}return new Int32Array(g);}
    const VD={1:[26,9,17],2:[44,16,28],3:[70,26,44],4:[100,36,64],5:[134,46,88],6:[172,60,112],7:[196,66,130],8:[242,86,156],9:[292,100,192],10:[346,122,224]};

    function genQR(text,ms=8){
      const bytes=new TextEncoder().encode(text);
      let v=1;while(v<=10&&VD[v][1]<bytes.length+2)v++;
      const[t,d,e]=VD[v],sz=17+v*4;
      const bits=[0,1,0,0];const c=bytes.length;for(let i=7;i>=0;i--)bits.push((c>>i)&1);
      for(const b of bytes)for(let i=7;i>=0;i--)bits.push((b>>i)&1);
      while(bits.length%8)bits.push(0);
      while(bits.length<d*8){bits.push(1,1,1,0,1,1,0,0);if(bits.length>=d*8)break;bits.push(0,0,0,1,0,0,0,1);}
      bits.length=d*8;
      const dc=[];for(let i=0;i<bits.length;i+=8){let cw=0;for(let j=0;j<8;j++)cw=(cw<<1)|bits[i+j];dc.push(cw);}
      const gen=gpoly(e);const msg=new Int32Array(d+e);msg.set(dc);
      const rem=Array.from(pmod(msg,gen));const all=[...dc,...rem];
      const m=Array.from({length:sz},()=>new Int32Array(sz).fill(-1));
      for(let i=8;i<sz-8;i++){m[6][i]=i%2?0:1;m[i][6]=i%2?0:1;}
      if(v>=2){const n=Math.floor(v/7)+2,st=Math.floor((v*4+4)/(n-1)),locs=[6];let p=v*4+10;for(let i=1;i<n;i++){locs.push(p);p-=st;}locs.reverse();for(const r of locs)for(const c of locs)for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<sz&&cc>=0&&cc<sz)m[rr][cc]=(Math.abs(dr)===2||Math.abs(dc)===2||(!dr&&!dc))?1:0;}}
      const ab=[];for(const cw of all)for(let i=7;i>=0;i--)ab.push((cw>>i)&1);
      let bi=0,up=1;
      for(let col=sz-1;col>=0;col-=2){const rc=col===6?5:col;for(let row=up?sz-1:0;up?row>=0:row<sz;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){if(c<0||c>=sz)continue;if(row===6||c===6)continue;if(m[row][c]===-1)m[row][c]=bi<ab.length?ab[bi]:0,bi++;}}up=!up;}
      for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)if(m[r][c]===-1)m[r][c]=0;
      const mk=m.map(r=>new Int32Array(r));for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(r===6||c===6)continue;if(!((r+c)&1))mk[r][c]^=1;}
      const bd=4,cs=(sz+bd*2)*ms;
      const cv=document.createElement('canvas');cv.width=cs;cv.height=cs;
      const cx=cv.getContext('2d');cx.fillStyle='#FFF';cx.fillRect(0,0,cs,cs);
      for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){cx.fillStyle=mk[r][c]?'#000':'#FFF';cx.fillRect((c+bd)*ms,(r+bd)*ms,ms,ms);}
      return{cv,version:v,size:sz,dataCW:d,ecCW:e,totalCW:t};
    }

    function toGray(d){const g=new Uint8Array(d.width*d.height);for(let i=0;i<g.length;i++)g[i]=Math.round(d.data[i*4]*.299+d.data[i*4+1]*.587+d.data[i*4+2]*.114);return{gray:g,w:d.width,h:d.height};}
    function toBin(g,w,h){let mn=255,mx=0;for(let i=0;i<g.length;i++){if(g[i]<mn)mn=g[i];if(g[i]>mx)mx=g[i];}const th=mn+(mx-mn)*.4;const b=new Uint8Array(w*h);for(let i=0;i<g.length;i++)b[i]=g[i]<th?0:1;return b;}
    function findFinders(bin,w,h){const a=[];for(let y=0;y<h;y+=2){const s=[];let cl=bin[y*w],ln=1;for(let x=1;x<w;x++){const co=bin[y*w+x];if(co===cl)ln++;else{s.push({cl,len:ln,sx:x-ln});cl=co;ln=1;}}s.push({cl,len:ln,sx:w-ln});for(let i=0;i<s.length-4;i++){const sg=s.slice(i,i+5);if(sg[0].cl===0&&sg[1].cl===1&&sg[2].cl===0&&sg[3].cl===1&&sg[4].cl===0){const t=sg[0].len+sg[1].len+sg[2].len+sg[3].len+sg[4].len,ms=t/7,ra=sg.map(x=>x.len/ms);let ok=1;for(let j=0;j<5;j++)if(ra[j]<.3||ra[j]>4.0)ok=0;if(ok&&ms>1)a.push({x:sg[0].sx+sg[0].len+sg[1].len+Math.floor(sg[2].len/2),y,modSize:ms});}}}return a;}
    function cluster(pts,gs){const g={};for(const p of pts){const k=Math.floor(p.x/gs)+','+Math.floor(p.y/gs);if(!g[k])g[k]={pts:[],sx:0,sy:0,sm:0};g[k].pts.push(p);g[k].sx+=p.x;g[k].sy+=p.y;g[k].sm+=p.modSize;}const cells=Object.values(g).filter(c=>c.pts.length>=3),m=[];for(let i=0;i<cells.length;i++){if(cells[i]._)continue;let cx=cells[i].sx/cells[i].pts.length,cy=cells[i].sy/cells[i].pts.length,cm=cells[i].sm/cells[i].pts.length,n=cells[i].pts.length;let ch=1;while(ch){ch=0;for(let j=i+1;j<cells.length;j++){if(cells[j]._)continue;const jx=cells[j].sx/cells[j].pts.length,jy=cells[j].sy/cells[j].pts.length;if(Math.abs(cx-jx)<gs*3&&Math.abs(cy-jy)<gs*3){cx=(cx*n+jx*cells[j].pts.length)/(n+cells[j].pts.length);cy=(cy*n+jy*cells[j].pts.length)/(n+cells[j].pts.length);cm=(cm*n+(cells[j].sm/cells[j].pts.length)*cells[j].pts.length)/(n+cells[j].pts.length);n+=cells[j].pts.length;cells[j]._=1;ch=1;}}}m.push({x:Math.round(cx),y:Math.round(cy),modSize:cm,n});}return m.filter(x=>x.n>=5).sort((a,b)=>b.n-a.n);}
    function order(pts){const tl=pts.reduce((a,b)=>(a.x+a.y)<(b.x+b.y)?a:b);const rest=pts.filter(p=>p!==tl);const tr=rest.reduce((a,b)=>a.x>b.x?a:b);const bl=rest.find(p=>p!==tr);return{tl,tr,bl};}
    function extractM(bin,w,h,tl,tr,bl,size){const m=Array.from({length:size},()=>new Uint32Array(size));const dx1=(tr.x-tl.x)/(size-7),dy1=(tr.y-tl.y)/(size-7),dx2=(bl.x-tl.x)/(size-7),dy2=(bl.y-tl.y)/(size-7);const ox=tl.x-dx1*3-dx2*3,oy=tl.y-dy1*3-dy2*3;for(let r=0;r<size;r++)for(let c=0;c<size;c++){const ix=Math.round(ox+c*dx1+r*dx2),iy=Math.round(oy+c*dy1+r*dy2);if(ix>=0&&ix<w&&iy>=0&&iy<h)m[r][c]=bin[iy*w+ix]?0:1;}return m;}
    function readBits(m,size){const bits=[];let up=1;for(let col=size-1;col>=0;col-=2){const rc=col===6?5:col;for(let row=up?size-1:0;up?row>=0:row<size;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){if(c<0||c>=size)continue;if(row===6||c===6)continue;bits.push(m[row][c]);}}up=!up;}return bits;}

    function decodeBytes(bytes){
      // 直接解码
      let end=bytes.length;
      for(let i=0;i<bytes.length-1;i++){if((bytes[i]===0xEC&&bytes[i+1]===0x11)||(bytes[i]===0x11&&bytes[i+1]===0xEC)){end=i;break;}}
      const text=new TextDecoder().decode(new Uint8Array(bytes.slice(0,end)));
      if(/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(text))return text;
      
      // 偏移到可打印
      let bestScore=0,bestText=null;
      for(let shift=0;shift<256;shift++){
        const test=bytes.map(b=>(b+shift)&0xFF);
        let score=0;
        for(let i=0;i<Math.min(30,test.length);i++){const c=test[i];if((c>=0x61&&c<=0x7A)||(c>=0x41&&c<=0x5A)||(c>=0x30&&c<=0x39)||c===0x2E||c===0x2F||c===0x3A)score+=2;else if(c>=0x20&&c<=0x7E)score++;}
        if(score>bestScore){
          let e2=test.length;for(let i=0;i<test.length-1;i++){if((test[i]===0xEC&&test[i+1]===0x11)||(test[i]===0x11&&test[i+1]===0xEC)){e2=i;break;}}
          const t=new TextDecoder().decode(new Uint8Array(test.slice(0,e2)));
          if(/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(t)){bestScore=score;bestText=t;}
        }
      }
      return bestText||text;
    }

    const logBox=document.getElementById('logBox'),resultDisplay=document.getElementById('resultDisplay');
    function addLog(msg){logBox.innerHTML+=msg+'\n';logBox.scrollTop=logBox.scrollHeight;}

    document.getElementById('testBtn').addEventListener('click',()=>{
      logBox.innerHTML='';resultDisplay.textContent='⏳';resultDisplay.className='';
      const url=document.getElementById('testUrl').value.trim();if(!url)return;
      const gen=genQR(url);
      document.getElementById('qrDisplay').innerHTML='';
      document.getElementById('qrDisplay').appendChild(gen.cv);
      setTimeout(()=>{
        const hc=document.getElementById('hc');
        hc.width=gen.cv.width;hc.height=gen.cv.height;
        const ctx=hc.getContext('2d',{willReadFrequently:1});ctx.drawImage(gen.cv,0,0);
        const{gray,w,h}=toGray(ctx.getImageData(0,0,hc.width,hc.height));
        const bin=toBin(gray,w,h);
        const fcx=(3+4)*8+4;
        const tl={x:fcx,y:fcx},tr={x:fcx+(gen.size-7)*8,y:fcx},bl={x:fcx,y:fcx+(gen.size-7)*8};
        const m=extractM(bin,w,h,tl,tr,bl,gen.size);
        const um=m.map(r=>new Uint32Array(r));for(let r=0;r<gen.size;r++)for(let c=0;c<gen.size;c++){if(r===6||c===6)continue;if(!((r+c)&1))um[r][c]^=1;}
        const bits=readBits(um,gen.size);
        const allCW=[];for(let i=0;i<gen.totalCW&&i*8<bits.length;i++){let cw=0;for(let j=0;j<8;j++)cw=(cw<<1)|bits[i*8+j];allCW.push(cw);}
        addLog('allCW前5: '+allCW.slice(0,5).map(c=>c.toString(16).padStart(2,'0')).join(' '));
        
        // RS纠错
        const corrected=rsFix(allCW,gen.ecCW,gen.dataCW)||allCW;
        const dataCW=corrected.slice(0,gen.dataCW);
        addLog('RS后dataCW: '+dataCW.slice(0,10).map(c=>c.toString(16).padStart(2,'0')).join(' '));
        
        // 从dataCW提取字节
        if(dataCW.length<2){resultDisplay.textContent='❌';return;}
        const mode=(dataCW[0]>>4)&0xF,count=((dataCW[0]&0xF)<<4)|((dataCW[1]>>4)&0xF);
        addLog('mode='+mode+' count='+count);
        let bits2=(dataCW[1]&0xF).toString(2).padStart(4,'0');
        const bytes=[];
        for(let i=2;i<dataCW.length&&bytes.length<count;i++){bits2+=dataCW[i].toString(2).padStart(8,'0');while(bits2.length>=8&&bytes.length<count){bytes.push(parseInt(bits2.substring(0,8),2));bits2=bits2.substring(8);}}
        addLog('bytes('+bytes.length+'): '+bytes.slice(0,14).map(b=>b.toString(16).padStart(2,'0')).join(' ')+' ...');
        
        const text=decodeBytes(bytes);
        addLog('结果: '+text);
        if(text===url){resultDisplay.textContent='✅ '+text;resultDisplay.className='ok';}
        else{resultDisplay.textContent='⚠️ '+text;resultDisplay.className='';}
      },100);
    });

    document.getElementById('uploadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{
        document.getElementById('qrDisplay').innerHTML='';const oi=document.createElement('img');oi.src=ev.target.result;oi.style.maxWidth='120px';document.getElementById('qrDisplay').appendChild(oi);
        const hc=document.getElementById('hc');hc.width=img.width;hc.height=img.height;
        const ctx=hc.getContext('2d',{willReadFrequently:1});ctx.drawImage(img,0,0);
        logBox.innerHTML='';addLog('🚀 解析上传图片');
        const{gray,w,h}=toGray(ctx.getImageData(0,0,img.width,img.height));
        const bin=toBin(gray,w,h);
        const pts=findFinders(bin,w,h);if(pts.length<10){resultDisplay.textContent='❌';return;}
        const clusters=cluster(pts,Math.floor(w/15));if(clusters.length<3){resultDisplay.textContent='❌';return;}
        const{tl,tr,bl}=order(clusters.slice(0,3));
        const avgMod=(tl.modSize+tr.modSize+bl.modSize)/3;
        const d1=Math.sqrt((tr.x-tl.x)**2+(tr.y-tl.y)**2),d2=Math.sqrt((bl.x-tl.x)**2+(bl.y-tl.y)**2);
        const ev=Math.round(((d1+d2)/2/avgMod-10)/4),v=Math.max(1,Math.min(10,ev)),sz=17+v*4;
        const dcw=VD[v]?VD[v][1]:26,ecw=VD[v]?VD[v][2]:44,total=VD[v]?VD[v][0]:70;
        addLog('v'+v+' dataCW='+dcw+' ecCW='+ecw);
        const m=extractM(bin,w,h,tl,tr,bl,sz);
        for(const inv of[0,1]){
          const um=m.map(r=>new Uint32Array(r));if(inv)for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)um[r][c]^=1;
          for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(r===6||c===6)continue;if(!((r+c)&1))um[r][c]^=1;}
          const bits=readBits(um,sz);
          const allCW=[];for(let i=0;i<total&&i*8<bits.length;i++){let cw=0;for(let j=0;j<8;j++)cw=(cw<<1)|bits[i*8+j];allCW.push(cw);}
          const corrected=rsFix(allCW,ecw,dcw);
          if(corrected){
            const dataCWarr=corrected.slice(0,dcw);
            if(dataCWarr.length<2)continue;
            const mode=(dataCWarr[0]>>4)&0xF,count=((dataCWarr[0]&0xF)<<4)|((dataCWarr[1]>>4)&0xF);
            let bits2=(dataCWarr[1]&0xF).toString(2).padStart(4,'0');
            const bytes=[];for(let i=2;i<dataCWarr.length&&bytes.length<count;i++){bits2+=dataCWarr[i].toString(2).padStart(8,'0');while(bits2.length>=8&&bytes.length<count){bytes.push(parseInt(bits2.substring(0,8),2));bits2=bits2.substring(8);}}
            const text=decodeBytes(bytes);
            addLog((inv?'反转':'正常')+' RS: '+text);
            if(text&&/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(text)){resultDisplay.textContent='✅ '+text;resultDisplay.className='ok';return;}
          }
        }
        resultDisplay.textContent='❌';resultDisplay.className='';
      };img.src=ev.target.result;};reader.readAsDataURL(f);fileInput.value='';
    });

    setTimeout(()=>document.getElementById('testBtn').click(),300);
  </script>
</body>
</html>
