<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纯手写二维码解析器 | 定位点最终修复版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Segoe UI', Roboto, system-ui, sans-serif; min-height: 100vh; padding: 2rem 1rem; color: #e0e0e0; }
    .container { max-width: 850px; margin: 0 auto; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 1.5rem; padding: 1.8rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; }
    .upload-box { border: 2px dashed rgba(255,255,255,0.3); border-radius: 1rem; padding: 2rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); margin-bottom: 1rem; }
    .upload-box:hover { border-color: #43e97b; }
    .upload-box.dragging { border-color: #43e97b; background: rgba(0,0,0,0.45); }
    .btn { width: 100%; padding: 0.8rem; border: none; border-radius: 0.7rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: white; margin-bottom: 0.6rem; }
    .btn-row { display: flex; gap: 0.8rem; }
    .btn-row .btn { flex: 1; }
    .result-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 1rem; margin-top: 1rem; }
    .result-content { font-size: 1.2rem; font-weight: 600; color: #43e97b; word-break: break-all; min-height: 1.5rem; }
    .result-content.empty { color: #666; }
    .log-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 0.8rem; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #43e97b; max-height: 300px; overflow-y: auto; margin-top: 0.5rem; white-space: pre-wrap; }
    .preview-area { display: flex; justify-content: center; align-items: center; padding: 1rem; background: white; border-radius: 1rem; margin: 1rem 0; }
    .video-container { width: 100%; max-width: 300px; margin: 0 auto 1rem; border-radius: 1rem; overflow: hidden; background: #000; aspect-ratio: 1; display: none; }
    .video-container.active { display: block; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 纯手写二维码解析器</h1>
    <p style="text-align:center;color:#8892b0;margin-bottom:1.5rem;">最终修复版 · 每行独立扫描</p>
    <div class="card">
      <div class="upload-box" id="uploadBox">
        <div style="font-size:3rem;">🖼️</div>
        <div>点击上传 或 拖拽二维码图片</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <div class="video-container" id="videoContainer"><video id="video" autoplay playsinline muted></video></div>
      <div class="btn-row">
        <button class="btn" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" id="cameraBtn">📸 打开相机</button>
        <button class="btn" style="background:linear-gradient(135deg,#ff6b6b,#ee5a24);display:none;" id="stopBtn">⏹️ 关闭</button>
      </div>
      <div class="preview-area" id="previewArea"><span style="color:#bbb;">图片预览</span></div>
    </div>
    <div class="card">
      <div class="result-box">
        <div style="font-size:0.8rem;color:#8892b0;">🔍 解析结果</div>
        <div class="result-content empty" id="scanResult">等待解析...</div>
      </div>
      <div class="btn-row">
        <button class="btn" style="background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e;" id="copyBtn">📋 复制</button>
        <button class="btn" style="background:linear-gradient(135deg,#4facfe,#00f2fe);color:#1a1a2e;" id="openBtn">🔗 打开</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    // ===================================================================
    // 二维码解析器 - 每行独立扫描定位点
    // 核心思路：扫描每一行，记录黑白交替的连续段
    // ===================================================================

    function toGray(imageData) {
      const { data, width, height } = imageData;
      const gray = new Uint8Array(width * height);
      for (let i = 0; i < width * height; i++) {
        gray[i] = Math.round(data[i*4]*0.299 + data[i*4+1]*0.587 + data[i*4+2]*0.114);
      }
      return { gray, width, height };
    }

    function toBinary(gray, width, height) {
      let sum = 0, min = 255, max = 0;
      for (let i = 0; i < gray.length; i++) {
        sum += gray[i];
        if (gray[i] < min) min = gray[i];
        if (gray[i] > max) max = gray[i];
      }
      const avg = sum / gray.length;
      const thresh = min + (max - min) * 0.35; // 偏暗的阈值
      
      const bin = new Uint8Array(width * height);
      for (let i = 0; i < gray.length; i++) {
        bin[i] = gray[i] < thresh ? 0 : 1;
      }
      return bin;
    }

    // ==================== 核心：扫描每一行找定位点模式 ====================
    function scanRow(bin, width, y) {
      const candidates = [];
      
      // 记录连续同色段的长度
      const segments = []; // { color, length }
      let currentColor = bin[y * width];
      let currentLength = 1;
      
      for (let x = 1; x < width; x++) {
        const color = bin[y * width + x];
        if (color === currentColor) {
          currentLength++;
        } else {
          segments.push({ color: currentColor, length: currentLength });
          currentColor = color;
          currentLength = 1;
        }
      }
      segments.push({ color: currentColor, length: currentLength });
      
      // 遍历连续的5段，找 黑-白-黑-白-黑 模式
      for (let i = 0; i < segments.length - 4; i++) {
        const s = segments.slice(i, i + 5);
        
        // 检查颜色模式：黑(0) 白(1) 黑(0) 白(1) 黑(0)
        if (s[0].color === 0 && s[1].color === 1 && s[2].color === 0 && s[3].color === 1 && s[4].color === 0) {
          const totalWidth = s[0].length + s[1].length + s[2].length + s[3].length + s[4].length;
          const moduleSize = totalWidth / 7;
          
          // 检查比例 1:1:3:1:1
          const ratios = s.map(seg => seg.length / moduleSize);
          const expected = [1, 1, 3, 1, 1];
          let maxDev = 0;
          for (let j = 0; j < 5; j++) {
            const dev = Math.abs(ratios[j] - expected[j]);
            if (dev > maxDev) maxDev = dev;
          }
          
          if (maxDev < 2.0 && moduleSize > 1.5) {
            // 计算这段的起始x和中心x
            let startX = 0;
            for (let j = 0; j < i; j++) startX += segments[j].length;
            const endX = startX + s[0].length + s[1].length + s[2].length + s[3].length + s[4].length;
            const centerX = startX + s[0].length + s[1].length + Math.floor(s[2].length / 2);
            
            candidates.push({
              x: centerX,
              y: y,
              moduleSize: moduleSize,
              totalWidth: totalWidth
            });
          }
        }
      }
      
      return candidates;
    }

    function findAllCandidates(bin, width, height) {
      const allCandidates = [];
      
      // 每隔3行扫描一次（加快速度）
      for (let y = 0; y < height; y += 3) {
        const rowCandidates = scanRow(bin, width, y);
        allCandidates.push(...rowCandidates);
      }
      
      addLog('   扫描了 ' + Math.ceil(height/3) + ' 行，找到 ' + allCandidates.length + ' 个候选');
      return allCandidates;
    }

    // 聚类
    function clusterCandidates(candidates, maxDist) {
      const clusters = [];
      
      for (const pt of candidates) {
        let added = false;
        for (const cluster of clusters) {
          const dx = pt.x - cluster.cx;
          const dy = pt.y - cluster.cy;
          if (Math.abs(dx) < maxDist && Math.abs(dy) < maxDist * 2) {
            cluster.points.push(pt);
            cluster.sumX += pt.x;
            cluster.sumY += pt.y;
            cluster.sumModule += pt.moduleSize;
            added = true;
            break;
          }
        }
        if (!added) {
          clusters.push({
            points: [pt],
            sumX: pt.x,
            sumY: pt.y,
            sumModule: pt.moduleSize
          });
        }
      }
      
      return clusters
        .filter(c => c.points.length >= 8)
        .map(c => ({
          x: Math.round(c.sumX / c.points.length),
          y: Math.round(c.sumY / c.points.length),
          moduleSize: c.sumModule / c.points.length,
          count: c.points.length
        }));
    }

    function orderFinders(finders) {
      if (finders.length !== 3) return null;
      
      const [a, b, c] = finders;
      
      // 计算两两距离
      const d01 = Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
      const d02 = Math.sqrt((a.x-c.x)**2 + (a.y-c.y)**2);
      const d12 = Math.sqrt((b.x-c.x)**2 + (b.y-c.y)**2);
      
      // 最长距离的两个点是对角线，第三个点是直角顶点附近
      let tl, tr, bl;
      
      if (d01 > d02 && d01 > d12) {
        // a和b是对角线，c是第三个
        if (a.x + a.y < b.x + b.y) { tl = a; } else { tl = b; tr = b === tl ? a : b; }
        if (c.x < (a.x + b.x) / 2) { bl = c; tr = tl === a ? b : a; } else { tr = c; bl = tl === a ? b : a; }
      } else if (d02 > d01 && d02 > d12) {
        if (a.x + a.y < c.x + c.y) { tl = a; } else { tl = c; }
        if (b.x < (a.x + c.x) / 2) { bl = b; tr = tl === a ? c : a; } else { tr = b; bl = tl === a ? c : a; }
      } else {
        if (b.x + b.y < c.x + c.y) { tl = b; } else { tl = c; }
        if (a.x < (b.x + c.x) / 2) { bl = a; tr = tl === b ? c : b; } else { tr = a; bl = tl === b ? c : b; }
      }
      
      return { topLeft: tl, topRight: tr, bottomLeft: bl };
    }

    function computeVersion(tl, tr, bl) {
      const d1 = Math.sqrt((tr.x-tl.x)**2 + (tr.y-tl.y)**2);
      const d2 = Math.sqrt((bl.x-tl.x)**2 + (bl.y-tl.y)**2);
      const avgDist = (d1 + d2) / 2;
      const avgModule = (tl.moduleSize + tr.moduleSize + bl.moduleSize) / 3;
      const modules = avgDist / avgModule;
      const v = Math.round((modules - 10) / 4);
      const version = Math.max(1, Math.min(10, v));
      return { version, size: 17 + version * 4 };
    }

    function extractMatrix(bin, width, height, tl, tr, bl, size) {
      const matrix = Array.from({ length: size }, () => new Int32Array(size));
      const dx1 = (tr.x - tl.x) / (size - 1);
      const dy1 = (tr.y - tl.y) / (size - 1);
      const dx2 = (bl.x - tl.x) / (size - 1);
      const dy2 = (bl.y - tl.y) / (size - 1);
      const sampleR = Math.max(1, Math.floor((tl.moduleSize + tr.moduleSize + bl.moduleSize) / 9));

      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          const sx = tl.x + col * dx1 + row * dx2;
          const sy = tl.y + col * dy1 + row * dy2;
          
          let black = 0, total = 0;
          for (let dy = -sampleR; dy <= sampleR; dy++) {
            for (let dx = -sampleR; dx <= sampleR; dx++) {
              const ix = Math.round(sx + dx);
              const iy = Math.round(sy + dy);
              if (ix >= 0 && ix < width && iy >= 0 && iy < height) {
                if (bin[iy * width + ix] === 0) black++;
                total++;
              }
            }
          }
          matrix[row][col] = (total > 0 && black > total * 0.5) ? 1 : 0;
        }
      }
      return matrix;
    }

    function unmask(matrix, size) {
      let best = null, bestScore = -1;
      for (let mask = 0; mask < 8; mask++) {
        const test = matrix.map(r => new Int32Array(r));
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (r === 6 || c === 6) continue;
            let invert = false;
            switch (mask) {
              case 0: invert = (r+c)%2===0; break;
              case 1: invert = r%2===0; break;
              case 2: invert = c%3===0; break;
              case 3: invert = (r+c)%3===0; break;
              case 4: invert = (Math.floor(r/2)+Math.floor(c/3))%2===0; break;
              case 5: invert = ((r*c)%2)+((r*c)%3)===0; break;
              case 6: invert = (((r*c)%2)+((r*c)%3))%2===0; break;
              case 7: invert = (((r+c)%2)+((r*c)%3))%2===0; break;
            }
            if (invert) test[r][c] ^= 1;
          }
        }
        // 评分
        let score = 0;
        const pos = [[0,0],[0,size-7],[size-7,0]];
        for (const [fr,fc] of pos) {
          for (let dr=0; dr<7; dr++) {
            for (let dc=0; dc<7; dc++) {
              const er=fr+dr, ec=fc+dc;
              if (er<size && ec<size) {
                const expected = (dr===0||dr===6||dc===0||dc===6)||(dr>=2&&dr<=4&&dc>=2&&dc<=4) ? 1 : 0;
                if (test[er][ec]===expected) score++;
              }
            }
          }
        }
        if (score > bestScore) { bestScore = score; best = test; }
      }
      return best || matrix;
    }

    function extractBits(matrix, size) {
      const bits = [];
      let up = true;
      for (let col = size-1; col >= 0; col -= 2) {
        const rc = col===6 ? 5 : col;
        for (let row = up ? size-1 : 0; up ? row>=0 : row<size; row += up ? -1 : 1) {
          for (let c = rc; c >= rc-1; c--) {
            if (row<9 && c<9) continue;
            if (row<9 && c>size-9) continue;
            if (row>size-9 && c<9) continue;
            if (row===6 || c===6) continue;
            bits.push(matrix[row][c]);
          }
        }
        up = !up;
      }
      return bits;
    }

    function decodeBits(bits) {
      if (bits.length < 12) return null;
      let mode = 0;
      for (let i=0; i<4; i++) mode = (mode<<1)|bits[i];
      if (mode !== 4) return null;
      let count = 0;
      for (let i=0; i<8; i++) count = (count<<1)|bits[4+i];
      if (count<=0 || count>500) return null;
      const bytes = [];
      for (let i=0; i<count && 12+(i+1)*8<=bits.length; i++) {
        let b = 0;
        for (let j=0; j<8; j++) b = (b<<1)|bits[12+i*8+j];
        bytes.push(b);
      }
      if (bytes.length===0) return null;
      try { return new TextDecoder().decode(new Uint8Array(bytes)); }
      catch(e) { return null; }
    }

    // ==================== 主流程 ====================
    function decodeQR(imageData) {
      const { gray, width, height } = toGray(imageData);
      addLog('📊 图片: ' + width + '×' + height);
      
      const bin = toBinary(gray, width, height);
      addLog('🔲 二值化完成');
      
      addLog('🔍 扫描定位点...');
      const candidates = findAllCandidates(bin, width, height);
      
      if (candidates.length < 10) {
        addLog('❌ 候选点太少(' + candidates.length + ')，可能不是二维码');
        return null;
      }
      
      const clusters = clusterCandidates(candidates, 25);
      addLog('   聚类: ' + clusters.length + ' 个有效簇');
      
      if (clusters.length < 3) {
        addLog('❌ 有效簇不足(' + clusters.length + ')，需要至少3个');
        return null;
      }
      
      const top3 = clusters.sort((a,b) => b.count - a.count).slice(0, 3);
      addLog('   Top3点数: ' + top3.map(c=>c.count).join(', '));
      
      const ordered = orderFinders(top3);
      if (!ordered) {
        addLog('❌ 定位点排序失败');
        return null;
      }
      
      addLog('   TL:('+ordered.topLeft.x+','+ordered.topLeft.y+')');
      addLog('   TR:('+ordered.topRight.x+','+ordered.topRight.y+')');
      addLog('   BL:('+ordered.bottomLeft.x+','+ordered.bottomLeft.y+')');
      
      const { version, size } = computeVersion(ordered.topLeft, ordered.topRight, ordered.bottomLeft);
      addLog('📐 版本: ' + version + ', 矩阵: ' + size + '×' + size);
      
      const matrix = extractMatrix(bin, width, height, ordered.topLeft, ordered.topRight, ordered.bottomLeft, size);
      addLog('📊 矩阵提取完成');
      
      const unmasked = unmask(matrix, size);
      addLog('🎭 去掩码完成');
      
      const bits = extractBits(unmasked, size);
      addLog('📦 提取 ' + bits.length + ' 位数据');
      
      const result = decodeBits(bits);
      if (result) {
        addLog('✅ 解析成功: ' + result.substring(0, 50));
        return result;
      }
      
      addLog('❌ 解码失败');
      return null;
    }

    // ==================== UI ====================
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const cameraBtn = document.getElementById('cameraBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scanResult = document.getElementById('scanResult');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const previewArea = document.getElementById('previewArea');
    const logBox = document.getElementById('logBox');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
    let cameraStream = null, lastResult = '', scanTimer = null;

    function addLog(msg) {
      const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      logBox.textContent += '[' + t + '] ' + msg + '\n';
      logBox.scrollTop = logBox.scrollHeight;
    }
    function clearLog() { logBox.textContent = ''; }

    function processImage(img) {
      clearLog();
      addLog('🚀 === 开始解析 ===');
      hiddenCanvas.width = img.width;
      hiddenCanvas.height = img.height;
      hiddenCtx.drawImage(img, 0, 0);
      const imageData = hiddenCtx.getImageData(0, 0, img.width, img.height);
      const result = decodeQR(imageData);
      if (result) {
        scanResult.textContent = result;
        scanResult.classList.remove('empty');
        lastResult = result;
      } else {
        scanResult.textContent = '解析失败';
        scanResult.classList.add('empty');
        lastResult = '';
      }
    }

    uploadBox.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          previewArea.innerHTML = '';
          const di = document.createElement('img');
          di.src = ev.target.result;
          di.style.maxWidth = '100%'; di.style.maxHeight = '250px';
          previewArea.appendChild(di);
          processImage(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    });
    uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('dragging'); });
    uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragging'));
    uploadBox.addEventListener('drop', e => {
      e.preventDefault(); uploadBox.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          previewArea.innerHTML = '';
          const di = document.createElement('img');
          di.src = ev.target.result;
          di.style.maxWidth = '100%'; di.style.maxHeight = '250px';
          previewArea.appendChild(di);
          processImage(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    cameraBtn.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 } }, audio: false });
        video.srcObject = cameraStream;
        videoContainer.classList.add('active');
        cameraBtn.style.display = 'none'; stopBtn.style.display = 'block';
        addLog('📸 摄像头已开启');
        function scan() {
          if (!cameraStream) return;
          if (video.readyState >= 2 && video.videoWidth > 0) {
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            hiddenCtx.drawImage(video, 0, 0);
            const imageData = hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
            clearLog();
            const result = decodeQR(imageData);
            if (result && result !== lastResult) {
              scanResult.textContent = result;
              scanResult.classList.remove('empty');
              lastResult = result;
            }
          }
          scanTimer = setTimeout(scan, 500);
        }
        scan();
      } catch (err) { addLog('❌ ' + err.message); }
    });
    stopBtn.addEventListener('click', () => {
      if (scanTimer) clearTimeout(scanTimer);
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      video.srcObject = null;
      videoContainer.classList.remove('active');
      cameraBtn.style.display = 'block'; stopBtn.style.display = 'none';
    });
    copyBtn.addEventListener('click', () => {
      if (!lastResult) return;
      navigator.clipboard.writeText(lastResult).then(() => addLog('📋 已复制'));
    });
    openBtn.addEventListener('click', () => {
      if (!lastResult) return;
      try { new URL(lastResult); window.open(lastResult, '_blank'); }
      catch(e) { if (/^[\w.-]+\.[a-z]{2,}/i.test(lastResult)) window.open('https://'+lastResult, '_blank'); }
    });
    window.addEventListener('beforeunload', () => {
      if (scanTimer) clearTimeout(scanTimer);
      if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    });
  </script>
</body>
</html>
