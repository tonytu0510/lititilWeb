<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码自测 v24 修复填充</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 1rem; color: #e0e0e0; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.3rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 0.8rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 0.8rem; }
    .flex-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .flex-row > * { flex: 1; min-width: 180px; }
    input, button { width: 100%; padding: 0.5rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 0.4rem; background: rgba(0,0,0,0.3); color: #e0e0e0; font-size: 0.8rem; margin-bottom: 0.3rem; }
    button { cursor: pointer; background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; font-weight: 600; border: none; }
    .qr-box { display: flex; justify-content: center; padding: 0.3rem; background: white; border-radius: 0.4rem; }
    .qr-box canvas { max-width: 120px; }
    .log-box { background: rgba(0,0,0,0.3); border-radius: 0.4rem; padding: 0.4rem; font-family: monospace; font-size: 0.6rem; color: #43e97b; max-height: 300px; overflow-y: auto; white-space: pre-wrap; line-height: 1.2; }
    .result { font-size: 0.9rem; font-weight: 600; padding: 0.3rem; text-align: center; }
    .result.ok { color: #43e97b; }
    .result.fail { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔳 v24 修复填充</h1>
    <div class="flex-row">
      <div><input id="testUrl" value="https://www.lititil.com"><button id="testBtn">生成+解析</button></div>
      <div><input type="file" id="fileInput" accept="image/*" style="display:none;"><button id="uploadBtn">📁 上传</button></div>
    </div>
    <div class="flex-row">
      <div class="card" style="text-align:center;"><div style="font-size:0.6rem;color:#8892b0;">二维码</div><div class="qr-box"><div id="qrDisplay"></div></div></div>
      <div class="card"><div class="result" id="resultDisplay">等待...</div><div class="log-box" id="logBox"></div></div>
    </div>
  </div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    const GF_EXP=new Int32Array(512),GF_LOG=new Int32Array(256);
    (()=>{let x=1;for(let i=0;i<255;i++){GF_EXP[i]=x;GF_LOG[x]=i;x<<=1;if(x&0x100)x^=0x11D;}for(let i=255;i<512;i++)GF_EXP[i]=GF_EXP[i-255];})();
    function gfMul(a,b){return(a===0||b===0)?0:GF_EXP[GF_LOG[a]+GF_LOG[b]];}
    function polyMod(d,div){let r=new Int32Array(d);for(let i=0;i<d.length-div.length+1;i++){if(r[i]!==0)for(let j=1;j<div.length;j++)r[i+j]^=gfMul(div[j],r[i]);}return r.slice(r.length-div.length+1);}
    function genPoly(n){let g=[1];for(let i=0;i<n;i++){g.push(0);for(let j=g.length-1;j>0;j--)g[j]=gfMul(g[j-1],GF_EXP[i])^g[j];}return new Int32Array(g);}
    const VD={1:[26,9,17],2:[44,16,28],3:[70,26,44],4:[100,36,64],5:[134,46,88],6:[172,60,112],7:[196,66,130],8:[242,86,156],9:[292,100,192],10:[346,122,224]};

    function generateQR(text,ms){
      const bytes=new TextEncoder().encode(text);
      let v=1;while(v<=10&&VD[v][1]<bytes.length+2)v++;
      const[total,data,ec]=VD[v],sz=17+v*4;
      const bits=[0,1,0,0];const cnt=bytes.length;for(let i=7;i>=0;i--)bits.push((cnt>>i)&1);
      for(const b of bytes)for(let i=7;i>=0;i--)bits.push((b>>i)&1);
      while(bits.length%8!==0)bits.push(0);
      while(bits.length<data*8){bits.push(1,1,1,0,1,1,0,0);if(bits.length>=data*8)break;bits.push(0,0,0,1,0,0,0,1);}
      bits.length=data*8;
      const dc=[];for(let i=0;i<bits.length;i+=8){let c=0;for(let j=0;j<8;j++)c=(c<<1)|bits[i+j];dc.push(c);}
      const gen=genPoly(ec);const msg=new Int32Array(data+ec);msg.set(dc);
      const rem=Array.from(polyMod(msg,gen));const all=[...dc,...rem];
      const m=Array.from({length:sz},()=>new Int32Array(sz).fill(-1));
      for(let i=8;i<sz-8;i++){m[6][i]=i%2===0?1:0;m[i][6]=i%2===0?1:0;}
      if(v>=2){const n=Math.floor(v/7)+2,step=Math.floor((v*4+4)/(n-1));const locs=[6];let p=v*4+10;for(let i=1;i<n;i++){locs.push(p);p-=step;}locs.reverse();for(const r of locs)for(const c of locs)for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<sz&&cc>=0&&cc<sz)m[rr][cc]=(Math.abs(dr)===2||Math.abs(dc)===2||(dr===0&&dc===0))?1:0;}}
      const allBits=[];for(const cw of all)for(let i=7;i>=0;i--)allBits.push((cw>>i)&1);
      let bi=0,up=true;
      for(let col=sz-1;col>=0;col-=2){const rc=col===6?5:col;for(let row=up?sz-1:0;up?row>=0:row<sz;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){if(c<0||c>=sz)continue;if(row===6||c===6)continue;if(m[row][c]===-1){m[row][c]=bi<allBits.length?allBits[bi]:0;bi++;}}}up=!up;}
      for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)if(m[r][c]===-1)m[r][c]=0;
      const masked=m.map(r=>new Int32Array(r));
      for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(r===6||c===6)continue;if((r+c)%2===0)masked[r][c]^=1;}
      const border=4,cs=(sz+border*2)*ms;
      const canvas=document.createElement('canvas');canvas.width=cs;canvas.height=cs;
      const ctx=canvas.getContext('2d');ctx.fillStyle='#FFF';ctx.fillRect(0,0,cs,cs);
      for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){ctx.fillStyle=masked[r][c]?'#000':'#FFF';ctx.fillRect((c+border)*ms,(r+border)*ms,ms,ms);}
      const fcx=(3+border)*ms+Math.floor(ms/2);
      return{canvas,matrix:masked,version:v,size:sz,dataCW:data,ecCW:ec,totalCW:total,allCodewords:all,moduleSize:ms,border,finderCX:fcx};
    }

    function toGray(d){const g=new Uint8Array(d.width*d.height);for(let i=0;i<g.length;i++)g[i]=Math.round(d.data[i*4]*0.299+d.data[i*4+1]*0.587+d.data[i*4+2]*0.114);return{gray:g,width:d.width,height:d.height};}
    function toBinary(g,w,h){let mn=255,mx=0;for(let i=0;i<g.length;i++){if(g[i]<mn)mn=g[i];if(g[i]>mx)mx=g[i];}const th=mn+(mx-mn)*0.4;const b=new Uint8Array(w*h);for(let i=0;i<g.length;i++)b[i]=g[i]<th?0:1;return b;}
    function extractMatrix(bin,w,h,tl,tr,bl,size){
      const m=Array.from({length:size},()=>new Uint32Array(size));
      const dx1=(tr.x-tl.x)/(size-7),dy1=(tr.y-tl.y)/(size-7),dx2=(bl.x-tl.x)/(size-7),dy2=(bl.y-tl.y)/(size-7);
      const ox=tl.x-dx1*3-dx2*3,oy=tl.y-dy1*3-dy2*3;
      for(let r=0;r<size;r++)for(let c=0;c<size;c++){const ix=Math.round(ox+c*dx1+r*dx2),iy=Math.round(oy+c*dy1+r*dy2);if(ix>=0&&ix<w&&iy>=0&&iy<h)m[r][c]=bin[iy*w+ix]===0?1:0;}
      return m;
    }
    function readBits(m,size){
      const bits=[];let up=true;
      for(let col=size-1;col>=0;col-=2){const rc=col===6?5:col;
        for(let row=up?size-1:0;up?row>=0:row<size;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){
          if(c<0||c>=size)continue;if(row===6||c===6)continue;
          bits.push(m[row][c]);
        }}up=!up;}
      return bits;
    }

    // 修复：截断填充字节
    function decodeBytes(bytes, count){
      // 取前count个字节，但截断在填充字节(0xEC,0x11)或不可打印字符之前
      let end=count;
      for(let i=0;i<count-1;i++){
        if(bytes[i]===0xEC&&bytes[i+1]===0x11){end=i;break;}
        if(bytes[i]===0x11&&bytes[i+1]===0xEC){end=i;break;}
      }
      // 也截断在连续不可打印字符处
      let nonPrintable=0;
      for(let i=0;i<count;i++){
        if(bytes[i]<0x20||bytes[i]>0x7E)nonPrintable++;
        else nonPrintable=0;
        if(nonPrintable>=2){end=Math.min(end,i-nonPrintable+1);break;}
      }
      const clean=bytes.slice(0,end);
      return new TextDecoder().decode(new Uint8Array(clean));
    }

    const logBox=document.getElementById('logBox'),resultDisplay=document.getElementById('resultDisplay');
    function addLog(msg){logBox.innerHTML+=msg+'\n';logBox.scrollTop=logBox.scrollHeight;}

    document.getElementById('testBtn').addEventListener('click',()=>{
      logBox.innerHTML='';resultDisplay.textContent='⏳';resultDisplay.className='result';
      const url=document.getElementById('testUrl').value.trim();if(!url)return;
      const gen=generateQR(url,8);
      document.getElementById('qrDisplay').innerHTML='';
      document.getElementById('qrDisplay').appendChild(gen.canvas);
      addLog('生成: v'+gen.version+' '+gen.size+'×'+gen.size);
      addLog('期望: '+url);
      
      setTimeout(()=>{
        const hc=document.getElementById('hiddenCanvas');
        hc.width=gen.canvas.width;hc.height=gen.canvas.height;
        const ctx=hc.getContext('2d',{willReadFrequently:true});
        ctx.drawImage(gen.canvas,0,0);
        const id=ctx.getImageData(0,0,hc.width,hc.height);
        const{gray,width,height}=toGray(id);
        const bin=toBinary(gray,width,height);
        const ms=8,border=4,fcx=(3+border)*ms+Math.floor(ms/2);
        const tl={x:fcx,y:fcx,moduleSize:ms},tr={x:fcx+(gen.size-7)*ms,y:fcx,moduleSize:ms},bl={x:fcx,y:fcx+(gen.size-7)*ms,moduleSize:ms};
        const m=extractMatrix(bin,width,height,tl,tr,bl,gen.size);
        let match=0;for(let r=0;r<gen.size;r++)for(let c=0;c<gen.size;c++)if(m[r][c]===gen.matrix[r][c])match++;
        addLog('匹配: '+match+'/'+(gen.size*gen.size)+' ('+(match/(gen.size*gen.size)*100).toFixed(1)+'%)');
        
        const um=m.map(r=>new Uint32Array(r));
        for(let r=0;r<gen.size;r++)for(let c=0;c<gen.size;c++){if(r===6||c===6)continue;if((r+c)%2===0)um[r][c]^=1;}
        const bits=readBits(um,gen.size);
        let mode=0;for(let i=0;i<4;i++)mode=(mode<<1)|bits[i];
        let count=0;for(let i=0;i<8;i++)count=(count<<1)|bits[4+i];
        addLog('mode='+mode+' count='+count);
        
        const bytes=[];for(let i=0;i<count;i++){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[12+i*8+j];bytes.push(b);}
        addLog('bytes(hex): '+bytes.map(b=>b.toString(16).padStart(2,'0')).join(' '));
        
        const text=decodeBytes(bytes,count);
        addLog('结果: "'+text+'"');
        if(text===url){resultDisplay.textContent='✅ '+text;resultDisplay.className='result ok';}
        else{resultDisplay.textContent='⚠️ '+text;resultDisplay.className='result fail';}
      },100);
    });

    document.getElementById('uploadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{
        document.getElementById('qrDisplay').innerHTML='';const oi=document.createElement('img');oi.src=ev.target.result;oi.style.maxWidth='120px';document.getElementById('qrDisplay').appendChild(oi);
        const hc=document.getElementById('hiddenCanvas');hc.width=img.width;hc.height=img.height;
        const ctx=hc.getContext('2d',{willReadFrequently:true});ctx.drawImage(img,0,0);
        logBox.innerHTML='';
        const{gray,width,height}=toGray(ctx.getImageData(0,0,img.width,img.height));
        const bin=toBinary(gray,width,height);
        const a=[];for(let y=0;y<height;y+=2){const s=[];let cl=bin[y*width],ln=1;for(let x=1;x<width;x++){const co=bin[y*width+x];if(co===cl)ln++;else{s.push({color:cl,len:ln,startX:x-ln});cl=co;ln=1;}}s.push({color:cl,len:ln,startX:width-ln});for(let i=0;i<s.length-4;i++){const sg=s.slice(i,i+5);if(sg[0].color===0&&sg[1].color===1&&sg[2].color===0&&sg[3].color===1&&sg[4].color===0){const t=sg[0].len+sg[1].len+sg[2].len+sg[3].len+sg[4].len,ms2=t/7;const ra=sg.map(x=>x.len/ms2);let ok=true;for(let j=0;j<5;j++){if(ra[j]<0.3||ra[j]>4.0){ok=false;break;}}if(ok&&ms2>1.0)a.push({x:sg[0].startX+sg[0].len+sg[1].len+Math.floor(sg[2].len/2),y,modSize:ms2});}}}
        if(a.length<3){resultDisplay.textContent='❌';return;}
        const g2={};for(const p of a){const k=Math.floor(p.x/15)+','+Math.floor(p.y/15);if(!g2[k])g2[k]={pts:[],sx:0,sy:0,sm:0};g2[k].pts.push(p);g2[k].sx+=p.x;g2[k].sy+=p.y;g2[k].sm+=p.modSize;}
        const cells=Object.values(g2).filter(c=>c.pts.length>=3),clusters=[];for(let i=0;i<cells.length;i++){if(cells[i]._used)continue;let cx=cells[i].sx/cells[i].pts.length,cy=cells[i].sy/cells[i].pts.length,cm=cells[i].sm/cells[i].pts.length,count=cells[i].pts.length;let ch=true;while(ch){ch=false;for(let j=i+1;j<cells.length;j++){if(cells[j]._used)continue;const jx=cells[j].sx/cells[j].pts.length,jy=cells[j].sy/cells[j].pts.length;if(Math.abs(cx-jx)<45&&Math.abs(cy-jy)<45){cx=(cx*count+jx*cells[j].pts.length)/(count+cells[j].pts.length);cy=(cy*count+jy*cells[j].pts.length)/(count+cells[j].pts.length);cm=(cm*count+(cells[j].sm/cells[j].pts.length)*cells[j].pts.length)/(count+cells[j].pts.length);count+=cells[j].pts.length;cells[j]._used=true;ch=true;}}}clusters.push({x:Math.round(cx),y:Math.round(cy),moduleSize:cm,count});}
        const top3=clusters.filter(x=>x.count>=5).sort((a,b)=>b.count-a.count).slice(0,3);
        if(top3.length<3){resultDisplay.textContent='❌';return;}
        const tl=top3.reduce((a,b)=>(a.x+a.y)<(b.x+b.y)?a:b);const rest=top3.filter(p=>p!==tl);const tr=rest.reduce((a,b)=>a.x>b.x?a:b);const bl=rest.find(p=>p!==tr);
        addLog('TL('+tl.x+','+tl.y+') TR('+tr.x+','+tr.y+') BL('+bl.x+','+bl.y+')');
        const avgMod=(tl.moduleSize+tr.moduleSize+bl.moduleSize)/3;
        const d1=Math.sqrt((tr.x-tl.x)**2+(tr.y-tl.y)**2),d2=Math.sqrt((bl.x-tl.x)**2+(bl.y-tl.y)**2);
        const ev=Math.round(((d1+d2)/2/avgMod-10)/4),v=Math.max(1,Math.min(10,ev)),sz=17+v*4;
        const dcw=VD[v]?VD[v][1]:26;addLog('v'+v+' '+sz+'×'+sz);
        const m=extractMatrix(bin,width,height,tl,tr,bl,sz);
        // 尝试掩码0
        for(const inv of[false,true]){
          const um=m.map(r=>new Uint32Array(r));
          if(inv)for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)um[r][c]^=1;
          for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(r===6||c===6)continue;if((r+c)%2===0)um[r][c]^=1;}
          const bits=readBits(um,sz);
          for(const off of[0,1,2,3,4,5,6,7,8,12,16,20,24,28,32]){
            const s=bits.slice(off);if(s.length<12)continue;
            let mode=0;for(let i=0;i<4;i++)mode=(mode<<1)|s[i];if(mode!==4)continue;
            let count=0;for(let i=0;i<8;i++)count=(count<<1)|s[4+i];if(count<1||count>dcw)continue;
            const bytes=[];for(let i=0;i<count;i++){let b=0;for(let j=0;j<8;j++)b=(b<<1)|s[12+i*8+j];bytes.push(b);}
            const text=decodeBytes(bytes,count);
            if(/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(text)){resultDisplay.textContent='✅ '+text;resultDisplay.className='result ok';return;}
          }
        }
        resultDisplay.textContent='❌';resultDisplay.className='result fail';
      };img.src=ev.target.result;};reader.readAsDataURL(f);fileInput.value='';
    });

    setTimeout(()=>document.getElementById('testBtn').click(),300);
  </script>
</body>
</html>
