  <script>
    // ==================== 兼容层：圆角矩形 ====================
    function drawRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    // ==================== GF(256) ====================
    const GF = (() => {
      const exp = new Int32Array(512), log = new Int32Array(256);
      let x = 1;
      for (let i = 0; i < 255; i++) {
        exp[i] = x; log[x] = i;
        x <<= 1; if (x & 0x100) x ^= 0x11D;
      }
      for (let i = 255; i < 512; i++) exp[i] = exp[i - 255];

      const mul = (a, b) => (a && b) ? exp[log[a] + log[b]] : 0;
      const polyEval = (p, x) => { let y = p[0]; for (let i = 1; i < p.length; i++) y = mul(y, x) ^ p[i]; return y; };
      const syndromes = (msg, nsym) => { for (let i = 0; i < nsym; i++) if (polyEval(msg, exp[i])) return 0; return 1; };

      const rsDecode = (msg, nsym) => {
        if (syndromes(msg, nsym)) return msg;
        const n = msg.length;
        for (let p = 0; p < n; p++) {
          for (let v = 1; v < 256; v++) {
            const t = [...msg]; t[p] ^= v;
            if (syndromes(t, nsym)) return t;
          }
        }
        return null;
      };

      const polyMod = (d, v) => {
        let r = new Int32Array(d);
        for (let i = 0; i < d.length - v.length + 1; i++) {
          if (r[i]) for (let j = 1; j < v.length; j++) r[i + j] ^= mul(v[j], r[i]);
        }
        return Array.from(r.slice(r.length - v.length + 1));
      };
      const genPoly = (n) => {
        let g = [1];
        for (let i = 0; i < n; i++) {
          g.push(0);
          for (let j = g.length - 1; j > 0; j--) g[j] = mul(g[j - 1], exp[i]) ^ g[j];
        }
        return new Int32Array(g);
      };
      return { exp, log, mul, polyEval, syndromes, rsDecode, polyMod, genPoly };
    })();

    // ==================== QR码版本表 ====================
    const VD = {
      1:  { L: [26, 19, 7],  M: [26, 16, 10], Q: [26, 13, 13], H: [26, 9, 17] },
      2:  { L: [44, 34, 10], M: [44, 28, 16], Q: [44, 22, 22], H: [44, 16, 28] },
      3:  { L: [70, 55, 15], M: [70, 44, 26], Q: [70, 34, 36], H: [70, 26, 44] },
      4:  { L: [100, 80, 20], M: [100, 64, 36], Q: [100, 48, 52], H: [100, 36, 64] },
      5:  { L: [134, 108, 26], M: [134, 86, 48], Q: [134, 62, 72], H: [134, 46, 88] },
      6:  { L: [172, 136, 36], M: [172, 108, 64], Q: [172, 76, 96], H: [172, 60, 112] },
      7:  { L: [196, 156, 40], M: [196, 124, 72], Q: [196, 88, 108], H: [196, 66, 130] },
      8:  { L: [242, 194, 48], M: [242, 154, 88], Q: [242, 110, 132], H: [242, 86, 156] },
      9:  { L: [292, 232, 60], M: [292, 182, 110], Q: [292, 132, 160], H: [292, 100, 192] },
      10: { L: [346, 274, 72], M: [346, 216, 130], Q: [346, 154, 192], H: [346, 122, 224] }
    };

    function getAlignmentLocs(v) {
      if (v === 1) return [];
      const n = Math.floor(v / 7) + 2;
      const step = Math.floor((v * 4 + 4) / (n - 1));
      const locs = [6];
      let p = v * 4 + 10;
      for (let i = 1; i < n; i++) { locs.push(p); p -= step; }
      locs.sort((a, b) => a - b);
      return locs;
    }

    // ==================== 日志工具 ====================
    const logBox = document.getElementById("logBox");
    const resultDisplay = document.getElementById("resultDisplay");

    function addLog(msg) {
      const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      logBox.innerHTML += `<span style="color:#666;">[${t}]</span> ${msg}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
      logBox.innerHTML = "";
      resultDisplay.textContent = "等待...";
      resultDisplay.className = "result";
    }

    // ==================== 核心生成器 ====================
    async function genQR(text, options) {
      const moduleSize = options.moduleSize || 8;
      const ecLevel = options.ecLevel || 'H';
      const removeFinders = options.removeFinders || false;
      const addLogo = options.addLogo || false;
      const logoCanvas = options.logoCanvas || null;

      addLog("🚀 === 开始生成二维码 ===");
      addLog(`📝 内容: "${text}"`);

      const bytes = new TextEncoder().encode(text);
      addLog(`📦 步骤1: 文本 → ${bytes.length} 字节`);

      const dataBitsNeeded = 4 + 8 + bytes.length * 8;
      const targetDC = Math.ceil(dataBitsNeeded / 8);

      let v = 1;
      while (v <= 10 && VD[v][ecLevel][1] < targetDC) v++;
      if (v > 10) throw new Error("文本太长，需要版本 > 10");

      const vd = VD[v][ecLevel];
      const totalCW = vd[0], dataCW = vd[1], ecCW = vd[2];
      const sz = 17 + v * 4;

      addLog(`🔢 步骤2: 版本 ${v} | 数据:${dataCW} 纠错:${ecCW}`);
      addLog(`🔐 步骤3: 数据码字${dataCW} + 纠错码字${ecCW} = 总${totalCW}`);
      addLog(`📐 步骤4: ${sz}×${sz} 矩阵 (初始值全-1)`);

      // 构建数据位流 - 使用标准填充
      const bits = [0, 1, 0, 0];  // 字节模式
      const lenByte = bytes.length;
      for (let i = 7; i >= 0; i--) bits.push((lenByte >> i) & 1);
      for (const b of bytes) {
        for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
      }

      // 标准填充
      const terminatorLen = Math.min(4, dataCW * 8 - bits.length);
      for (let i = 0; i < terminatorLen; i++) bits.push(0);
      while (bits.length % 8) bits.push(0);
      const padBytes = [0xEC, 0x11];
      let padIdx = 0;
      while (bits.length < dataCW * 8) {
        const pb = padBytes[padIdx % 2];
        for (let i = 7; i >= 0; i--) bits.push((pb >> i) & 1);
        padIdx++;
      }
      bits.length = dataCW * 8;

      // 转换为数据码字
      const dc = [];
      for (let i = 0; i < bits.length; i += 8) {
        let cw = 0;
        for (let j = 0; j < 8; j++) cw = (cw << 1) | bits[i + j];
        dc.push(cw);
      }

      // 生成纠错码
      const gen = GF.genPoly(ecCW);
      const msgArr = new Int32Array(dataCW + ecCW);
      msgArr.set(dc);
      const rem = GF.polyMod(msgArr, gen);
      const allCW = [...dc, ...rem];

      // 构建矩阵
      const m = [];
      for (let r = 0; r < sz; r++) {
        m[r] = new Int32Array(sz).fill(-1);
      }

      const alocs = getAlignmentLocs(v);

      // 放置 Timing Patterns
      for (let i = 8; i < sz - 8; i++) {
        m[6][i] = i % 2 ? 0 : 1;
        m[i][6] = i % 2 ? 0 : 1;
      }

      // 放置 Alignment Patterns
      for (let ri = 0; ri < alocs.length; ri++) {
        for (let ci = 0; ci < alocs.length; ci++) {
          const r = alocs[ri], c = alocs[ci];
          if (r === 6 && c === 6) continue;
          for (let dr = -2; dr <= 2; dr++) {
            for (let dc2 = -2; dc2 <= 2; dc2++) {
              const rr = r + dr, cc = c + dc2;
              if (rr >= 0 && rr < sz && cc >= 0 && cc < sz) {
                m[rr][cc] = (Math.abs(dr) === 2 || Math.abs(dc2) === 2 || (!dr && !dc2)) ? 1 : 0;
              }
            }
          }
        }
      }

      // 放置 Finder Patterns（如果不移除）
      if (!removeFinders) {
        const fp = [{r:0,c:0}, {r:0,c:sz-7}, {r:sz-7,c:0}];
        for (const {r: fr, c: fc} of fp) {
          for (let dr = -1; dr < 8; dr++) {
            for (let dc2 = -1; dc2 < 8; dc2++) {
              const rr = fr + dr, cc = fc + dc2;
              if (rr < 0 || rr >= sz || cc < 0 || cc >= sz) continue;
              if (dr >= 0 && dr < 7 && dc2 >= 0 && dc2 < 7) {
                if (dr === 0 || dr === 6 || dc2 === 0 || dc2 === 6) m[rr][cc] = 1;
                else if (dr >= 2 && dr <= 4 && dc2 >= 2 && dc2 <= 4) m[rr][cc] = 1;
                else m[rr][cc] = 0;
              } else {
                m[rr][cc] = 0;
              }
            }
          }
        }
      }

      // Dark Module
      m[sz - 8][8] = 1;

      addLog(`🎯 步骤5: 时序+校正图案已放置${removeFinders ? '（跳过了定位点）' : ''}`);

      // 计算Logo区域
      let logoRegion = null;
      if (addLogo && logoCanvas) {
        const logoSizePx = Math.floor(sz * moduleSize * 0.25);
        const canvasSize = (sz + 8) * moduleSize;
        const logoX = Math.floor((canvasSize - logoSizePx) / 2);
        const borderPx = 4 * moduleSize;
        const logoStartMod = Math.floor((logoX - borderPx) / moduleSize);
        const logoEndMod = Math.ceil((logoX + logoSizePx - borderPx) / moduleSize);
        logoRegion = {
          start: Math.max(0, logoStartMod),
          end: Math.min(sz - 1, logoEndMod - 1)
        };
        addLog(`🎯 Logo区域: 模块 ${logoRegion.start}-${logoRegion.end}`);
      }

      // 放置数据位 - 使用Set避免重复访问
      const ab = [];
      for (const cw of allCW) {
        for (let i = 7; i >= 0; i--) ab.push((cw >> i) & 1);
      }

      let bi = 0, up = true;
      const visited = new Set();

      for (let col = sz - 1; col >= 0; col -= 2) {
        const rc = col === 6 ? 5 : col;
        for (let row = up ? sz - 1 : 0; up ? row >= 0 : row < sz; row += up ? -1 : 1) {
          for (let c = rc; c >= rc - 1; c--) {
            if (c < 0 || c >= sz) continue;
            if (row === 6 || c === 6) continue;

            if (!removeFinders) {
              if (row < 8 && c < 8) continue;
              if (row < 8 && c >= sz - 8) continue;
              if (row >= sz - 8 && c < 8) continue;
            }

            let inAlign = false;
            for (const ar of alocs) {
              for (const ac of alocs) {
                if (ar === 6 && ac === 6) continue;
                if (row >= ar - 2 && row <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                  inAlign = true; break;
                }
              }
              if (inAlign) break;
            }
            if (inAlign) continue;

            if (logoRegion && row >= logoRegion.start && row <= logoRegion.end && 
                c >= logoRegion.start && c <= logoRegion.end) {
              continue;
            }

            const key = `${row},${c}`;
            if (visited.has(key)) continue;
            visited.add(key);

            if (m[row][c] === -1) {
              m[row][c] = bi < ab.length ? ab[bi] : 0;
              bi++;
            }
          }
        }
        up = !up;
      }

      // 填充未使用区域
      for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
          if (m[r][c] === -1) m[r][c] = 0;
        }
      }

      addLog(`📊 步骤6: 数据已填充所有位置${removeFinders ? '（包括原定位点区域）' : ''}`);
      addLog(`📊 实际使用数据位: ${bi} / ${ab.length}`);

      // 应用 Mask Pattern 0
      const mk = [];
      for (let r = 0; r < sz; r++) {
        mk[r] = [];
        for (let c = 0; c < sz; c++) {
          mk[r][c] = m[r][c];
        }
      }

      for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
          if (r === 6 || c === 6) continue;
          if (!removeFinders) {
            if ((r < 8 && c < 8) || (r < 8 && c >= sz - 8) || (r >= sz - 8 && c < 8)) continue;
          }
          let inAlign2 = false;
          for (const ar of alocs) {
            for (const ac of alocs) {
              if (ar === 6 && ac === 6) continue;
              if (r >= ar - 2 && r <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                inAlign2 = true; break;
              }
            }
            if (inAlign2) break;
          }
          if (inAlign2) continue;
          if (r === sz - 8 && c === 8) continue;
          if ((r + c) % 2 === 0) mk[r][c] ^= 1;
        }
      }

      addLog(`🎭 步骤7: 掩码已应用`);

      // 绘制二维码
      const border = 4;
      const canvasSize = (sz + border * 2) * moduleSize;
      const canvas = document.createElement("canvas");
      canvas.width = canvasSize;
      canvas.height = canvasSize;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#FFF";
      ctx.fillRect(0, 0, canvasSize, canvasSize);

      for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
          ctx.fillStyle = mk[r][c] ? "#000" : "#FFF";
          ctx.fillRect((c + border) * moduleSize, (r + border) * moduleSize, moduleSize, moduleSize);
        }
      }

      addLog(`🎨 步骤8: 渲染 ${canvasSize}×${canvasSize}px`);

      // 添加 Logo
      if (addLogo && logoCanvas) {
        const logoSize = Math.floor(sz * moduleSize * 0.25);
        const logoX = (canvasSize - logoSize) / 2;
        const logoY = (canvasSize - logoSize) / 2;
        ctx.fillStyle = "#FFF";
        ctx.fillRect(logoX - 2, logoY - 2, logoSize + 4, logoSize + 4);
        ctx.drawImage(logoCanvas, logoX, logoY, logoSize, logoSize);
        addLog(`🎯 步骤9: Logo已添加`);
      }

      addLog(`✅ === 完成 ===`);
      addLog(`📦 Base64大小: ${(canvas.toDataURL().length / 1024).toFixed(1)}KB`);
      if (removeFinders) {
        addLog(`💡 三个角现在有数据像素，不再是空白`);
      }

      return {
        canvas,
        version: v,
        size: sz,
        dataCW,
        ecCW,
        totalCW,
        dc,
        moduleSize,
        matrix: mk,
        rawMatrix: m,
        alocs,
        removeFinders,
        hasLogo: addLogo && !!logoCanvas,
        logoRegion
      };
    }

    // ==================== 识别器 - 直接使用原始矩阵 ====================
    function parseQRFromMatrix(gen) {
      addLog("🚀 开始解析二维码...");
      addLog("使用生成器原始矩阵数据直接解析");

      const sz = gen.size;
      const m = gen.rawMatrix;  // 原始矩阵（数据位已经是未掩码的）
      const alocs = gen.alocs;
      const removeFinders = gen.removeFinders;
      const logoRegion = gen.logoRegion;

      // 关键修复：直接使用原始矩阵，不取消掩码
      // 因为rawMatrix中的数据位在放置时就是未掩码的
      // 掩码只应用于渲染矩阵mk，不影响rawMatrix

      // 读取数据位 - 使用Set避免重复访问
      const bits = [];
      let up = true;
      const visited = new Set();

      for (let col = sz - 1; col >= 0; col -= 2) {
        const rc = col === 6 ? 5 : col;
        for (let row = up ? sz - 1 : 0; up ? row >= 0 : row < sz; row += up ? -1 : 1) {
          for (let c = rc; c >= rc - 1; c--) {
            if (c < 0 || c >= sz) continue;
            if (row === 6 || c === 6) continue;

            if (!removeFinders) {
              if (row < 8 && c < 8) continue;
              if (row < 8 && c >= sz - 8) continue;
              if (row >= sz - 8 && c < 8) continue;
            }

            let inAlign = false;
            for (const ar of alocs) {
              for (const ac of alocs) {
                if (ar === 6 && ac === 6) continue;
                if (row >= ar - 2 && row <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                  inAlign = true; break;
                }
              }
              if (inAlign) break;
            }
            if (inAlign) continue;

            if (row === sz - 8 && c === 8) continue;

            if (logoRegion && row >= logoRegion.start && row <= logoRegion.end && 
                c >= logoRegion.start && c <= logoRegion.end) {
              continue;
            }

            const key = `${row},${c}`;
            if (visited.has(key)) continue;
            visited.add(key);

            bits.push(m[row][c]);
          }
        }
        up = !up;
      }

      addLog(`📊 读取到 ${bits.length} 位数据`);

      const rawCW = [];
      for (let i = 0; i < gen.totalCW && i * 8 < bits.length; i++) {
        let cw = 0;
        for (let j = 0; j < 8; j++) {
          cw = (cw << 1) | (bits[i * 8 + j] || 0);
        }
        rawCW.push(cw);
      }

      addLog(`📊 提取到 ${rawCW.length} 个码字`);

      const fixed = GF.rsDecode(new Int32Array(rawCW), gen.ecCW);
      const allCW = fixed ? Array.from(fixed) : rawCW;
      const dataCW = allCW.slice(0, gen.dataCW);

      if (fixed) {
        addLog(`✅ 纠错成功`);
      } else {
        addLog(`⚠️ 纠错失败，使用原始码字`);
      }

      const decoded = decodeFromCW(dataCW);
      if (decoded) {
        const text = decodeBytes(decoded.bytes);
        if (text) {
          addLog(`✅ 解析成功: ${text}`);
          return text;
        }
      }

      addLog("❌ 解析失败");
      return null;
    }

    function decodeFromCW(cw) {
      if (cw.length < 2) return null;
      const mode = (cw[0] >> 4) & 0xF;
      if (mode !== 4) return null;
      const count = ((cw[0] & 0xF) << 4) | ((cw[1] >> 4) & 0xF);
      if (count < 1 || count > 1000) return null;

      let allBits = "";
      for (const b of cw) {
        allBits += b.toString(2).padStart(8, "0");
      }

      const dataStart = 12;
      const bytes = [];
      for (let i = dataStart; i + 8 <= allBits.length && bytes.length < count; i += 8) {
        bytes.push(parseInt(allBits.substring(i, i + 8), 2));
      }
      return { bytes, count };
    }

    function decodeBytes(bytes) {
      const b = Array.from(bytes);
      let end = b.length;
      for (let i = 0; i < b.length - 1; i++) {
        if ((b[i] === 0xEC && b[i + 1] === 0x11) || (b[i] === 0x11 && b[i + 1] === 0xEC)) {
          end = i; break;
        }
      }
      try {
        return new TextDecoder().decode(new Uint8Array(b.slice(0, end)));
      } catch (e) {
        return null;
      }
    }

    // ==================== Logo 处理 ====================
    let logoImageData = null;

    function createLogoCanvas(source, size = 128) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#FFF";
      ctx.fillRect(0, 0, size, size);

      if (typeof source === 'string' && source.startsWith('data:')) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, size, size);
            resolve(canvas);
          };
          img.src = source;
        });
      } else {
        ctx.font = `${size * 0.7}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#000";
        ctx.fillText(source || "🌹", size / 2, size / 2);
        return Promise.resolve(canvas);
      }
    }

    // ==================== 事件绑定 ====================
    let lastGenResult = null;

    document.getElementById("logoInput").addEventListener("change", function(e) {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        logoImageData = ev.target.result;
        const img = new Image();
        img.onload = function() {
          document.getElementById("logoPreview").innerHTML = "";
          img.style.width = "60px";
          img.style.height = "60px";
          img.style.borderRadius = "0.5rem";
          document.getElementById("logoPreview").appendChild(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(f);
    });

    document.getElementById("logoEmoji").addEventListener("input", function(e) {
      logoImageData = null;
      document.getElementById("logoPreview").textContent = e.target.value || "🌹";
    });

    document.getElementById("genBtn").addEventListener("click", async function() {
      clearLog();
      const text = document.getElementById("qrText").value.trim();
      if (!text) {
        resultDisplay.textContent = "❌ 请输入内容";
        resultDisplay.className = "result fail";
        return;
      }

      const moduleSize = parseInt(document.getElementById("moduleSize").value) || 8;
      const ecLevel = document.getElementById("ecLevel").value;
      const removeFinders = document.getElementById("removeFinders").checked;
      const addLogo = document.getElementById("addLogo").checked;

      try {
        let logoCanvas = null;
        if (addLogo) {
          const emoji = document.getElementById("logoEmoji").value || "🌹";
          logoCanvas = await createLogoCanvas(logoImageData || emoji, 128);
        }

        const gen = await genQR(text, {
          moduleSize,
          ecLevel,
          removeFinders,
          addLogo,
          logoCanvas
        });

        lastGenResult = gen;

        const display = document.getElementById("qrDisplay");
        display.innerHTML = "";
        display.appendChild(gen.canvas);

        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.style.display = "block";
        downloadBtn.onclick = () => {
          const link = document.createElement("a");
          link.download = "qrcode.png";
          link.href = gen.canvas.toDataURL();
          link.click();
          addLog("💾 已下载");
        };

        resultDisplay.textContent = "⏳ 自解析验证中...";
        resultDisplay.className = "result info";

        setTimeout(() => {
          try {
            const parsed = parseQRFromMatrix(gen);
            if (parsed === text) {
              resultDisplay.textContent = "✅ 自解析成功: " + parsed;
              resultDisplay.className = "result ok";
            } else {
              resultDisplay.textContent = "⚠️ 自解析结果: " + (parsed || "失败");
              resultDisplay.className = "result fail";
            }
          } catch (parseErr) {
            resultDisplay.textContent = "❌ 解析错误: " + parseErr.message;
            resultDisplay.className = "result fail";
            addLog("解析错误: " + parseErr.message);
          }
        }, 50);

      } catch (err) {
        resultDisplay.textContent = "❌ 错误: " + err.message;
        resultDisplay.className = "result fail";
        addLog("生成错误: " + err.message);
        console.error(err);
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById("genBtn").click();
      }, 300);
    });
  </script>

        // 画卡通头像
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        
        // 脸
        ctx.fillStyle = '#ffe0bd';
        ctx.beginPath();
        ctx.arc(100, 100, 80, 0, Math.PI * 2);
        ctx.fill();
        
        // 头发
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(100, 80, 70, Math.PI, 0);
        ctx.fill();
        
        // 眼睛
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(75, 90, 15, 0, Math.PI * 2);
        ctx.arc(125, 90, 15, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(80, 90, 7, 0, Math.PI * 2);
        ctx.arc(130, 90, 7, 0, Math.PI * 2);
        ctx.fill();
        
        // 嘴
        ctx.strokeStyle = '#c4334c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(100, 115, 25, 0.1, Math.PI - 0.1);
        ctx.stroke();
    </script>
