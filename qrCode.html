<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>二维码解析器 | 多引擎版</title>
  <!-- 主引擎：ZXing（Google官方） -->
  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <!-- 备用引擎：jsQR -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a3142 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
    }
    
    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f0f3fa;
    }
    
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #4f9cff, #7c5cfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .engine-info {
      text-align: center;
      font-size: 0.8rem;
      color: #8b95b0;
      margin-bottom: 1.5rem;
      padding: 0.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 0.5rem;
    }
    
    /* 上传区域 */
    .upload-box {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 1.5rem;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: all 0.3s;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .upload-box:hover {
      border-color: #5b8cff;
      background: rgba(30, 40, 65, 0.5);
    }
    
    .upload-box.dragging {
      border-color: #5b8cff;
      background: rgba(30, 40, 65, 0.7);
      border-style: solid;
      box-shadow: 0 0 30px rgba(70, 130, 255, 0.3);
    }
    
    .upload-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .upload-text {
      font-size: 1.1rem;
      color: #d0d8f0;
      margin-bottom: 0.5rem;
    }
    
    .upload-hint {
      font-size: 0.85rem;
      color: #9aa4c2;
    }
    
    /* 按钮 */
    .btn-row {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }
    
    .btn {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
      background: linear-gradient(115deg, #3b6eff, #8b5cf6);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 110, 255, 0.3);
    }
    
    .btn.stop {
      background: linear-gradient(115deg, #ff6b6b, #ee5a24);
    }
    
    /* 视频 */
    .video-container {
      width: 100%;
      max-width: 350px;
      margin: 0 auto 1rem;
      border-radius: 1.5rem;
      overflow: hidden;
      background: #000;
      aspect-ratio: 1;
      display: none;
    }
    
    .video-container.active {
      display: block;
    }
    
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    
    /* 结果 */
    .result-box {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1rem;
      padding: 1.2rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .result-label {
      font-size: 0.85rem;
      color: #a8b9e6;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .result-content {
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      word-break: break-all;
      min-height: 2rem;
      padding: 0.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 0.5rem;
      max-height: 150px;
      overflow-y: auto;
    }
    
    .result-content.empty {
      color: #7b85a5;
      font-weight: 400;
    }
    
    .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    
    .action-btn {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.8rem;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      text-align: center;
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .hint {
      color: #ffb86c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }
    
    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 二维码解析器</h1>
    <div class="engine-info">
      🔍 识别引擎：ZXing（主）+ jsQR（备）· 双重保障
    </div>
    
    <!-- 上传区域 -->
    <div class="upload-box" id="uploadBox">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击上传或拖拽图片</div>
      <div class="upload-hint">支持 PNG、JPG、GIF、WEBP</div>
    </div>
    
    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    
    <!-- 摄像头 -->
    <div class="video-container" id="videoContainer">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>
    
    <div class="btn-row">
      <button class="btn" id="cameraBtn">📸 打开相机</button>
      <button class="btn stop" id="stopBtn" style="display: none;">⏹️ 关闭</button>
    </div>
    
    <!-- 结果 -->
    <div class="result-box">
      <div class="result-label">🔍 解析结果</div>
      <div class="result-content empty" id="result">等待识别...</div>
      <div class="actions">
        <button class="action-btn" id="copyBtn">📋 复制</button>
        <button class="action-btn" id="openBtn">🔗 打开</button>
        <button class="action-btn" id="clearBtn">🗑️ 清除</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <script>
    // ========== 初始化双引擎 ==========
    // 引擎1：ZXing
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.DATA_MATRIX,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    
    const zxingReader = new ZXing.BrowserMultiFormatReader(hints);
    
    // ========== DOM元素 ==========
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const cameraBtn = document.getElementById('cameraBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultDiv = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const hintDiv = document.getElementById('hint');
    
    let lastResult = '';
    
    // ========== 上传：点击 ==========
    uploadBox.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        parseFile(file);
        fileInput.value = '';
      }
    });
    
    // ========== 上传：拖拽 ==========
    uploadBox.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadBox.classList.add('dragging');
    });
    
    uploadBox.addEventListener('dragleave', () => {
      uploadBox.classList.remove('dragging');
    });
    
    uploadBox.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadBox.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (file) parseFile(file);
    });
    
    // ========== 文件解析 ==========
    function parseFile(file) {
      if (!file.type.startsWith('image/')) {
        showHint('请选择图片文件');
        return;
      }
      
      showHint('🔄 正在解析...');
      
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => decodeWithZXing(img);
        img.onerror = () => showHint('图片加载失败');
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    // ========== ZXing解码 ==========
    function decodeWithZXing(img) {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      
      try {
        const source = new ZXing.RGBLuminanceSource(
          imageData.data,
          canvas.width,
          canvas.height
        );
        const binaryBitmap = new ZXing.BinaryBitmap(
          new ZXing.HybridBinarizer(source)
        );
        
        const result = zxingReader.decodeBitmap(binaryBitmap);
        
        if (result) {
          setResult(result.getText());
          showHint('✅ 识别成功（ZXing引擎）');
          return;
        }
      } catch (err) {
        // ZXing失败，尝试jsQR
      }
      
      // 备用：jsQR
      try {
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          setResult(code.data);
          showHint('✅ 识别成功（jsQR备用引擎）');
          return;
        }
      } catch (err) {}
      
      // 两个引擎都失败
      setResult('');
      showHint('❌ 未识别到二维码，请确保图片清晰且包含完整二维码');
    }
    
    // ========== 摄像头扫描 ==========
    cameraBtn.addEventListener('click', async () => {
      try {
        await zxingReader.decodeFromVideoDevice(
          null,
          video,
          (result, err) => {
            if (result) {
              const text = result.getText();
              if (text !== lastResult) {
                setResult(text);
                showHint('✅ 识别成功');
              }
            }
          }
        );
        
        videoContainer.classList.add('active');
        cameraBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        showHint('📸 摄像头已开启，请对准二维码');
      } catch (err) {
        showHint('无法打开摄像头: ' + err.message);
      }
    });
    
    stopBtn.addEventListener('click', () => {
      zxingReader.reset();
      videoContainer.classList.remove('active');
      cameraBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      showHint('摄像头已关闭');
    });
    
    // ========== 结果处理 ==========
    function setResult(text) {
      if (text) {
        resultDiv.textContent = text;
        resultDiv.classList.remove('empty');
        lastResult = text;
      } else {
        resultDiv.textContent = '未识别到二维码';
        resultDiv.classList.add('empty');
        lastResult = '';
      }
    }
    
    function showHint(msg) {
      hintDiv.textContent = msg;
    }
    
    // ========== 按钮功能 ==========
    copyBtn.addEventListener('click', () => {
      if (!lastResult) {
        showHint('没有可复制的内容');
        return;
      }
      
      navigator.clipboard.writeText(lastResult).then(() => {
        showHint('📋 已复制到剪贴板');
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = lastResult;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showHint('📋 已复制');
      });
    });
    
    openBtn.addEventListener('click', () => {
      if (!lastResult) {
        showHint('没有可打开的内容');
        return;
      }
      
      try {
        const url = new URL(lastResult);
        if (url.protocol === 'http:' || url.protocol === 'https:') {
          window.open(lastResult, '_blank');
          return;
        }
      } catch (e) {}
      
      if (/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/.test(lastResult)) {
        window.open('https://' + lastResult, '_blank');
      } else {
        showHint('内容不是有效网址');
      }
    });
    
    clearBtn.addEventListener('click', () => {
      resultDiv.textContent = '等待识别...';
      resultDiv.classList.add('empty');
      lastResult = '';
      showHint('');
    });
    
    // 清理
    window.addEventListener('beforeunload', () => {
      zxingReader.reset();
    });
  </script>
</body>
</html>
