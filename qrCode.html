<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>二维码解析器</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2a3142 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
    }
    
    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f0f3fa;
    }
    
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #4f9cff, #7c5cfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* 上传区域 */
    .upload-box {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 1.5rem;
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: all 0.3s;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .upload-box:hover {
      border-color: #5b8cff;
      background: rgba(30, 40, 65, 0.5);
      transform: scale(1.02);
    }
    
    .upload-box.dragging {
      border-color: #5b8cff;
      background: rgba(30, 40, 65, 0.7);
      border-style: solid;
      box-shadow: 0 0 30px rgba(70, 130, 255, 0.3);
    }
    
    .upload-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .upload-text {
      font-size: 1.1rem;
      color: #d0d8f0;
      margin-bottom: 0.5rem;
    }
    
    .upload-hint {
      font-size: 0.85rem;
      color: #9aa4c2;
    }
    
    /* 按钮 */
    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.8rem;
      transition: all 0.3s;
      color: white;
      background: linear-gradient(115deg, #3b6eff, #8b5cf6);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 110, 255, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn.stop {
      background: linear-gradient(115deg, #ff6b6b, #ee5a24);
    }
    
    /* 视频 */
    .video-container {
      width: 100%;
      max-width: 350px;
      margin: 0 auto 1rem;
      border-radius: 1.5rem;
      overflow: hidden;
      background: #000;
      aspect-ratio: 1;
      display: none;
    }
    
    .video-container.active {
      display: block;
    }
    
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    
    /* 结果 */
    .result-box {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1rem;
      padding: 1.2rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .result-label {
      font-size: 0.85rem;
      color: #a8b9e6;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .result-content {
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      word-break: break-all;
      min-height: 2rem;
      padding: 0.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 0.5rem;
    }
    
    .result-content.empty {
      color: #7b85a5;
      font-weight: 400;
    }
    
    .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    
    .action-btn {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.8rem;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      text-align: center;
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .hint {
      color: #ffb86c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }
    
    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📷 二维码解析器</h1>
    
    <!-- 上传区域 -->
    <div class="upload-box" id="uploadBox">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击上传或拖拽图片</div>
      <div class="upload-hint">支持 PNG、JPG、GIF、WEBP</div>
    </div>
    
    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    
    <!-- 摄像头 -->
    <div class="video-container" id="videoContainer">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>
    
    <button class="btn" id="cameraBtn">📸 打开相机扫描</button>
    <button class="btn stop" id="stopBtn" style="display: none;">⏹️ 关闭相机</button>
    
    <!-- 结果 -->
    <div class="result-box">
      <div class="result-label">🔍 解析结果</div>
      <div class="result-content empty" id="result">等待识别...</div>
      <div class="actions">
        <button class="action-btn" id="copyBtn">📋 复制</button>
        <button class="action-btn" id="openBtn">🔗 打开链接</button>
        <button class="action-btn" id="clearBtn">🗑️ 清除</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <script>
    // 获取元素
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const cameraBtn = document.getElementById('cameraBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultDiv = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const hintDiv = document.getElementById('hint');
    
    let stream = null;
    let scanning = false;
    let lastResult = '';
    let scanTimer = null;
    
    // ========== 上传区域：点击 ==========
    uploadBox.addEventListener('click', () => {
      fileInput.click();
    });
    
    // ========== 文件选择 ==========
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        parseImage(file);
        fileInput.value = ''; // 清空，允许重复选同一个文件
      }
    });
    
    // ========== 上传区域：拖拽 ==========
    uploadBox.addEventListener('dragover', (e) => {
      e.preventDefault(); // 必须阻止，否则浏览器会打开文件
      uploadBox.classList.add('dragging');
    });
    
    uploadBox.addEventListener('dragleave', () => {
      uploadBox.classList.remove('dragging');
    });
    
    uploadBox.addEventListener('drop', (e) => {
      e.preventDefault(); // 必须阻止默认行为
      uploadBox.classList.remove('dragging');
      
      const file = e.dataTransfer.files[0];
      if (file) {
        parseImage(file);
      }
    });
    
    // ========== 解析图片文件 ==========
    function parseImage(file) {
      if (!file.type.startsWith('image/')) {
        showHint('请选择图片文件');
        return;
      }
      
      showHint('正在解析...');
      
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          decodeImage(img);
        };
        img.onerror = () => {
          showHint('图片加载失败');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    // ========== 从图片解码二维码 ==========
    function decodeImage(img) {
      // 限制图片大小，提高性能
      let width = img.width;
      let height = img.height;
      const maxSize = 800;
      
      if (width > maxSize || height > maxSize) {
        const ratio = Math.min(maxSize / width, maxSize / height);
        width = Math.floor(width * ratio);
        height = Math.floor(height * ratio);
      }
      
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      
      const imageData = ctx.getImageData(0, 0, width, height);
      const code = jsQR(imageData.data, width, height);
      
      if (code) {
        setResult(code.data);
        showHint('✅ 解析成功');
      } else {
        setResult('');
        showHint('❌ 未发现二维码');
      }
    }
    
    // ========== 设置结果 ==========
    function setResult(text) {
      if (text) {
        resultDiv.textContent = text;
        resultDiv.classList.remove('empty');
        lastResult = text;
      } else {
        resultDiv.textContent = '未识别到二维码';
        resultDiv.classList.add('empty');
        lastResult = '';
      }
    }
    
    function showHint(msg) {
      hintDiv.textContent = msg;
    }
    
    // ========== 摄像头 ==========
    cameraBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        
        video.srcObject = stream;
        videoContainer.classList.add('active');
        cameraBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        scanning = true;
        
        showHint('摄像头已开启，请对准二维码');
        scanLoop();
      } catch (err) {
        showHint('无法打开摄像头: ' + err.message);
      }
    });
    
    stopBtn.addEventListener('click', () => {
      stopCamera();
    });
    
    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      videoContainer.classList.remove('active');
      cameraBtn.style.display = 'block';
      stopBtn.style.display = 'none';
      scanning = false;
      
      if (scanTimer) {
        clearTimeout(scanTimer);
        scanTimer = null;
      }
      
      showHint('摄像头已关闭');
    }
    
    // ========== 扫描循环 ==========
    function scanLoop() {
      if (!scanning) return;
      
      if (video.readyState >= video.HAVE_CURRENT_DATA && video.videoWidth > 0) {
        // 限制扫描尺寸
        let width = video.videoWidth;
        let height = video.videoHeight;
        const maxSize = 500;
        
        if (width > maxSize || height > maxSize) {
          const ratio = Math.min(maxSize / width, maxSize / height);
          width = Math.floor(width * ratio);
          height = Math.floor(height * ratio);
        }
        
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(video, 0, 0, width, height);
        
        const imageData = ctx.getImageData(0, 0, width, height);
        const code = jsQR(imageData.data, width, height);
        
        if (code && code.data !== lastResult) {
          setResult(code.data);
          showHint('✅ 识别成功');
        }
      }
      
      scanTimer = setTimeout(scanLoop, 200);
    }
    
    // ========== 按钮功能 ==========
    copyBtn.addEventListener('click', () => {
      if (!lastResult) {
        showHint('没有可复制的内容');
        return;
      }
      
      navigator.clipboard.writeText(lastResult).then(() => {
        showHint('📋 已复制到剪贴板');
      }).catch(() => {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = lastResult;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showHint('📋 已复制');
      });
    });
    
    openBtn.addEventListener('click', () => {
      if (!lastResult) {
        showHint('没有可打开的内容');
        return;
      }
      
      // 尝试作为URL打开
      try {
        const url = new URL(lastResult);
        if (url.protocol === 'http:' || url.protocol === 'https:') {
          window.open(lastResult, '_blank');
          return;
        }
      } catch (e) {}
      
      // 尝试补充https
      if (/^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/.test(lastResult)) {
        window.open('https://' + lastResult, '_blank');
      } else {
        showHint('内容不是有效网址');
      }
    });
    
    clearBtn.addEventListener('click', () => {
      resultDiv.textContent = '等待识别...';
      resultDiv.classList.add('empty');
      lastResult = '';
      showHint('');
    });
    
    // 页面关闭时清理
    window.addEventListener('beforeunload', () => {
      stopCamera();
    });
  </script>
</body>
</html>
