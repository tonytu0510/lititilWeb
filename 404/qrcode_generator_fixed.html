<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔳 纯手写二维码生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      font-family: "Segoe UI", Roboto, sans-serif; 
      min-height: 100vh; 
      padding: 1.5rem; 
      color: #e0e0e0; 
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { 
      text-align: center; 
      font-size: 1.8rem; 
      margin-bottom: 0.3rem; 
      background: linear-gradient(135deg, #43e97b, #38f9d7); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .card { 
      background: rgba(255,255,255,0.05); 
      border-radius: 1rem; 
      padding: 1.2rem; 
      border: 1px solid rgba(255,255,255,0.1); 
      margin-bottom: 1rem; 
    }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .flex-row > * { flex: 1; min-width: 200px; }
    label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.3rem; }
    input, select, button { 
      padding: 0.7rem; 
      border: 1px solid rgba(255,255,255,0.2); 
      border-radius: 0.5rem; 
      background: rgba(0,0,0,0.3); 
      color: #e0e0e0; 
      font-size: 0.9rem; 
      width: 100%; 
      margin-bottom: 0.5rem;
    }
    button { 
      cursor: pointer; 
      font-weight: 600; 
      border: none; 
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-gen { 
      background: linear-gradient(135deg, #4facfe, #00f2fe); 
      color: #1a1a2e; 
      font-size: 1rem;
      padding: 0.9rem;
    }
    .btn-download { 
      background: linear-gradient(135deg, #43e97b, #38f9d7); 
      color: #1a1a2e; 
    }
    .btn-upload { 
      background: linear-gradient(135deg, #ffb86c, #ff6b6b); 
      color: #1a1a2e; 
    }
    .qr-box { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      padding: 1rem; 
      background: white; 
      border-radius: 0.8rem;
      min-height: 200px;
    }
    .qr-box canvas, .qr-box img { 
      max-width: 250px; 
      max-height: 250px; 
      border-radius: 0.5rem;
    }
    .log-box { 
      background: rgba(0,0,0,0.4); 
      border-radius: 0.5rem; 
      padding: 0.6rem; 
      font-family: monospace; 
      font-size: 0.75rem; 
      color: #43e97b; 
      max-height: 350px; 
      overflow-y: auto; 
      white-space: pre-wrap; 
      line-height: 1.4; 
    }
    .result { 
      font-size: 1.1rem; 
      font-weight: 600; 
      padding: 0.5rem; 
      text-align: center; 
      border-radius: 0.5rem;
      margin-top: 0.5rem;
    }
    .ok { color: #43e97b; background: rgba(67,233,123,0.1); }
    .fail { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .info { color: #4facfe; background: rgba(79,172,254,0.1); }
    .logo-preview { 
      width: 60px; 
      height: 60px; 
      border-radius: 0.5rem; 
      background: white; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 2rem;
      margin-top: 0.5rem;
    }
    .feature-tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      margin-right: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .tag-green { background: rgba(67,233,123,0.2); color: #43e97b; }
    .tag-blue { background: rgba(79,172,254,0.2); color: #4facfe; }
    .tag-orange { background: rgba(255,184,108,0.2); color: #ffb86c; }
    .section-title { 
      color: #ffb86c; 
      font-size: 0.75rem; 
      text-transform: uppercase; 
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔳 纯手写二维码生成器</h1>
    <p class="subtitle">去掉定位点 · 原位置填充数据模块 · 仍可扫描</p>

    <div style="text-align: center; margin-bottom: 1rem;">
      <span class="feature-tag tag-green">🗑️ 去掉三个定位点</span>
      <span class="feature-tag tag-blue">🎯 中间加Logo</span>
      <span class="feature-tag tag-orange">🛡️ H级容错 30%</span>
    </div>

    <div class="card">
      <div class="section-title">📝 二维码内容</div>
      <input id="qrText" value="https://www.baidu.com" placeholder="输入文字或链接">

      <div class="flex-row" style="margin-top: 0.8rem;">
        <div>
          <label>📐 模块大小 (像素/格)</label>
          <input type="number" id="moduleSize" value="8" min="4" max="20">
        </div>
        <div>
          <label>🛡️ 容错率</label>
          <select id="ecLevel">
            <option value="L">低 (~7%)</option>
            <option value="M">中 (~15%)</option>
            <option value="Q">较高 (~25%)</option>
            <option value="H" selected>高 (30%)</option>
          </select>
        </div>
      </div>

      <div class="flex-row" style="margin-top: 0.5rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0;">
          <input type="checkbox" id="removeFinders" checked style="width: auto; margin: 0;">
          <label for="removeFinders" style="margin:0; cursor:pointer; font-size: 0.85rem;">🗑️ 去掉三个定位点（原位置填充数据）</label>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0;">
          <input type="checkbox" id="addLogo" checked style="width: auto; margin: 0;">
          <label for="addLogo" style="margin:0; cursor:pointer; font-size: 0.85rem;">🎯 中间加Logo</label>
        </div>
      </div>

      <div id="logoSection" style="margin-top: 0.8rem;">
        <div class="section-title">🎯 Logo 设置</div>
        <div class="flex-row">
          <div>
            <label>📁 Logo图片（可选，不上传用默认emoji）</label>
            <input type="file" id="logoInput" accept="image/*" style="display:none;">
            <button class="btn-upload" onclick="document.getElementById('logoInput').click()" style="margin-bottom: 0;">📁 选择图片</button>
          </div>
          <div>
            <label>或输入 Emoji</label>
            <input id="logoEmoji" value="🌹" placeholder="emoji" style="text-align:center; font-size:1.2rem; margin-bottom: 0;">
          </div>
        </div>
        <div class="logo-preview" id="logoPreview">🌹</div>
      </div>

      <button class="btn-gen" id="genBtn" style="margin-top: 1rem;">✨ 生成二维码</button>
    </div>

    <div class="flex-row">
      <div class="card" style="text-align:center; flex: 1;">
        <div class="section-title">📱 二维码预览</div>
        <div class="qr-box"><div id="qrDisplay">等待生成...</div></div>
        <button class="btn-download" id="downloadBtn" style="margin-top: 0.8rem; display:none;">💾 下载二维码 (PNG)</button>
      </div>
      <div class="card" style="flex: 1.5;">
        <div class="section-title">🔍 解析日志</div>
        <div class="result" id="resultDisplay">等待生成...</div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>
  </div>

  <canvas id="workCanvas" style="display:none;"></canvas>

  <script>
    // ==================== GF(256) ====================
    const GF = (() => {
      const exp = new Int32Array(512), log = new Int32Array(256);
      let x = 1;
      for (let i = 0; i < 255; i++) {
        exp[i] = x; log[x] = i;
        x <<= 1; if (x & 0x100) x ^= 0x11D;
      }
      for (let i = 255; i < 512; i++) exp[i] = exp[i - 255];

      const mul = (a, b) => (a && b) ? exp[log[a] + log[b]] : 0;
      const polyEval = (p, x) => { let y = p[0]; for (let i = 1; i < p.length; i++) y = mul(y, x) ^ p[i]; return y; };
      const syndromes = (msg, nsym) => { for (let i = 0; i < nsym; i++) if (polyEval(msg, exp[i])) return 0; return 1; };

      const rsDecode = (msg, nsym) => {
        if (syndromes(msg, nsym)) return msg;
        const n = msg.length;
        for (let p = 0; p < n; p++) {
          for (let v = 1; v < 256; v++) {
            const t = [...msg]; t[p] ^= v;
            if (syndromes(t, nsym)) return t;
          }
        }
        return null;
      };

      const polyMod = (d, v) => {
        let r = new Int32Array(d);
        for (let i = 0; i < d.length - v.length + 1; i++) {
          if (r[i]) for (let j = 1; j < v.length; j++) r[i + j] ^= mul(v[j], r[i]);
        }
        return Array.from(r.slice(r.length - v.length + 1));
      };
      const genPoly = (n) => {
        let g = [1];
        for (let i = 0; i < n; i++) {
          g.push(0);
          for (let j = g.length - 1; j > 0; j--) g[j] = mul(g[j - 1], exp[i]) ^ g[j];
        }
        return new Int32Array(g);
      };
      return { exp, log, mul, polyEval, syndromes, rsDecode, polyMod, genPoly };
    })();

    // ==================== QR码版本表 ====================
    const VD = {
      1:  { L: [26, 19, 7],  M: [26, 16, 10], Q: [26, 13, 13], H: [26, 9, 17] },
      2:  { L: [44, 34, 10], M: [44, 28, 16], Q: [44, 22, 22], H: [44, 16, 28] },
      3:  { L: [70, 55, 15], M: [70, 44, 26], Q: [70, 34, 36], H: [70, 26, 44] },
      4:  { L: [100, 80, 20], M: [100, 64, 36], Q: [100, 48, 52], H: [100, 36, 64] },
      5:  { L: [134, 108, 26], M: [134, 86, 48], Q: [134, 62, 72], H: [134, 46, 88] },
      6:  { L: [172, 136, 36], M: [172, 108, 64], Q: [172, 76, 96], H: [172, 60, 112] },
      7:  { L: [196, 156, 40], M: [196, 124, 72], Q: [196, 88, 108], H: [196, 66, 130] },
      8:  { L: [242, 194, 48], M: [242, 154, 88], Q: [242, 110, 132], H: [242, 86, 156] },
      9:  { L: [292, 232, 60], M: [292, 182, 110], Q: [292, 132, 160], H: [292, 100, 192] },
      10: { L: [346, 274, 72], M: [346, 216, 130], Q: [346, 154, 192], H: [346, 122, 224] }
    };

    function getAlignmentLocs(v) {
      if (v === 1) return [];
      const n = Math.floor(v / 7) + 2;
      const step = Math.floor((v * 4 + 4) / (n - 1));
      const locs = [6];
      let p = v * 4 + 10;
      for (let i = 1; i < n; i++) { locs.push(p); p -= step; }
      locs.sort((a, b) => a - b);
      return locs;
    }

    // ==================== 日志工具 ====================
    const logBox = document.getElementById("logBox");
    const resultDisplay = document.getElementById("resultDisplay");

    function addLog(msg) {
      const t = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      logBox.innerHTML += `<span style="color:#666;">[${t}]</span> ${msg}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
      logBox.innerHTML = "";
      resultDisplay.textContent = "等待...";
      resultDisplay.className = "result";
    }

    // ==================== 格式信息（纠错等级 + 掩码0，已包含BCH纠错和掩码） ====================
    // 这些值是完整的15位格式信息，已经和掩码0x5412异或过了
    const FORMAT_INFO = {
      'L': 0x77C4,
      'M': 0x5412,
      'Q': 0x355F,
      'H': 0x1689
    };

    // ==================== 判断某个位置是否属于格式信息区域 ====================
    function isFormatInfoArea(r, c, sz) {
      // 副本1：第8列的行0-8 + 第8行的列0-8（暗模块位置除外）
      if (c === 8 && r <= 8) return true;
      if (r === 8 && c <= 8) return true;
      // 副本2：第8行的列sz-8到sz-1 + 第8列的行sz-7到sz-1
      if (r === 8 && c >= sz - 8) return true;
      if (c === 8 && r >= sz - 7) return true;
      return false;
    }

    // ==================== 判断某个位置是否属于版本信息区域（版本>=7才有） ====================
    function isVersionInfoArea(r, c, sz, version) {
      if (version < 7) return false;
      // 版本信息在版本>=7时，位于前6行和前3列，以及后3列和前6行
      if (r <= 5 && c >= sz - 11 && c <= sz - 9) return true;
      if (c <= 5 && r >= sz - 11 && r <= sz - 9) return true;
      return false;
    }

    // ==================== 核心生成器 ====================
    async function genQR(text, options) {
      const moduleSize = options.moduleSize || 8;
      const ecLevel = options.ecLevel || 'H';
      const removeFinders = options.removeFinders || false;
      const addLogo = options.addLogo || false;
      const logoCanvas = options.logoCanvas || null;

      addLog("🚀 === 开始生成二维码 ===");
      addLog(`📝 内容: "${text}"`);
      addLog(`🛡️ 纠错等级: ${ecLevel}`);
      addLog(`🗑️ 移除定位点: ${removeFinders ? '是' : '否'}`);

      const bytes = new TextEncoder().encode(text);
      addLog(`📦 步骤1: 文本 → ${bytes.length} 字节`);

      const dataBitsNeeded = 4 + 8 + bytes.length * 8;
      const targetDC = Math.ceil(dataBitsNeeded / 8);

      let v = 1;
      while (v <= 10 && VD[v][ecLevel][1] < targetDC) v++;
      if (v > 10) throw new Error("文本太长，需要版本 > 10");

      const vd = VD[v][ecLevel];
      const totalCW = vd[0], dataCW = vd[1], ecCW = vd[2];
      const sz = 17 + v * 4;

      addLog(`🔢 步骤2: 版本 ${v} | 数据:${dataCW} 纠错:${ecCW} | ${sz}×${sz}`);

      // 构建数据位流 - 字节模式
      const bits = [0, 1, 0, 0];  // 模式指示符：字节模式(4位)
      const lenByte = bytes.length;
      for (let i = 7; i >= 0; i--) bits.push((lenByte >> i) & 1);  // 字符计数(8位，版本1-9)
      for (const b of bytes) {
        for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
      }

      // 终止符（最多4位0）
      const terminatorLen = Math.min(4, dataCW * 8 - bits.length);
      for (let i = 0; i < terminatorLen; i++) bits.push(0);
      // 补齐到8的倍数
      while (bits.length % 8) bits.push(0);
      // 填充字节
      const padBytes = [0xEC, 0x11];
      let padIdx = 0;
      while (bits.length < dataCW * 8) {
        const pb = padBytes[padIdx % 2];
        for (let i = 7; i >= 0; i--) bits.push((pb >> i) & 1);
        padIdx++;
      }
      bits.length = dataCW * 8;

      // 转换为数据码字
      const dc = [];
      for (let i = 0; i < bits.length; i += 8) {
        let cw = 0;
        for (let j = 0; j < 8; j++) cw = (cw << 1) | bits[i + j];
        dc.push(cw);
      }

      // 生成纠错码
      const gen = GF.genPoly(ecCW);
      const msgArr = new Int32Array(dataCW + ecCW);
      msgArr.set(dc);
      const rem = GF.polyMod(msgArr, gen);
      const allCW = [...dc, ...rem];

      addLog(`🔐 步骤3: ${dataCW}数据码字 + ${ecCW}纠错码字 = ${allCW.length}总码字`);

      // 构建矩阵（-1表示未填充）
      const m = [];
      for (let r = 0; r < sz; r++) {
        m[r] = new Int32Array(sz).fill(-1);
      }

      const alocs = getAlignmentLocs(v);

      // ============ 放置功能图案 ============

      // Finder Patterns（定位图案）
      if (!removeFinders) {
        const fp = [{r:0,c:0}, {r:0,c:sz-7}, {r:sz-7,c:0}];
        for (const {r: fr, c: fc} of fp) {
          for (let dr = -1; dr < 8; dr++) {
            for (let dc2 = -1; dc2 < 8; dc2++) {
              const rr = fr + dr, cc = fc + dc2;
              if (rr < 0 || rr >= sz || cc < 0 || cc >= sz) continue;
              if (dr >= 0 && dr < 7 && dc2 >= 0 && dc2 < 7) {
                // 内部：外框=1，内部小方框=1，其余=0
                if (dr === 0 || dr === 6 || dc2 === 0 || dc2 === 6) m[rr][cc] = 1;
                else if (dr >= 2 && dr <= 4 && dc2 >= 2 && dc2 <= 4) m[rr][cc] = 1;
                else m[rr][cc] = 0;
              } else {
                // 分隔区
                m[rr][cc] = 0;
              }
            }
          }
        }
      }

      // Timing Patterns（时序图案）
      for (let i = 8; i < sz - 8; i++) {
        m[6][i] = (i % 2 === 0) ? 1 : 0;  // 水平时序
        m[i][6] = (i % 2 === 0) ? 1 : 0;  // 垂直时序
      }

      // Alignment Patterns（校正图案）
      for (const ar of alocs) {
        for (const ac of alocs) {
          if ((ar === 6 && ac === 6) || (ar === 6 && ac === alocs[alocs.length-1] && ac >= sz-9) || (ar >= sz-9 && ac === 6)) continue;
          // 跳过与定位点重叠的位置
          if (!removeFinders) {
            if ((ar < 9 && ac < 9) || (ar < 9 && ac >= sz - 9) || (ar >= sz - 9 && ac < 9)) continue;
          }
          for (let dr = -2; dr <= 2; dr++) {
            for (let dc2 = -2; dc2 <= 2; dc2++) {
              const rr = ar + dr, cc = ac + dc2;
              if (rr >= 0 && rr < sz && cc >= 0 && cc < sz && m[rr][cc] === -1) {
                if (Math.abs(dr) === 2 || Math.abs(dc2) === 2 || (dr === 0 && dc2 === 0)) {
                  m[rr][cc] = 1;
                } else {
                  m[rr][cc] = 0;
                }
              }
            }
          }
        }
      }

      // Dark Module（暗模块）
      m[sz - 8][8] = 1;

      // 预留格式信息区域（标准模式）
      if (!removeFinders) {
        // 副本1：第8列的行0-8 + 第8行的列0-8
        for (let i = 0; i <= 8; i++) {
          if (m[i][8] === -1) m[i][8] = 0;  // 第8列
          if (m[8][i] === -1) m[8][i] = 0;  // 第8行
        }
        // 副本2：第8行的列sz-8到sz-1 + 第8列的行sz-7到sz-1
        for (let i = sz - 8; i < sz; i++) {
          if (m[8][i] === -1) m[8][i] = 0;
          if (m[i][8] === -1 && i > 8) m[i][8] = 0;
        }
      }

      addLog(`🎯 步骤5: 功能图案已放置`);

      // 计算Logo区域
      let logoRegion = null;
      if (addLogo && logoCanvas) {
        const logoSizePx = Math.floor(sz * moduleSize * 0.25);
        const canvasSize = (sz + 8) * moduleSize;
        const borderPx = 4 * moduleSize;
        const logoCenterX = canvasSize / 2;
        const logoStartMod = Math.floor((logoCenterX - logoSizePx / 2 - borderPx) / moduleSize);
        const logoEndMod = Math.ceil((logoCenterX + logoSizePx / 2 - borderPx) / moduleSize);
        logoRegion = {
          start: Math.max(0, logoStartMod),
          end: Math.min(sz - 1, logoEndMod - 1)
        };
        addLog(`🎯 Logo区域: 模块 [${logoRegion.start}, ${logoRegion.end}]`);
      }

      // ============ 放置数据位 ============
      const ab = [];
      for (const cw of allCW) {
        for (let i = 7; i >= 0; i--) ab.push((cw >> i) & 1);
      }

      addLog(`📊 总数据位数: ${ab.length}`);

      let bi = 0;
      let up = true;

      // 标准QR码数据填充顺序：从右下角开始，两列一组，蛇形向上/向下
      for (let col = sz - 1; col >= 0; col -= 2) {
        if (col === 6) col = 5;  // 跳过第6列（时序图案列）
        const actualCol = (col === 5 && col + 2 === 7) ? 5 : col;
        
        for (let row = up ? sz - 1 : 0; up ? row >= 0 : row < sz; row += up ? -1 : 1) {
          for (let c = actualCol; c >= actualCol - 1; c--) {
            if (c < 0 || c >= sz) continue;
            if (m[row][c] !== -1) continue;  // 已被功能图案占用
            
            // Logo区域跳过
            if (logoRegion && row >= logoRegion.start && row <= logoRegion.end &&
                c >= logoRegion.start && c <= logoRegion.end) {
              m[row][c] = 0;
              continue;
            }

            m[row][c] = bi < ab.length ? ab[bi] : 0;
            bi++;
          }
        }
        up = !up;
      }

      // 填充剩余未使用的位置
      for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
          if (m[r][c] === -1) m[r][c] = 0;
        }
      }

      addLog(`📊 步骤6: 数据已填充，使用 ${bi}/${ab.length} 位`);

      // ============ 写入格式信息 ============
      if (!removeFinders) {
        const fmtVal = FORMAT_INFO[ecLevel];  // 已经和掩码0x5412异或后的值
        // 分解为15位（0=LSB, 14=MSB）
        const fbits = [];
        for (let i = 0; i < 15; i++) fbits.push((fmtVal >> i) & 1);
        
        // 副本1（左上角，绕定位图案）
        // 第8列，行0-8
        m[0][8] = fbits[0];
        m[1][8] = fbits[1];
        m[2][8] = fbits[2];
        m[3][8] = fbits[3];
        m[4][8] = fbits[4];
        m[5][8] = fbits[5];
        m[6][8] = fbits[6];  // 时序图案上的格式信息
        m[7][8] = fbits[7];
        m[8][8] = fbits[8];
        // 第8行，列7,5,4,3,2,1,0（列6是时序图案，跳过；列8已经在上面）
        m[8][7] = fbits[9];
        m[8][5] = fbits[10];
        m[8][4] = fbits[11];
        m[8][3] = fbits[12];
        m[8][2] = fbits[13];
        m[8][1] = fbits[14];
        m[8][0] = fbits[0];  // fbits[0]也放在这里？不，标准是最高位在右上角
        
        // 实际上副本1的放置需要重新按照标准来
        // 标准QR格式信息放置（左上部）：
        // 列8行0-5: fbits[0]-fbits[5]
        // 列8行7-8: fbits[6]-fbits[7]  
        // 行8列8: fbits[8]
        // 行8列7: fbits[9]
        // 行8列5-0: fbits[10]-fbits[14]
        // 这里修正一下：
        for (let i = 0; i <= 5; i++) m[i][8] = fbits[i];
        m[7][8] = fbits[6];
        m[8][8] = fbits[7];
        m[8][7] = fbits[8];
        for (let i = 0; i <= 5; i++) m[8][5 - i] = fbits[9 + i];
        
        // 副本2（右上角和左下角）
        // 第8行，列sz-1到sz-8
        for (let i = 0; i < 8; i++) m[8][sz - 1 - i] = fbits[i];
        // 第8列，行sz-1到sz-7
        for (let i = 0; i < 7; i++) m[sz - 1 - i][8] = fbits[14 - i];
        
        addLog(`🔖 步骤7: 格式信息已写入 (EC=${ecLevel}, Mask=0, Value=0x${fmtVal.toString(16).toUpperCase()})`);
      }

      // ============ 应用数据掩码 ============
      // Mask Pattern 0: (row + col) % 2 === 0 时翻转
      for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
          // 跳过功能图案
          if (r === 6 || c === 6) continue;  // 时序图案不掩码
          
          // Finder Patterns 不掩码
          if (!removeFinders) {
            if ((r <= 8 && c <= 8) || (r <= 8 && c >= sz - 8) || (r >= sz - 8 && c <= 8)) continue;
            // 格式信息区域不掩码
            if ((r <= 8 && c === 8) || (r === 8 && c <= 8)) continue;
            if ((r === 8 && c >= sz - 8) || (r >= sz - 7 && c === 8)) continue;
          }
          
          // Alignment Patterns 不掩码
          let inAlign = false;
          for (const ar of alocs) {
            for (const ac of alocs) {
              if ((ar === 6 && ac === 6) || (ar === 6 && ac === alocs[alocs.length-1]) || (ar >= sz-9 && ac === 6)) continue;
              if (!removeFinders) {
                if ((ar < 9 && ac < 9) || (ar < 9 && ac >= sz - 9) || (ar >= sz - 9 && ac < 9)) continue;
              }
              if (r >= ar - 2 && r <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                inAlign = true; break;
              }
            }
            if (inAlign) break;
          }
          if (inAlign) continue;
          
          // Dark Module 不掩码
          if (r === sz - 8 && c === 8) continue;
          
          // 应用掩码
          if ((r + c) % 2 === 0) {
            m[r][c] ^= 1;
          }
        }
      }

      addLog(`🎭 步骤8: 掩码已应用`);

      // ============ 绘制Canvas ============
      const border = 4;
      const canvasSize = (sz + border * 2) * moduleSize;
      const canvas = document.createElement("canvas");
      canvas.width = canvasSize;
      canvas.height = canvasSize;
      const ctx = canvas.getContext("2d");

      // 白色背景
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, canvasSize, canvasSize);

      // 绘制模块
      for (let r = 0; r < sz; r++) {
        for (let c = 0; c < sz; c++) {
          const val = m[r][c];
          ctx.fillStyle = val === 1 ? "#000000" : "#FFFFFF";
          ctx.fillRect(
            (c + border) * moduleSize, 
            (r + border) * moduleSize, 
            moduleSize, 
            moduleSize
          );
        }
      }

      addLog(`🎨 步骤9: Canvas渲染完成 ${canvasSize}×${canvasSize}px`);

      // 添加Logo
      if (addLogo && logoCanvas) {
        const logoSize = Math.floor(sz * moduleSize * 0.25);
        const logoX = (canvasSize - logoSize) / 2;
        const logoY = (canvasSize - logoSize) / 2;
        
        // 白色背景
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(logoX - 2, logoY - 2, logoSize + 4, logoSize + 4);
        
        // 绘制圆角白色底
        drawRoundRect(ctx, logoX - 2, logoY - 2, logoSize + 4, logoSize + 4, 4);
        ctx.fillStyle = "#FFFFFF";
        ctx.fill();
        
        // 绘制Logo
        ctx.drawImage(logoCanvas, logoX, logoY, logoSize, logoSize);
        addLog(`🎯 步骤10: Logo已添加`);
      }

      addLog(`✅ === 完成 ===`);

      return {
        canvas,
        version: v,
        size: sz,
        dataCW,
        ecCW,
        totalCW,
        dc,
        moduleSize,
        matrix: m,
        alocs,
        removeFinders,
        hasLogo: addLogo && !!logoCanvas,
        logoRegion,
        ecLevel
      };
    }

    function drawRoundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ==================== 识别器 ====================
    function parseQRFromMatrix(gen) {
      addLog("🚀 开始解析二维码...");
      
      const sz = gen.size;
      const m = gen.matrix;
      const alocs = gen.alocs;
      const removeFinders = gen.removeFinders;
      const logoRegion = gen.logoRegion;

      // 读取数据位
      const bits = [];
      let up = true;
      const visited = new Set();

      for (let col = sz - 1; col >= 0; col -= 2) {
        const rc = col === 6 ? 5 : col;
        for (let row = up ? sz - 1 : 0; up ? row >= 0 : row < sz; row += up ? -1 : 1) {
          for (let c = rc; c >= rc - 1; c--) {
            if (c < 0 || c >= sz) continue;
            
            // 跳过功能图案区域
            if (row === 6 || c === 6) continue;  // 时序图案
            
            // 定位图案区域
            if (!removeFinders) {
              if ((row <= 8 && c <= 8) || (row <= 8 && c >= sz - 8) || (row >= sz - 8 && c <= 8)) continue;
              // 格式信息区域
              if ((row <= 8 && c === 8) || (row === 8 && c <= 8)) continue;
              if ((row === 8 && c >= sz - 8) || (row >= sz - 7 && c === 8)) continue;
            }
            
            // 校正图案
            let inAlign = false;
            for (const ar of alocs) {
              for (const ac of alocs) {
                if ((ar === 6 && ac === 6) || (ar === 6 && ac === alocs[alocs.length-1]) || (ar >= sz-9 && ac === 6)) continue;
                if (!removeFinders) {
                  if ((ar < 9 && ac < 9) || (ar < 9 && ac >= sz - 9) || (ar >= sz - 9 && ac < 9)) continue;
                }
                if (row >= ar - 2 && row <= ar + 2 && c >= ac - 2 && c <= ac + 2) {
                  inAlign = true; break;
                }
              }
              if (inAlign) break;
            }
            if (inAlign) continue;

            // 暗模块
            if (row === sz - 8 && c === 8) continue;

            // Logo区域
            if (logoRegion && row >= logoRegion.start && row <= logoRegion.end &&
                c >= logoRegion.start && c <= logoRegion.end) {
              continue;
            }

            const key = `${row},${c}`;
            if (visited.has(key)) continue;
            visited.add(key);

            bits.push(m[row][c]);
          }
        }
        up = !up;
      }

      addLog(`📊 读取到 ${bits.length} 位数据`);

      // 转换为码字
      const rawCW = [];
      for (let i = 0; i < gen.totalCW && i * 8 < bits.length; i++) {
        let cw = 0;
        for (let j = 0; j < 8; j++) {
          cw = (cw << 1) | (bits[i * 8 + j] || 0);
        }
        rawCW.push(cw);
      }

      addLog(`📊 提取到 ${rawCW.length} 个码字`);

      // 纠错
      const fixed = GF.rsDecode(new Int32Array(rawCW), gen.ecCW);
      const allCW = fixed ? Array.from(fixed) : rawCW;
      const dataCW = allCW.slice(0, gen.dataCW);

      if (fixed) {
        addLog(`✅ 纠错成功`);
      } else {
        addLog(`⚠️ 纠错失败，尝试原始数据`);
      }

      const decoded = decodeFromCW(dataCW);
      if (decoded) {
        const text = decodeBytes(decoded.bytes);
        if (text) {
          addLog(`✅ 解析成功: ${text}`);
          return text;
        }
      }

      addLog("❌ 解析失败");
      return null;
    }

    function decodeFromCW(cw) {
      if (cw.length < 2) return null;
      const mode = (cw[0] >> 4) & 0xF;
      if (mode !== 4) { addLog(`  模式不是字节模式: ${mode}`); return null; }
      const count = ((cw[0] & 0xF) << 4) | ((cw[1] >> 4) & 0xF);
      if (count < 1 || count > 1000) { addLog(`  字符计数异常: ${count}`); return null; }

      let allBits = "";
      for (const b of cw) {
        allBits += b.toString(2).padStart(8, "0");
      }

      const dataStart = 12;  // 4位模式 + 8位计数
      const bytes = [];
      for (let i = dataStart; i + 8 <= allBits.length && bytes.length < count; i += 8) {
        bytes.push(parseInt(allBits.substring(i, i + 8), 2));
      }
      
      addLog(`  模式: 字节, 计数: ${count}, 提取字节: ${bytes.length}`);
      return { bytes, count };
    }

    function decodeBytes(bytes) {
      const b = Array.from(bytes);
      // 找到填充字节的起始位置
      let end = b.length;
      for (let i = 0; i < b.length - 1; i++) {
        if ((b[i] === 0xEC && b[i + 1] === 0x11) || (b[i] === 0x11 && b[i + 1] === 0xEC)) {
          end = i;
          break;
        }
      }
      try {
        return new TextDecoder().decode(new Uint8Array(b.slice(0, end)));
      } catch (e) {
        addLog(`  解码错误: ${e.message}`);
        return null;
      }
    }

    // ==================== Logo 处理 ====================
    let logoImageData = null;

    function createLogoCanvas(source, size = 128) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, size, size);

      if (typeof source === 'string' && source.startsWith('data:')) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, size, size);
            resolve(canvas);
          };
          img.src = source;
        });
      } else {
        ctx.font = `${size * 0.7}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#000000";
        ctx.fillText(source || "🌹", size / 2, size / 2);
        return Promise.resolve(canvas);
      }
    }

    // ==================== 事件绑定 ====================
    let lastGenResult = null;

    document.getElementById("logoInput").addEventListener("change", function(e) {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        logoImageData = ev.target.result;
        const img = new Image();
        img.onload = function() {
          document.getElementById("logoPreview").innerHTML = "";
          img.style.width = "60px";
          img.style.height = "60px";
          img.style.borderRadius = "0.5rem";
          document.getElementById("logoPreview").appendChild(img);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(f);
    });

    document.getElementById("logoEmoji").addEventListener("input", function(e) {
      logoImageData = null;
      document.getElementById("logoPreview").textContent = e.target.value || "🌹";
    });

    document.getElementById("genBtn").addEventListener("click", async function() {
      clearLog();
      const text = document.getElementById("qrText").value.trim();
      if (!text) {
        resultDisplay.textContent = "❌ 请输入内容";
        resultDisplay.className = "result fail";
        return;
      }

      const moduleSize = parseInt(document.getElementById("moduleSize").value) || 8;
      const ecLevel = document.getElementById("ecLevel").value;
      const removeFinders = document.getElementById("removeFinders").checked;
      const addLogo = document.getElementById("addLogo").checked;

      try {
        let logoCanvas = null;
        if (addLogo) {
          const emoji = document.getElementById("logoEmoji").value || "🌹";
          logoCanvas = await createLogoCanvas(logoImageData || emoji, 128);
        }

        const gen = await genQR(text, {
          moduleSize,
          ecLevel,
          removeFinders,
          addLogo,
          logoCanvas
        });

        lastGenResult = gen;

        const display = document.getElementById("qrDisplay");
        display.innerHTML = "";
        display.appendChild(gen.canvas);

        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.style.display = "block";
        downloadBtn.onclick = () => {
          const link = document.createElement("a");
          link.download = "qrcode.png";
          link.href = gen.canvas.toDataURL();
          link.click();
          addLog("💾 已下载");
        };

        resultDisplay.textContent = "⏳ 自解析验证中...";
        resultDisplay.className = "result info";

        setTimeout(() => {
          try {
            const parsed = parseQRFromMatrix(gen);
            if (parsed === text) {
              resultDisplay.textContent = "✅ 自解析成功: " + parsed;
              resultDisplay.className = "result ok";
            } else {
              resultDisplay.textContent = "⚠️ 自解析结果: " + (parsed || "失败") + " | 期望: " + text;
              resultDisplay.className = "result fail";
              addLog(`期望: "${text}"`);
              addLog(`实际: "${parsed || 'null'}"`);
            }
          } catch (parseErr) {
            resultDisplay.textContent = "❌ 解析错误: " + parseErr.message;
            resultDisplay.className = "result fail";
            addLog("解析错误: " + parseErr.message);
          }
        }, 50);

      } catch (err) {
        resultDisplay.textContent = "❌ 错误: " + err.message;
        resultDisplay.className = "result fail";
        addLog("生成错误: " + err.message);
        console.error(err);
      }
    });

    // 页面加载后自动生成
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById("genBtn").click();
      }, 300);
    });
  </script>
</body>
