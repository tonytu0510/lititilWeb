<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码解码器 v34</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 1.5rem; color: #e0e0e0; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #43e97b, #38f9d7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 1.2rem; padding: 1.2rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
    .upload-box { border: 2px dashed rgba(255,255,255,0.3); border-radius: 1rem; padding: 1.5rem; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); margin-bottom: 1rem; transition: all 0.3s; }
    .upload-box:hover { border-color: #43e97b; }
    .upload-box.dragover { border-color: #43e97b; background: rgba(67,233,123,0.1); }
    .btn { width: 100%; padding: 0.7rem; border: none; border-radius: 0.6rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: white; margin-bottom: 0.5rem; }
    .btn:hover { transform: translateY(-1px); }
    .btn-row { display: flex; gap: 0.6rem; }
    .btn-row .btn { flex: 1; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-box { background: rgba(0,0,0,0.3); border-radius: 0.7rem; padding: 0.8rem; margin-top: 0.8rem; }
    .result-content { font-size: 1.1rem; font-weight: 600; color: #43e97b; word-break: break-all; min-height: 1.5rem; }
    .result-content.empty { color: #666; }
    .log-box { background: rgba(0,0,0,0.3); border-radius: 0.5rem; padding: 0.5rem; font-family: 'Courier New', monospace; font-size: 0.7rem; color: #43e97b; max-height: 400px; overflow-y: auto; margin-top: 0.5rem; white-space: pre-wrap; line-height: 1.3; }
    .preview-area { display: flex; justify-content: center; padding: 0.8rem; background: rgba(0,0,0,0.2); border-radius: 0.8rem; margin: 0.8rem 0; }
    .url-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(67,233,123,0.15); border-left: 4px solid #43e97b; padding: 0.4rem 0.8rem; border-radius: 0.4rem; font-size: 0.85rem; color: #a8f0c0; margin-top: 0.4rem; word-break: break-all; }
  </style>
  <base target="_blank">
</head>
<body>
  <div class="container">
    <h1>📷 二维码解码器 v34</h1>
    <div class="card">
      <div class="upload-box" id="uploadBox">
        <div style="font-size:2.5rem;">🖼️</div>
        <div>点击上传 或 拖拽二维码图片</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <div class="preview-area" id="previewArea"><span style="color:#666;">预览</span></div>
    </div>
    <div class="card">
      <div class="result-box">
        <div style="font-size:0.75rem;color:#8892b0;">🔍 解析结果</div>
        <div class="result-content empty" id="scanResult">等待解析...</div>
        <div id="badgeContainer"></div>
      </div>
      <div class="btn-row">
        <button class="btn" style="background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e;" id="copyBtn" disabled>📋 复制</button>
        <button class="btn" style="background:linear-gradient(135deg,#f093fb,#f5576c);" id="openBtn" disabled>🔗 打开</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>

  <script>
    // ==================== GF(256) & RS ====================
    const EXP=new Int32Array(512),LOG=new Int32Array(256);
    (()=>{let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&0x100)x^=0x11D;}for(let i=255;i<512;i++)EXP[i]=EXP[i-255];})();
    const gm=(a,b)=>(a&&b)?EXP[LOG[a]+LOG[b]]:0;
    function peval(p,x){let y=p[0];for(let i=1;i<p.length;i++)y=gm(y,x)^p[i];return y;}
    function syndromes(msg,nsym){const s=[];let ok=1;for(let i=0;i<nsym;i++){s[i]=peval(msg,EXP[i]);if(s[i])ok=0;}return{ok};}
    function rsFix(msg,nsym){
      if(syndromes(msg,nsym).ok)return msg;
      const n=msg.length;
      for(let p=0;p<n;p++)for(let v=1;v<256;v++){const t=[...msg];t[p]^=v;if(syndromes(t,nsym).ok)return t;}
      return null;
    }

    // ==================== 图像处理 ====================
    function toGray(d){const g=new Uint8Array(d.width*d.height);for(let i=0;i<g.length;i++)g[i]=Math.round(d.data[i*4]*.299+d.data[i*4+1]*.587+d.data[i*4+2]*.114);return{gray:g,w:d.width,h:d.height};}
    function toBin(g,w,h){let mn=255,mx=0;for(let i=0;i<g.length;i++){if(g[i]<mn)mn=g[i];if(g[i]>mx)mx=g[i];}const th=mn+(mx-mn)*.4;const b=new Uint8Array(w*h);for(let i=0;i<g.length;i++)b[i]=g[i]<th?0:1;return b;}

    // ==================== 定位点 ====================
    function findFinders(bin,w,h){const a=[];for(let y=0;y<h;y+=2){const s=[];let cl=bin[y*w],ln=1;for(let x=1;x<w;x++){const co=bin[y*w+x];if(co===cl)ln++;else{s.push({cl,len:ln,sx:x-ln});cl=co;ln=1;}}s.push({cl,len:ln,sx:w-ln});for(let i=0;i<s.length-4;i++){const sg=s.slice(i,i+5);if(sg[0].cl===0&&sg[1].cl===1&&sg[2].cl===0&&sg[3].cl===1&&sg[4].cl===0){const t=sg[0].len+sg[1].len+sg[2].len+sg[3].len+sg[4].len,ms=t/7,ra=sg.map(x=>x.len/ms);let ok=1;for(let j=0;j<5;j++)if(ra[j]<.3||ra[j]>4.0)ok=0;if(ok&&ms>1)a.push({x:sg[0].sx+sg[0].len+sg[1].len+Math.floor(sg[2].len/2),y,modSize:ms});}}}return a;}
    function cluster(pts,gs){const g={};for(const p of pts){const k=Math.floor(p.x/gs)+','+Math.floor(p.y/gs);if(!g[k])g[k]={pts:[],sx:0,sy:0,sm:0};g[k].pts.push(p);g[k].sx+=p.x;g[k].sy+=p.y;g[k].sm+=p.modSize;}const cells=Object.values(g).filter(c=>c.pts.length>=3),m=[];for(let i=0;i<cells.length;i++){if(cells[i]._)continue;let cx=cells[i].sx/cells[i].pts.length,cy=cells[i].sy/cells[i].pts.length,cm=cells[i].sm/cells[i].pts.length,n=cells[i].pts.length;let ch=1;while(ch){ch=0;for(let j=i+1;j<cells.length;j++){if(cells[j]._)continue;const jx=cells[j].sx/cells[j].pts.length,jy=cells[j].sy/cells[j].pts.length;if(Math.abs(cx-jx)<gs*3&&Math.abs(cy-jy)<gs*3){cx=(cx*n+jx*cells[j].pts.length)/(n+cells[j].pts.length);cy=(cy*n+jy*cells[j].pts.length)/(n+cells[j].pts.length);cm=(cm*n+(cells[j].sm/cells[j].pts.length)*cells[j].pts.length)/(n+cells[j].pts.length);n+=cells[j].pts.length;cells[j]._=1;ch=1;}}}m.push({x:Math.round(cx),y:Math.round(cy),modSize:cm,n});}return m.filter(x=>x.n>=5).sort((a,b)=>b.n-a.n);}
    function order(pts){const tl=pts.reduce((a,b)=>(a.x+a.y)<(b.x+b.y)?a:b);const rest=pts.filter(p=>p!==tl);const tr=rest.reduce((a,b)=>a.x>b.x?a:b);const bl=rest.find(p=>p!==tr);return{tl,tr,bl};}

    // ==================== 矩阵 & 读取 ====================
    function extractM(bin,w,h,tl,tr,bl,size){const m=Array.from({length:size},()=>new Uint32Array(size));const dx1=(tr.x-tl.x)/(size-7),dy1=(tr.y-tl.y)/(size-7),dx2=(bl.x-tl.x)/(size-7),dy2=(bl.y-tl.y)/(size-7);const ox=tl.x-dx1*3-dx2*3,oy=tl.y-dy1*3-dy2*3;for(let r=0;r<size;r++)for(let c=0;c<size;c++){const ix=Math.round(ox+c*dx1+r*dx2),iy=Math.round(oy+c*dy1+r*dy2);if(ix>=0&&ix<w&&iy>=0&&iy<h)m[r][c]=bin[iy*w+ix]?0:1;}return m;}
    function readBits(m,size){const bits=[];let up=1;for(let col=size-1;col>=0;col-=2){const rc=col===6?5:col;for(let row=up?size-1:0;up?row>=0:row<size;row+=up?-1:1){for(let c=rc;c>=rc-1;c--){if(c<0||c>=size)continue;if(row===6||c===6)continue;bits.push(m[row][c]);}}up=!up;}return bits;}

    // ==================== 掩码 ====================
    function unmask(m,size,mask){const w=m.map(r=>new Uint32Array(r));for(let r=0;r<size;r++)for(let c=0;c<size;c++){if(r===6||c===6)continue;const inv=[(r+c)%2===0,r%2===0,c%3===0,(r+c)%3===0,(Math.floor(r/2)+Math.floor(c/3))%2===0,((r*c)%2+(r*c)%3)===0,(((r*c)%2+(r*c)%3)%2)===0,(((r+c)%2+(r*c)%3)%2)===0][mask];if(inv)w[r][c]^=1;}return w;}

    // ==================== 版本数据 ====================
    const VD={1:[26,9,17],2:[44,16,28],3:[70,26,44],4:[100,36,64],5:[134,46,88],6:[172,60,112],7:[196,66,130],8:[242,86,156],9:[292,100,192],10:[346,122,224]};

    // ==================== 解码核心：从码字提取字节 ====================
    function decodeFromCW(dataCW, bitOffset){
      if(dataCW.length<2)return null;
      const mode=(dataCW[0]>>4)&0xF;if(mode!==4)return null;
      const count=((dataCW[0]&0xF)<<4)|((dataCW[1]>>4)&0xF);
      if(count<1||count>300)return null;
      let allBits='';for(const cw of dataCW)allBits+=cw.toString(2).padStart(8,'0');
      const dataStart=12+bitOffset;
      const bytes=[];
      for(let i=dataStart;i+8<=allBits.length&&bytes.length<count;i+=8)bytes.push(parseInt(allBits.substring(i,i+8),2));
      return{bytes,count};
    }

    function decodeBytes(bytes){
      // 直接解码
      let end=bytes.length;
      for(let i=0;i<bytes.length-1;i++){if((bytes[i]===0xEC&&bytes[i+1]===0x11)||(bytes[i]===0x11&&bytes[i+1]===0xEC)){end=i;break;}}
      const text=new TextDecoder().decode(new Uint8Array(bytes.slice(0,end)));
      if(/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(text))return text;
      // 偏移
      for(let shift=0;shift<256;shift++){
        const test=bytes.map(b=>(b+shift)&0xFF);
        let e2=test.length;for(let i=0;i<test.length-1;i++){if((test[i]===0xEC&&test[i+1]===0x11)||(test[i]===0x11&&test[i+1]===0xEC)){e2=i;break;}}
        const t=new TextDecoder().decode(new Uint8Array(test.slice(0,e2)));
        if(/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(t))return t;
      }
      return text;
    }

    // ==================== 主解析 ====================
    function parseImage(imageData){
      const{gray,w,h}=toGray(imageData);
      const bin=toBin(gray,w,h);
      const pts=findFinders(bin,w,h);
      addLog('候选点: '+pts.length);
      if(pts.length<10)return null;
      const clusters=cluster(pts,Math.floor(w/15));
      addLog('簇: '+clusters.length);
      if(clusters.length<3)return null;
      const{tl,tr,bl}=order(clusters.slice(0,3));
      addLog('TL('+tl.x+','+tl.y+') TR('+tr.x+','+tr.y+') BL('+bl.x+','+bl.y+')');
      const avgMod=(tl.modSize+tr.modSize+bl.modSize)/3;
      const d1=Math.sqrt((tr.x-tl.x)**2+(tr.y-tl.y)**2),d2=Math.sqrt((bl.x-tl.x)**2+(bl.y-tl.y)**2);
      const ev=Math.round(((d1+d2)/2/avgMod-10)/4),v=Math.max(1,Math.min(10,ev)),sz=17+v*4;
      const dcw=VD[v]?VD[v][1]:26,ecw=VD[v]?VD[v][2]:44,total=VD[v]?VD[v][0]:70;
      addLog('v'+v+' sz='+sz+' dataCW='+dcw+' ecCW='+ecw);
      const m=extractM(bin,w,h,tl,tr,bl,sz);
      
      for(const inv of[0,1]){
        const um=m.map(r=>new Uint32Array(r));if(inv)for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)um[r][c]^=1;
        for(let mask=0;mask<8;mask++){
          const w=unmask(um,sz,mask);
          const bits=readBits(w,sz);
          if(bits.length<20)continue;
          const allCW=[];for(let i=0;i<total&&i*8<bits.length;i++){let cw=0;for(let j=0;j<8;j++)cw=(cw<<1)|bits[i*8+j];allCW.push(cw);}
          const corrected=rsFix(allCW,ecw)||allCW;
          const dataCWarr=corrected.slice(0,dcw);
          for(let off=-4;off<=4;off++){
            const r=decodeFromCW(dataCWarr,off);
            if(r){
              const text=decodeBytes(r.bytes);
              addLog((inv?'反转':'正常')+' mask'+mask+' off'+off+': '+text.substring(0,40));
              if(text&&/^https?:\/\/|www\.|[a-z]+\.[a-z]{2,}/i.test(text))return text;
            }
          }
        }
      }
      return null;
    }

    // ==================== UI ====================
    const uploadBox=document.getElementById('uploadBox'),fileInput=document.getElementById('fileInput');
    const scanResult=document.getElementById('scanResult'),badgeContainer=document.getElementById('badgeContainer');
    const copyBtn=document.getElementById('copyBtn'),openBtn=document.getElementById('openBtn');
    const previewArea=document.getElementById('previewArea'),logBox=document.getElementById('logBox');
    const hiddenCanvas=document.getElementById('hiddenCanvas'),hiddenCtx=hiddenCanvas.getContext('2d',{willReadFrequently:true});
    let lastUrl='';

    function addLog(msg){const t=new Date().toLocaleTimeString('zh-CN',{hour12:false});logBox.innerHTML+='<span style="color:#666;">['+t+']</span> '+msg+'\n';logBox.scrollTop=logBox.scrollHeight;}

    function processImage(img){
      logBox.innerHTML='';addLog('🚀 开始解析');
      hiddenCanvas.width=img.width;hiddenCanvas.height=img.height;hiddenCtx.drawImage(img,0,0);
      previewArea.innerHTML='';const oi=document.createElement('img');oi.src=hiddenCanvas.toDataURL();oi.style.maxWidth='200px';oi.style.maxHeight='200px';previewArea.appendChild(oi);
      setTimeout(()=>{
        const r=parseImage(hiddenCtx.getImageData(0,0,img.width,img.height));
        if(r){scanResult.textContent=r;scanResult.className='result-content';lastUrl=r;copyBtn.disabled=false;openBtn.disabled=false;badgeContainer.innerHTML='<div class="url-badge">🌐 <a href="'+r+'" target="_blank">'+r+'</a></div>';}
        else{scanResult.textContent='未能提取到有效网址';scanResult.className='result-content empty';lastUrl='';copyBtn.disabled=true;openBtn.disabled=true;badgeContainer.innerHTML='';}
      },50);
    }

    uploadBox.addEventListener('click',()=>fileInput.click());
    fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>processImage(img);img.src=ev.target.result;};reader.readAsDataURL(f);fileInput.value='';});
    uploadBox.addEventListener('dragover',e=>{e.preventDefault();uploadBox.classList.add('dragover');});
    uploadBox.addEventListener('dragleave',()=>{uploadBox.classList.remove('dragover');});
    uploadBox.addEventListener('drop',e=>{e.preventDefault();uploadBox.classList.remove('dragover');const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>processImage(img);img.src=ev.target.result;};reader.readAsDataURL(f);});
    copyBtn.addEventListener('click',()=>{if(lastUrl)navigator.clipboard.writeText(lastUrl);});
    openBtn.addEventListener('click',()=>{if(lastUrl)window.open(lastUrl,'_blank');});
  </script>
</body>
</html>
