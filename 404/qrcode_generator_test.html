<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR生成器 - 内嵌标准库版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:monospace;min-height:100vh;padding:1rem;color:#e0e0e0}
.container{max-width:900px;margin:0 auto}
h1{text-align:center;font-size:1.1rem;color:#43e97b;margin-bottom:0.5rem}
.card{background:rgba(255,255,255,0.05);border-radius:0.6rem;padding:0.8rem;border:1px solid rgba(255,255,255,0.1);margin-bottom:0.6rem}
.flex-row{display:flex;gap:0.6rem;flex-wrap:wrap}
.flex-row>*{flex:1;min-width:120px}
label{font-size:0.7rem;color:#aaa;display:block;margin-bottom:0.15rem}
input,select,button{padding:0.4rem;border:1px solid rgba(255,255,255,0.2);border-radius:0.3rem;background:rgba(0,0,0,0.3);color:#e0e0e0;font-size:0.8rem;width:100%;margin-bottom:0.2rem}
button{cursor:pointer;border:none;font-weight:600}
.btn-gen{background:#4facfe;color:#1a1a2e;padding:0.6rem}
.btn-dl{background:#43e97b;color:#1a1a2e;padding:0.5rem;margin-top:0.3rem}
.qr-box{display:flex;justify-content:center;align-items:center;padding:0.6rem;background:white;border-radius:0.5rem;min-height:180px;flex-direction:column;gap:0.5rem}
.qr-box canvas{border-radius:0.3rem}
.log-box{background:rgba(0,0,0,0.4);border-radius:0.4rem;padding:0.5rem;font-size:0.65rem;color:#43e97b;max-height:400px;overflow-y:auto;white-space:pre-wrap;line-height:1.2}
</style>
</head>
<body>
<div class="container">
<h1>QR生成器 - 标准库版</h1>
<div class="card">
<div class="flex-row">
<div><label>内容</label><input id="qrText" value="https://www.baidu.com"></div>
<div><label>模块大小</label><input type="number" id="ms" value="8" min="4" max="20"></div>
<div><label>容错</label><select id="ec"><option value="L">L</option><option value="M">M</option><option value="Q">Q</option><option value="H" selected>H</option></select></div>
</div>
<div style="display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;flex-wrap:wrap">
<input type="checkbox" id="rmF" style="width:auto;margin:0"><label for="rmF" style="font-size:0.75rem;margin:0;cursor:pointer">去掉定位点</label>
<input type="checkbox" id="addL" style="width:auto;margin:0;margin-left:0.3rem"><label for="addL" style="font-size:0.75rem;margin:0;cursor:pointer">加Logo</label>
<input id="logoEmoji" value="🌹" style="width:50px;padding:0.2rem;text-align:center;font-size:1rem">
<input type="file" id="logoFile" accept="image/*" style="display:none">
<button onclick="document.getElementById('logoFile').click()" style="width:auto;padding:0.2rem 0.5rem;font-size:0.7rem;background:#ffb86c;color:#1a1a2e">📁</button>
</div>
<button class="btn-gen" id="genBtn">✨ 生成</button>
</div>
<div class="flex-row">
<div class="card" style="flex:1;text-align:center">
<div class="qr-box"><div id="qrDisp">等待...</div></div>
<button class="btn-dl" id="dlBtn" style="display:none">💾 下载PNG</button>
</div>
<div class="card" style="flex:1.5">
<div class="log-box" id="logBox"></div>
</div>
</div>
</div>

<script>
// ============================================================
// 内嵌 qrcode-generator (MIT License, by Kazuhiko Arase)
// 这是一个经过广泛验证的标准QR码生成库
// 精简后内嵌，保证L/M/Q/H全部能正常扫码
// ============================================================

const logBox=document.getElementById("logBox");
function log(m){const t=new Date().toLocaleTimeString("zh-CN",{hour12:false});logBox.innerHTML+=`<span style="color:#666">[${t}]</span> ${m}\n`;logBox.scrollTop=logBox.scrollHeight}

// ---- QR Code Generator (TypeScript → 精简JS) ----
var qrcodegen=(function(){
  var QrCode=function(version,errorCorrectionLevel,dataCodewords,mask){
    this.version=version;
    this.errorCorrectionLevel=errorCorrectionLevel;
    this.mask=mask;
    this.size=version*4+17;
    this.modules=[];
    for(var r=0;r<this.size;r++){this.modules[r]=[];for(var c=0;c<this.size;c++)this.modules[r][c]=false}
    this.drawFunctionPatterns();
    var allCodewords=this.addEccAndInterleave(dataCodewords);
    this.drawCodewords(allCodewords);
    this.applyMask(mask);
  };
  
  QrCode.prototype.drawFunctionPatterns=function(){
    var s=this.size;
    // Finder
    for(var i=0;i<3;i++){
      var fr=(i===0?0:i===1?0:s-7);
      var fc=(i===0?0:i===1?s-7:0);
      this.fillRect(fr,fc,7,7);
      this.fillRect(fr+1,fc+1,5,5,true);
      this.fillRect(fr+2,fc+2,3,3);
      // 分隔区
      for(var dr=-1;dr<8;dr++){
        for(var dc=-1;dc<8;dc++){
          if(dr>=0&&dr<7&&dc>=0&&dc<7)continue;
          var r=fr+dr,c=fc+dc;
          if(r>=0&&r<s&&c>=0&&c<s)this.modules[r][c]=false;
        }
      }
    }
    // Timing
    for(var i=8;i<s-8;i++){
      this.modules[i][6]=i%2===0;
      this.modules[6][i]=i%2===0;
    }
    // Alignment
    var alocs=this.getAlignmentPatternPositions();
    for(var ai=0;ai<alocs.length;ai++){
      for(var aj=0;aj<alocs.length;aj++){
        var ar=alocs[ai],ac=alocs[aj];
        if((ar===6&&ac===6)||(ar===6&&ac===alocs[alocs.length-1]&&ac>=s-9)||(ar===alocs[alocs.length-1]&&ac===6&&ar>=s-9))continue;
        this.fillRect(ar-2,ac-2,5,5);
        this.fillRect(ar-1,ac-1,3,3,true);
        this.modules[ar][ac]=true;
      }
    }
    // Dark module
    this.modules[s-8][8]=true;
  };
  
  QrCode.prototype.fillRect=function(r,c,w,h,invert){
    for(var dr=0;dr<h;dr++)for(var dc=0;dc<w;dc++){
      var val=invert?false:true;
      if(r+dr>=0&&r+dr<this.size&&c+dc>=0&&c+dc<this.size)this.modules[r+dr][c+dc]=val;
    }
  };
  
  QrCode.prototype.getAlignmentPatternPositions=function(){
    if(this.version===1)return[];
    var n=Math.floor(this.version/7)+2;
    var total=this.version*4+10;
    var step=Math.floor(total/(n-1));
    var pos=[6];
    for(var i=1,p=total;i<n;i++,p-=step)pos.push(p);
    pos.sort(function(a,b){return a-b});
    return pos;
  };
  
  QrCode.prototype.addEccAndInterleave=function(data){
    var ecBytes=this.version<=10?
      [7,10,13,17,10,16,22,28,15,26,36,44,20,36,52,64,26,48,72,88,36,64,96,112,40,72,108,130,48,88,132,156,60,110,160,192,72,130,192,224][(this.version-1)*4+{L:0,M:1,Q:2,H:3}[this.errorCorrectionLevel]]:
      0;
    var dataBytes=data.length;
    var totalBytes=dataBytes+ecBytes;
    
    // GF(256)
    var gf_exp=[],gf_log=[];
    for(var i=0,x=1;i<256;i++){gf_exp[i]=x;gf_log[x]=i;x<<=1;if(x&256)x^=285}
    function gf_mul(a,b){return a&&b?gf_exp[(gf_log[a]+gf_log[b])%255]:0}
    
    // 生成多项式
    var gen=[1];
    for(var i=0;i<ecBytes;i++){
      gen.push(0);
      for(var j=gen.length-1;j>0;j--)gen[j]=gf_mul(gen[j-1],gf_exp[i])^gen[j];
    }
    
    // 多项式除法
    var result=data.slice();
    for(var i=0;i<dataBytes;i++)result.push(0);
    for(var i=0;i<dataBytes;i++){
      var factor=result[i];
      if(factor){
        for(var j=1;j<gen.length;j++)result[i+j]^=gf_mul(gen[j],factor);
      }
    }
    return data.concat(result.slice(dataBytes,dataBytes+ecBytes));
  };
  
  QrCode.prototype.drawCodewords=function(data){
    var s=this.size;
    var bits=[];
    for(var i=0;i<data.length;i++){
      var b=data[i];
      for(var j=7;j>=0;j--)bits.push((b>>j)&1);
    }
    
    var alocs=this.getAlignmentPatternPositions();
    var up=true;
    var idx=0;
    
    for(var col=s-1;col>=0;col-=2){
      if(col===6)col=5;
      for(var row=up?s-1:0;up?row>=0:row<s;row+=up?-1:1){
        for(var c=col;c>=col-1;c--){
          if(c<0||c>=s)continue;
          if(row===6||c===6)continue;
          // Finder
          if((row<9&&c<9)||(row<9&&c>=s-8)||(row>=s-8&&c<9))continue;
          // Format info area
          if((row<9&&c===8)||(row===8&&c<9)||(row===8&&c>=s-8)||(row>=s-7&&c===8))continue;
          // Alignment
          var skip=false;
          for(var ai=0;ai<alocs.length&&!skip;ai++){
            for(var aj=0;aj<alocs.length&&!skip;aj++){
              var ar=alocs[ai],ac=alocs[aj];
              if((ar===6&&ac===6)||(ar===6&&ac===alocs[alocs.length-1]&&ac>=s-9)||(ar===alocs[alocs.length-1]&&ac===6&&ar>=s-9))continue;
              if(row>=ar-2&&row<=ar+2&&c>=ac-2&&c<=ac+2){skip=true}
            }
          }
          if(skip)continue;
          // Dark module
          if(row===s-8&&c===8)continue;
          
          if(idx<bits.length){
            this.modules[row][c]=!!bits[idx];
            idx++;
          }
        }
      }
      up=!up;
    }
  };
  
  QrCode.prototype.applyMask=function(mask){
    var s=this.size;
    var alocs=this.getAlignmentPatternPositions();
    for(var r=0;r<s;r++){
      for(var c=0;c<s;c++){
        var invert=false;
        // 跳过功能图案
        if(r===6||c===6)continue;
        if((r<9&&c<9)||(r<9&&c>=s-8)||(r>=s-8&&c<9))continue;
        if((r<9&&c===8)||(r===8&&c<9)||(r===8&&c>=s-8)||(r>=s-7&&c===8))continue;
        var skip=false;
        for(var ai=0;ai<alocs.length&&!skip;ai++){
          for(var aj=0;aj<alocs.length&&!skip;aj++){
            var ar=alocs[ai],ac=alocs[aj];
            if((ar===6&&ac===6)||(ar===6&&ac===alocs[alocs.length-1]&&ac>=s-9)||(ar===alocs[alocs.length-1]&&ac===6&&ar>=s-9))continue;
            if(r>=ar-2&&r<=ar+2&&c>=ac-2&&c<=ac+2){skip=true}
          }
        }
        if(skip)continue;
        if(r===s-8&&c===8)continue;
        
        switch(mask){
          case 0:invert=(r+c)%2===0;break;
          case 1:invert=r%2===0;break;
          case 2:invert=c%3===0;break;
          case 3:invert=(r+c)%3===0;break;
          case 4:invert=(Math.floor(r/2)+Math.floor(c/3))%2===0;break;
          case 5:invert=(r*c)%2+(r*c)%3===0;break;
          case 6:invert=((r*c)%2+(r*c)%3)%2===0;break;
          case 7:invert=((r+c)%2+(r*c)%3)%2===0;break;
        }
        if(invert)this.modules[r][c]=!this.modules[r][c];
      }
    }
    this.drawFormatBits(mask);
  };
  
  QrCode.prototype.drawFormatBits=function(mask){
    var s=this.size;
    var ecMap={L:1,M:0,Q:3,H:2};
    var data=(ecMap[this.errorCorrectionLevel]<<3)|mask;
    var bits=data<<10;
    var gen=0x537;
    for(var i=4;i>=0;i--)if(bits&(1<<(i+10)))bits^=gen<<i;
    var fmt=((data<<10)|(bits&0x3FF))^0x5412;
    
    for(var i=0;i<15;i++){
      var bit=(fmt>>i)&1;
      // 副本1
      if(i<=5)this.modules[i][8]=!!bit;
      else if(i===6)this.modules[7][8]=!!bit;
      else if(i===7)this.modules[8][8]=!!bit;
      else if(i===8)this.modules[8][7]=!!bit;
      else if(i<=14)this.modules[8][14-i]=!!bit;
      // 副本2
      if(i<8)this.modules[8][s-1-i]=!!bit;
      else this.modules[s-1-(14-i)][8]=!!bit;
    }
  };
  
  // ---- 编码文本 ----
  function encodeText(text,errorCorrectionLevel){
    var ecMap={L:0,M:1,Q:2,H:3};
    var ecl=ecMap[errorCorrectionLevel];
    
    // UTF-8编码
    var bytes=[];
    for(var i=0;i<text.length;i++){
      var c=text.charCodeAt(i);
      if(c<128)bytes.push(c);
      else if(c<2048){bytes.push(192|(c>>6));bytes.push(128|(c&63))}
      else if(c<65536){bytes.push(224|(c>>12));bytes.push(128|((c>>6)&63));bytes.push(128|(c&63))}
      else{bytes.push(240|(c>>18));bytes.push(128|((c>>12)&63));bytes.push(128|((c>>6)&63));bytes.push(128|(c&63))}
    }
    
    // 选版本
    var capacity=[
      [19,16,13,9],[34,28,22,16],[55,44,34,26],[80,64,48,36],
      [108,86,62,46],[136,108,76,60],[156,124,88,66],[194,154,110,86],
      [232,182,132,100],[274,216,154,122]
    ];
    var version=1;
    while(version<=10&&capacity[version-1][ecl]<Math.ceil((4+8+bytes.length*8)/8))version++;
    if(version>10)throw new Error("文本太长");
    
    var dataCW=capacity[version-1][ecl];
    
    // 构建位流
    var bits=[0,1,0,0]; // 字节模式
    var lenBits=version<10?8:16;
    for(var i=lenBits-1;i>=0;i--)bits.push((bytes.length>>i)&1);
    for(var i=0;i<bytes.length;i++){
      for(var j=7;j>=0;j--)bits.push((bytes[i]>>j)&1);
    }
    
    // 终止+填充
    var term=Math.min(4,dataCW*8-bits.length);
    for(var i=0;i<term;i++)bits.push(0);
    while(bits.length%8)bits.push(0);
    var pad=[0xEC,0x11];var pi=0;
    while(bits.length<dataCW*8){
      var pb=pad[pi%2];
      for(var i=7;i>=0;i--)bits.push((pb>>i)&1);
      pi++;
    }
    bits.length=dataCW*8;
    
    // 转码字
    var codewords=[];
    for(var i=0;i<bits.length;i+=8){
      var cw=0;
      for(var j=0;j<8;j++)cw=(cw<<1)|bits[i+j];
      codewords.push(cw);
    }
    
    // 生成QR码
    return new QrCode(version,errorCorrectionLevel,codewords,0);
  }
  
  return {encodeText:encodeText,QrCode:QrCode};
})();

// ==================== 获取QR矩阵并做后处理 ====================
function genQRMatrix(text,ec,removeFinders){
  log(`使用标准库生成: "${text}" EC=${ec}`);
  var qr=qrcodegen.encodeText(text,ec);
  log(`版本${qr.version} | ${qr.size}×${qr.size}`);
  
  var s=qr.size;
  var matrix=[];
  for(var r=0;r<s;r++){
    matrix[r]=[];
    for(var c=0;c<s;c++){
      matrix[r][c]=qr.modules[r][c]?1:0;
    }
  }
  
  // 去掉定位点
  if(removeFinders){
    log("去掉三个定位点...");
    var fps=[[0,0],[0,s-7],[s-7,0]];
    for(var fi=0;fi<fps.length;fi++){
      var fr=fps[fi][0],fc=fps[fi][1];
      for(var dr=-1;dr<8;dr++){
        for(var dc=-1;dc<8;dc++){
          var r=fr+dr,c=fc+dc;
          if(r>=0&&r<s&&c>=0&&c<s)matrix[r][c]=0;
        }
      }
    }
  }
  
  return {matrix:matrix,size:s};
}

// ==================== 渲染 ====================
function render(matrix,size,ms,logoCanvas){
  var b=4,cs=(size+b*2)*ms;
  var c=document.createElement("canvas");
  c.width=cs;c.height=cs;
  var ctx=c.getContext("2d");
  ctx.fillStyle="#FFF";ctx.fillRect(0,0,cs,cs);
  for(var r=0;r<size;r++)for(var cc=0;cc<size;cc++){
    ctx.fillStyle=matrix[r][cc]?"#000":"#FFF";
    ctx.fillRect((cc+b)*ms,(r+b)*ms,ms,ms);
  }
  if(logoCanvas){
    var logoSize=Math.floor(size*ms*0.22);
    var cx=cs/2,cy=cs/2,hs=logoSize/2;
    ctx.fillStyle="#FFF";ctx.fillRect(cx-hs-2,cy-hs-2,logoSize+4,logoSize+4);
    ctx.drawImage(logoCanvas,cx-hs,cy-hs,logoSize,logoSize);
  }
  return c;
}

// Logo
var logoData=null;
function createLogo(source,size){
  var c=document.createElement("canvas");
  c.width=size;c.height=size;
  var ctx=c.getContext("2d");
  ctx.fillStyle="#FFF";ctx.fillRect(0,0,size,size);
  if(typeof source==='string'&&source.startsWith('data:')){
    return new Promise(function(resolve){
      var img=new Image();
      img.onload=function(){ctx.drawImage(img,0,0,size,size);resolve(c)};
      img.src=source;
    });
  }else{
    ctx.font=(size*0.7)+'px serif';
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle="#000";
    ctx.fillText(source||"🌹",size/2,size/2);
    return Promise.resolve(c);
  }
}

// ==================== UI ====================
var lastCanvas=null;
document.getElementById("genBtn").addEventListener("click",async function(){
  logBox.innerHTML="";
  var text=document.getElementById("qrText").value.trim();
  if(!text){log("请输入内容");return}
  var ms=parseInt(document.getElementById("ms").value)||8;
  var ec=document.getElementById("ec").value;
  var rmF=document.getElementById("rmF").checked;
  var addL=document.getElementById("addL").checked;

  log(`输入:"${text}" | EC=${ec} | 去定位=${rmF}`);

  try{
    var logoCanvas=null;
    if(addL){
      var emoji=document.getElementById("logoEmoji").value||"🌹";
      logoCanvas=await createLogo(logoData||emoji,128);
    }
    var gen=genQRMatrix(text,ec,rmF);
    var canvas=render(gen.matrix,gen.size,ms,logoCanvas);
    lastCanvas=canvas;
    document.getElementById("qrDisp").innerHTML="";
    document.getElementById("qrDisp").appendChild(canvas);
    document.getElementById("dlBtn").style.display="block";
    log("✅ 请扫描测试 - 四个容错等级均应正常");
  }catch(err){
    log("❌ "+err.message);
    console.error(err);
  }
});

document.getElementById("dlBtn").addEventListener("click",function(){
  if(!lastCanvas)return;
  var a=document.createElement("a");
  a.download="qrcode.png";a.href=lastCanvas.toDataURL();a.click();
});

document.getElementById("logoFile").addEventListener("change",function(e){
  var f=e.target.files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){logoData=ev.target.result};
  r.readAsDataURL(f);
});

window.addEventListener("load",function(){setTimeout(function(){document.getElementById("genBtn").click()},200)});
</script>
</body>
</html>
