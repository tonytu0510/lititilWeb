<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔳 纯手写二维码生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      font-family: "Segoe UI", Roboto, sans-serif; 
      min-height: 100vh; 
      padding: 1.5rem; 
      color: #e0e0e0; 
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { 
      text-align: center; 
      font-size: 1.8rem; 
      margin-bottom: 0.3rem; 
      background: linear-gradient(135deg, #43e97b, #38f9d7); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .card { 
      background: rgba(255,255,255,0.05); 
      border-radius: 1rem; 
      padding: 1.2rem; 
      border: 1px solid rgba(255,255,255,0.1); 
      margin-bottom: 1rem; 
    }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .flex-row > * { flex: 1; min-width: 200px; }
    label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.3rem; }
    input, select, button { 
      padding: 0.7rem; 
      border: 1px solid rgba(255,255,255,0.2); 
      border-radius: 0.5rem; 
      background: rgba(0,0,0,0.3); 
      color: #e0e0e0; 
      font-size: 0.9rem; 
      width: 100%; 
      margin-bottom: 0.5rem;
    }
    button { 
      cursor: pointer; 
      font-weight: 600; 
      border: none; 
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-gen { 
      background: linear-gradient(135deg, #4facfe, #00f2fe); 
      color: #1a1a2e; 
      font-size: 1rem;
      padding: 0.9rem;
    }
    .btn-download { 
      background: linear-gradient(135deg, #43e97b, #38f9d7); 
      color: #1a1a2e; 
    }
    .btn-upload { 
      background: linear-gradient(135deg, #ffb86c, #ff6b6b); 
      color: #1a1a2e; 
    }
    .qr-box { 
      display: flex; 
      justify-content: center; 
      align-items: center;
      padding: 1rem; 
      background: white; 
      border-radius: 0.8rem;
      min-height: 200px;
    }
    .qr-box canvas, .qr-box img { 
      max-width: 250px; 
      max-height: 250px; 
      border-radius: 0.5rem;
    }
    .log-box { 
      background: rgba(0,0,0,0.4); 
      border-radius: 0.5rem; 
      padding: 0.6rem; 
      font-family: monospace; 
      font-size: 0.75rem; 
      color: #43e97b; 
      max-height: 350px; 
      overflow-y: auto; 
      white-space: pre-wrap; 
      line-height: 1.4; 
    }
    .result { 
      font-size: 1.1rem; 
      font-weight: 600; 
      padding: 0.5rem; 
      text-align: center; 
      border-radius: 0.5rem;
      margin-top: 0.5rem;
    }
    .ok { color: #43e97b; background: rgba(67,233,123,0.1); }
    .fail { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .info { color: #4facfe; background: rgba(79,172,254,0.1); }
    .logo-preview { 
      width: 60px; 
      height: 60px; 
      border-radius: 0.5rem; 
      background: white; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 2rem;
      margin-top: 0.5rem;
    }
    .feature-tag {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      margin-right: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .tag-green { background: rgba(67,233,123,0.2); color: #43e97b; }
    .tag-blue { background: rgba(79,172,254,0.2); color: #4facfe; }
    .tag-orange { background: rgba(255,184,108,0.2); color: #ffb86c; }
    .section-title { 
      color: #ffb86c; 
      font-size: 0.75rem; 
      text-transform: uppercase; 
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔳 纯手写二维码生成器</h1>
    <p class="subtitle">去掉定位点 · 原位置填充数据模块 · 仍可扫描</p>

    <div style="text-align: center; margin-bottom: 1rem;">
      <span class="feature-tag tag-green">🗑️ 去掉三个定位点</span>
      <span class="feature-tag tag-blue">🎯 中间加Logo</span>
      <span class="feature-tag tag-orange">🛡️ H级容错 30%</span>
    </div>

    <div class="card">
      <div class="section-title">📝 二维码内容</div>
      <input id="qrText" value="https://www.baidu.com" placeholder="输入文字或链接">

      <div class="flex-row" style="margin-top: 0.8rem;">
        <div>
          <label>📐 模块大小 (像素/格)</label>
          <input type="number" id="moduleSize" value="8" min="4" max="20">
        </div>
        <div>
          <label>🛡️ 容错率</label>
          <select id="ecLevel">
            <option value="L">低 (~7%)</option>
            <option value="M">中 (~15%)</option>
            <option value="Q">较高 (~25%)</option>
            <option value="H" selected>高 (30%)</option>
          </select>
        </div>
      </div>

      <div class="flex-row" style="margin-top: 0.5rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0;">
          <input type="checkbox" id="removeFinders" checked style="width: auto; margin: 0;">
          <label for="removeFinders" style="margin:0; cursor:pointer; font-size: 0.85rem;">🗑️ 去掉三个定位点（原位置填充数据）</label>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0;">
          <input type="checkbox" id="addLogo" checked style="width: auto; margin: 0;">
          <label for="addLogo" style="margin:0; cursor:pointer; font-size: 0.85rem;">🎯 中间加Logo</label>
        </div>
      </div>

      <div id="logoSection" style="margin-top: 0.8rem;">
        <div class="section-title">🎯 Logo 设置</div>
        <div class="flex-row">
          <div>
            <label>📁 Logo图片（可选，不上传用默认emoji）</label>
            <input type="file" id="logoInput" accept="image/*" style="display:none;">
            <button class="btn-upload" onclick="document.getElementById('logoInput').click()" style="margin-bottom: 0;">📁 选择图片</button>
          </div>
          <div>
            <label>或输入 Emoji</label>
            <input id="logoEmoji" value="🌹" placeholder="emoji" style="text-align:center; font-size:1.2rem; margin-bottom: 0;">
          </div>
        </div>
        <div class="logo-preview" id="logoPreview">🌹</div>
      </div>

      <button class="btn-gen" id="genBtn" style="margin-top: 1rem;">✨ 生成二维码</button>
    </div>

    <div class="flex-row">
      <div class="card" style="text-align:center; flex: 1;">
        <div class="section-title">📱 二维码预览</div>
        <div class="qr-box"><div id="qrDisplay">等待生成...</div></div>
        <button class="btn-download" id="downloadBtn" style="margin-top: 0.8rem; display:none;">💾 下载二维码 (PNG)</button>
      </div>
      <div class="card" style="flex: 1.5;">
        <div class="section-title">🔍 解析日志</div>
        <div class="result" id="resultDisplay">等待生成...</div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>
  </div>

  <canvas id="workCanvas" style="display:none;"></canvas>

  <!-- ==================== 标准 QRCode.js 核心库 (内嵌) ==================== -->
  <script>
  // ===== 标准库核心: QRCode for JavaScript (Kazuhiko Arase) =====
  var QRCode;
  (function () {
    function QR8bitByte(data) {
      this.mode = 4; // QRMode.MODE_8BIT_BYTE
      this.data = data;
      this.parsedData = [];
      for (var i = 0, l = this.data.length; i < l; i++) {
        var byteArray = [];
        var code = this.data.charCodeAt(i);
        if (code > 0x10000) {
          byteArray[0] = 0xF0 | ((code & 0x1C0000) >>> 18);
          byteArray[1] = 0x80 | ((code & 0x3F000) >>> 12);
          byteArray[2] = 0x80 | ((code & 0xFC0) >>> 6);
          byteArray[3] = 0x80 | (code & 0x3F);
        } else if (code > 0x800) {
          byteArray[0] = 0xE0 | ((code & 0xF000) >>> 12);
          byteArray[1] = 0x80 | ((code & 0xFC0) >>> 6);
          byteArray[2] = 0x80 | (code & 0x3F);
        } else if (code > 0x80) {
          byteArray[0] = 0xC0 | ((code & 0x7C0) >>> 6);
          byteArray[1] = 0x80 | (code & 0x3F);
        } else {
          byteArray[0] = code;
        }
        this.parsedData.push(byteArray);
      }
      this.parsedData = Array.prototype.concat.apply([], this.parsedData);
      if (this.parsedData.length != this.data.length) {
        this.parsedData.unshift(191);
        this.parsedData.unshift(187);
        this.parsedData.unshift(239);
      }
    }
    QR8bitByte.prototype = {
      getLength: function () { return this.parsedData.length; },
      write: function (buffer) {
        for (var i = 0, l = this.parsedData.length; i < l; i++) buffer.put(this.parsedData[i], 8);
      }
    };

    // ---- QRUtil ----
    var QRUtil = {
      PATTERN_POSITION_TABLE: [
        [],[6,18],[6,22],[6,26],[6,30,54],[6,34,62],[6,28,50],[6,32,58],[6,36,62],
        [6,28,50,72],[6,26,50,74],[6,30,56,78],[6,32,60,82],[6,28,50,72,94],
        [6,26,50,74,98],[6,30,54,78,102],[6,28,50,72,96],[6,32,60,84,108],
        [6,34,62,90,114],[6,26,50,74,98,122],[6,30,54,78,102,126],
        [6,26,52,78,104,130],[6,30,56,82,108,134],[6,34,60,86,112,138],
        [6,30,54,78,102,126,150],[6,24,50,76,102,128,154],
        [6,28,54,80,106,132,158],[6,32,58,84,110,136,162],
        [6,26,50,74,98,122,146,170],[6,30,54,78,102,126,150,174],
        [6,26,52,78,104,130,156,182],[6,30,56,82,108,134,160,186],
        [6,34,60,86,112,138,164,190],[6,30,54,78,102,126,150,174,198],
        [6,24,50,76,102,128,154,180,206],[6,28,54,80,106,132,158,184,210],
        [6,32,58,84,110,136,162,188,214],[6,26,50,74,98,122,146,170,194],
        [6,30,54,78,102,126,150,174,198,222],[6,34,58,82,106,130,154,178,202,226],
        [6,30,54,78,102,126,150,174,198,222,246],[6,34,62,90,118,146,174,202,230,258]
      ],
      G15: (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0),
      G18: (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0),
      G15_MASK: (1 << 14) | (1 << 12) | (1 << 10) | (1 << 4) | (1 << 1),
      getBCHTypeInfo: function(data) {
        var d = data << 10;
        while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) {
          d ^= (QRUtil.G15 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15)));
        }
        return ((data << 10) | d) ^ QRUtil.G15_MASK;
      },
      getBCHTypeNumber: function(data) {
        var d = data << 12;
        while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18) >= 0) {
          d ^= (QRUtil.G18 << (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G18)));
        }
        return (data << 12) | d;
      },
      getBCHDigit: function(data) {
        var digit = 0;
        while (data != 0) { digit++; data >>>= 1; }
        return digit;
      },
      getPatternPosition: function(typeNumber) { return QRUtil.PATTERN_POSITION_TABLE[typeNumber - 1]; },
      getMask: function(maskPattern, i, j) {
        switch (maskPattern) {
          case 0: return (i + j) % 2 == 0;
          case 1: return i % 2 == 0;
          case 2: return j % 3 == 0;
          case 3: return (i + j) % 3 == 0;
          case 4: return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 == 0;
          case 5: return (i * j) % 2 + (i * j) % 3 == 0;
          case 6: return ((i * j) % 2 + (i * j) % 3) % 2 == 0;
          case 7: return ((i * j) % 3 + (i + j) % 2) % 2 == 0;
          default: throw new Error("bad maskPattern:" + maskPattern);
        }
      },
      getErrorCorrectPolynomial: function(errorCorrectLength) {
        var a = new QRPolynomial([1], 0);
        for (var i = 0; i < errorCorrectLength; i++) a = a.multiply(new QRPolynomial([1, QRMath.gexp(i)], 0));
        return a;
      },
      getLengthInBits: function(mode, type) {
        if (1 <= type && type < 10) {
          switch (mode) { case 1: return 10; case 2: return 9; case 4: return 8; case 8: return 8; default: throw new Error("mode:" + mode); }
        } else if (type < 27) {
          switch (mode) { case 1: return 12; case 2: return 11; case 4: return 16; case 8: return 10; default: throw new Error("mode:" + mode); }
        } else if (type < 41) {
          switch (mode) { case 1: return 14; case 2: return 13; case 4: return 16; case 8: return 12; default: throw new Error("mode:" + mode); }
        } else { throw new Error("type:" + type); }
      },
      getLostPoint: function(qrCode) {
        var moduleCount = qrCode.getModuleCount(), lostPoint = 0;
        for (var row = 0; row < moduleCount; row++) {
          for (var col = 0; col < moduleCount; col++) {
            var sameCount = 0, dark = qrCode.isDark(row, col);
            for (var r = -1; r <= 1; r++) {
              if (row + r < 0 || moduleCount <= row + r) continue;
              for (var c = -1; c <= 1; c++) {
                if (col + c < 0 || moduleCount <= col + c) continue;
                if (r == 0 && c == 0) continue;
                if (dark == qrCode.isDark(row + r, col + c)) sameCount++;
              }
            }
            if (sameCount > 5) lostPoint += (3 + sameCount - 5);
          }
        }
        for (var row = 0; row < moduleCount - 1; row++) {
          for (var col = 0; col < moduleCount - 1; col++) {
            var count = 0;
            if (qrCode.isDark(row, col)) count++;
            if (qrCode.isDark(row + 1, col)) count++;
            if (qrCode.isDark(row, col + 1)) count++;
            if (qrCode.isDark(row + 1, col + 1)) count++;
            if (count == 0 || count == 4) lostPoint += 3;
          }
        }
        for (var row = 0; row < moduleCount; row++) {
          for (var col = 0; col < moduleCount - 6; col++) {
            if (qrCode.isDark(row, col) && !qrCode.isDark(row, col + 1) && qrCode.isDark(row, col + 2) && qrCode.isDark(row, col + 3) && qrCode.isDark(row, col + 4) && !qrCode.isDark(row, col + 5) && qrCode.isDark(row, col + 6)) {
              lostPoint += 40;
            }
          }
        }
        for (var col = 0; col < moduleCount; col++) {
          for (var row = 0; row < moduleCount - 6; row++) {
            if (qrCode.isDark(row, col) && !qrCode.isDark(row + 1, col) && qrCode.isDark(row + 2, col) && qrCode.isDark(row + 3, col) && qrCode.isDark(row + 4, col) && !qrCode.isDark(row + 5, col) && qrCode.isDark(row + 6, col)) {
              lostPoint += 40;
            }
          }
        }
        var darkCount = 0;
        for (var col = 0; col < moduleCount; col++) {
          for (var row = 0; row < moduleCount; row++) {
            if (qrCode.isDark(row, col)) darkCount++;
          }
        }
        var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
        lostPoint += ratio * 10;
        return lostPoint;
      }
    };

    var QRMath = {
      glog: function(n) {
        if (n < 1) throw new Error("glog(" + n + ")");
        return QRMath.LOG_TABLE[n];
      },
      gexp: function(n) {
        while (n < 0) n += 255;
        while (n >= 256) n -= 255;
        return QRMath.EXP_TABLE[n];
      },
      EXP_TABLE: new Array(256),
      LOG_TABLE: new Array(256)
    };
    for (var i = 0; i < 8; i++) QRMath.EXP_TABLE[i] = 1 << i;
    for (var i = 8; i < 256; i++) QRMath.EXP_TABLE[i] = QRMath.EXP_TABLE[i - 4] ^ QRMath.EXP_TABLE[i - 5] ^ QRMath.EXP_TABLE[i - 6] ^ QRMath.EXP_TABLE[i - 8];
    for (var i = 0; i < 255; i++) QRMath.LOG_TABLE[QRMath.EXP_TABLE[i]] = i;

    function QRPolynomial(num, shift) {
      if (typeof num.length == 'undefined') throw new Error(num.length + "/" + shift);
      var offset = 0;
      while (offset < num.length && num[offset] == 0) offset++;
      this.num = new Array(num.length - offset + shift);
      for (var i = 0; i < num.length - offset; i++) this.num[i] = num[i + offset];
    }
    QRPolynomial.prototype = {
      get: function(index) { return this.num[index]; },
      getLength: function() { return this.num.length; },
      multiply: function(e) {
        var num = new Array(this.getLength() + e.getLength() - 1);
        for (var i = 0; i < this.getLength(); i++) {
          for (var j = 0; j < e.getLength(); j++) {
            num[i + j] ^= QRMath.gexp(QRMath.glog(this.get(i)) + QRMath.glog(e.get(j)));
          }
        }
        return new QRPolynomial(num, 0);
      },
      mod: function(e) {
        if (this.getLength() - e.getLength() < 0) return this;
        var ratio = QRMath.glog(this.get(0)) - QRMath.glog(e.get(0));
        var num = new Array(this.getLength());
        for (var i = 0; i < this.getLength(); i++) num[i] = this.get(i);
        for (var i = 0; i < e.getLength(); i++) num[i] ^= QRMath.gexp(QRMath.glog(e.get(i)) + ratio);
        return new QRPolynomial(num, 0).mod(e);
      }
    };

    var QRRSBlock = {

        [5,145,115,10,145,115],[19,75,47,10,75,47],[15,54,24,25,54,24],[23,45,15,25,45,15],
        [13,145,115,3,145,115],[2,74,46,29,74,46],[42,54,24,1,54,24],[23,45,15,28,45,15],
        [17,145,115],[10,74,46,23,74,46],[10,54,24,35,54,24],[19,45,15,35,45,15],
        [17,145,115,1,145,115],[14,74,46,21,74,46],[29,54,24,19,54,24],[11,45,15,46,45,15],

  <script>
    const logBox = document.getElementById("logBox");

      logBox.innerHTML += `<span style="color:#666;">[${t}]</span> ${msg}\n`;
      logBox.scrollTop = logBox.scrollHeight;

    function clearLog() {
      logBox.innerHTML = "";

    // ---- 核心改造：用标准库生成，然后做"去掉定位点"和"加Logo" ----
    async function genQR(text, options) {
      const moduleSize = options.moduleSize || 8;
      const ecLevel = options.ecLevel || 'H';
      const removeFinders = options.removeFinders || false;
      const addLogo = options.addLogo || false;
      const logoCanvas = options.logoCanvas || null;

      clearLog();
      addLog("🚀 === 开始生成二维码 ===");
      addLog(`📝 内容: "${text}"`);

      // 1. 用标准库生成标准二维码
      const ecMap = { 'L': 1, 'M': 0, 'Q': 3, 'H': 2 };
      const stdQR = new QRCode(null, { text: text, correctLevel: ecMap[ecLevel] });
      const model = stdQR._oQRCode;
      const sz = model.getModuleCount();
      const maskPattern = model.getBestMaskPattern ? 0 : 0; // 标准库已自动选最优

      addLog(`🔢 版本: ${model.typeNumber} | 大小: ${sz}×${sz} | 掩码: ${maskPattern}`);

      // 2. 复制矩阵
      const m = [];
      for (let r = 0; r < sz; r++) {
        m[r] = [];
        for (let c = 0; c < sz; c++) {
          m[r][c] = model.isDark(r, c) ? 1 : 0;
        }
      }

      // 3. 去掉定位点（如果需要）—— 把三个角的定位点区域清空，后续用数据填充
      if (removeFinders) {

        for (const {r: fr, c: fc} of fp) {
          for (let dr = -1; dr < 8; dr++) {
            for (let dc2 = -1; dc2 < 8; dc2++) {
              const rr = fr + dr, cc = fc + dc2;
              if (rr < 0 || rr >= sz || cc < 0 || cc >= sz) continue;
              m[rr][cc] = -1; // 标记为待填充

        }
        addLog("🗑️ 已清除三个定位点区域");
      }

      // 4. 计算Logo区域
      let logoRegion = null;
      if (addLogo && logoCanvas) {
        const logoSizeMod = Math.floor(sz * 0.25);
        const logoStart = Math.floor((sz - logoSizeMod) / 2);
        const logoEnd = logoStart + logoSizeMod - 1;
        logoRegion = { start: logoStart, end: logoEnd };
        addLog(`🎯 Logo区域: 模块 ${logoStart}-${logoEnd}`);

        let logoCanvas = null;
        if (addLogo) {
          const emoji = document.getElementById("logoEmoji").value || "🌹";
          logoCanvas = await createLogoCanvas(logoImageData || emoji, 128);
        }

        const gen = await genQR(text, {
          moduleSize,
          ecLevel,
          removeFinders,
          addLogo,
          logoCanvas
        });

        const display = document.getElementById("qrDisplay");
        display.innerHTML = "";
        display.appendChild(gen.canvas);

        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.style.display = "block";
        downloadBtn.onclick = () => {
          const link = document.createElement("a");
          link.download = "qrcode.png";
          link.href = gen.canvas.toDataURL();
          link.click();
          addLog("💾 已下载");
        };

        resultDisplay.textContent = "✅ 生成成功";
        resultDisplay.className = "result ok";

      } catch (err) {
        resultDisplay.textContent = "❌ 错误: " + err.message;
        resultDisplay.className = "result fail";
        addLog("生成错误: " + err.message);
        console.error(err);
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => { document.getElementById("genBtn").click(); }, 300);
    });
  </script>
</body>
</html>
